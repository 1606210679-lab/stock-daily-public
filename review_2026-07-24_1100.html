  { ticker: "MU", title_cn: "美光逆势涨3.2%,HBM需求扛起存储反攻?", body_cn: "美光逆市上涨3.20%,报$990上方,谷歌财报披露的巨额AI资本开支被解读为HBM与高端存储的需求确认,带动美光、SK海力士同步走强。市场认为AI基建的\"卖铲人\"正从GPU向存储链扩散。不过存储周期见顶之争仍在,有分析师警告\"闪存AI狂热已退\"。当大盘因capex担忧回落、存储却逆势收红,这会是资金轮动的新主线吗?", title_en: "Micron Gains 3.2% Against the Tape — Is HBM Demand Leading a Memory Comeback?", body_en: "Micron rose 3.20% to above $990 as Alphabet's massive AI capex disclosure was read as demand confirmation for HBM and high-end memory, lifting Micron and SK Hynix in tandem. Markets see AI infrastructure's 'picks-and-shovels' trade expanding from GPUs into the memory supply chain. However, debate over a memory cycle peak persists, with some analysts warning that 'flash AI euphoria has faded.' With the broader market falling on capex concerns while memory stocks close higher, could this be the next rotation theme?" },
  { ticker: "GOOG", title_cn: "谷歌财报后跌6.9%,2000亿capex把市场吓退?", body_cn: "Alphabet财报后下挫6.89%,主因2026年资本开支指引飙至约2000亿美元,市场担忧AI投入侵蚀利润。尽管云与搜索业绩稳健、巴菲特近期还加持谷歌,但\"重资本、慢回报\"的定价切换让Mag-7单日蒸发超7000亿。资金正重新审视超级科技的估值锚。当AI军备竞赛比拼的是烧钱耐力,谷歌的护城河能消化这笔账吗?", title_en: "Alphabet Drops 6.9% Post-Earnings — Did a $200B Capex Guide Spook Markets?", body_en: "Alphabet fell 6.89% after guiding 2026 capital expenditures to approximately $200 billion, stoking fears that AI investment will erode margins despite solid cloud and search results. Even Buffett's recent stake-building failed to cushion the blow, as the repricing of 'heavy capex, slow returns' wiped more than $700 billion from Mag-7 market caps in a single session. Investors are reassessing the valuation anchor for mega-cap tech. As the AI arms race becomes a test of spending endurance, can Alphabet's moat absorb the bill?" },
  { ticker: "SPCX", title_cn: "SpaceX涨2.6%,谷歌豪掷940亿入股引爆想象?", body_cn: "SpaceX相关标的上涨2.59%,消息面显示Alphabet披露持有约940亿美元头寸,两家Mag-7巨头同时押注,点燃市场对商业航天的估值想象。星链与发射业务的现金流前景被重新定价。但一级市场估值透明度低、映射标的溢价风险高,追高需谨慎。当科技巨头用真金白银为太空经济背书,散户该借道布局还是警惕泡沫?", title_en: "SpaceX Climbs 2.6% After Google Discloses ~$94B Stake — Valuation Ignites?", body_en: "SpaceX-linked assets gained 2.59% after Alphabet disclosed a position worth approximately $94 billion, with two Mag-7 giants simultaneously backing the venture and reigniting market imagination around commercial space valuations. Starlink and launch business cash flow prospects are being repriced. However, primary market valuation opacity remains low and proxy-play premium risk is elevated — caution is warranted on chasing the move. As tech titans put real capital behind the space economy, should retail investors seek exposure or watch for a bubble?" },
  { ticker: "INTC", title_cn: "英特尔盘中跌2.3%,盘后财报炸场后能反攻吗?", body_cn: "英特尔日内回落2.33%,但Q2财报意外亮眼——AI驱动的需求推动销售增速创十年新高,盘后一度跳涨。管理层称与AMD一样在代工与产品端\"重获多年未有的议价筹码\",被视为传统芯片龙头借AI周期翻身的信号。不过毛利修复与先进制程放量仍需验证。当市场愿意重新给英特尔讲成长故事,这轮反转能走多远?", title_en: "Intel Dips 2.3% Intraday — Can a Blowout After-Hours Report Spark a Reversal?", body_en: "Intel fell 2.33% during regular trading, but Q2 results beat expectations after the close — AI-driven demand pushed revenue growth to a decade high, sending shares sharply higher in extended hours. Management said Intel, like AMD, has 'regained pricing leverage not seen in years' across both foundry and product segments, signaling a potential AI-cycle comeback for the legacy chipmaker. Margin recovery and advanced node ramp-up still require validation. As markets warm to a fresh growth narrative for Intel, how far can this reversal run?" },
  { ticker: "NVDA", title_cn: "英伟达仅跌1.6%,Mag-7抛售里为何最抗跌?", body_cn: "英伟达小幅回落1.56%,在Mag-7单日蒸发超7000亿、AI资本开支引发获利了结的背景下明显抗跌。谷歌、特斯拉的巨额capex反被解读为对英伟达算力的持续下单,相对强弱凸显,有市场老将认为AI龙头\"燃料仍足\"。但苹果财报在即、板块情绪脆弱,龙头也难独善其身。当同行因烧钱被抛售、英伟达却是最大受益者,这份相对强势能延续吗?", title_en: "Nvidia Falls Just 1.6% — Why Is It the Most Resilient in the Mag-7 Selloff?", body_en: "Nvidia slipped just 1.56%, standing out as the most defensive name in a session where Mag-7 stocks shed over $700 billion in combined market cap amid AI capex-driven profit-taking. Google's and Tesla's massive spending commitments were reinterpreted as sustained orders for Nvidia compute, highlighting its relative strength — with seasoned investors noting the AI leader still has 'plenty of fuel.' With Apple's earnings ahead and sector sentiment fragile, even the leader is not immune. As peers are sold off for burning cash while Nvidia remains the primary beneficiary, can this relative strength hold?" },
  { ticker: "QQQ", title_cn: "纳指ETF跌1.9%,capex焦虑撞上油价谁先低头?", body_cn: "QQQ下跌1.90%,科技财报季的资本开支担忧,叠加油价飙升与地缘风险(胡塞武装扰动),推动纳指承压回落。初请失业金降至1969年以来最低,强就业反而强化了美联储9月不急于降息的预期。Mag-7集体获利了结成为主要拖累。当\"AI烧钱\"与\"利率更高更久\"两条叙事同时施压,这轮回调是健康换手还是趋势转向?", title_en: "QQQ Drops 1.9% — Will Capex Anxiety or Surging Oil Prices Blink First?", body_en: "QQQ fell 1.90% as tech earnings capex concerns collided with rising oil prices and geopolitical risk from Houthi disruptions, weighing on the Nasdaq. Initial jobless claims fell to their lowest since 1969 — but the strong labor print reinforced expectations that the Fed has little urgency to cut in September. Broad Mag-7 profit-taking was the primary drag. With 'AI overspending' and 'higher-for-longer rates' both pressuring sentiment simultaneously, is this pullback a healthy rotation or the start of a trend shift?" },
  { ticker: "NOW", title_cn: "ServiceNow上调指引却跌3.7%,好财报为何不涨?", body_cn: "ServiceNow逆势下跌3.69%,尽管Q2业绩超预期并上调全年指引,却仍被大盘抛售裹挟。市场对高估值软件股在capex收缩预期下的持续性存疑,Oracle拿下五角大楼大单也分流了政企AI叙事的关注。基本面与股价的背离,更多反映资金在避险而非选股。当业绩兑现却换来杀估值,这是错杀带来的低吸机会吗?", title_en: "ServiceNow Raises Guidance Yet Falls 3.7% — Why Isn't Good News Working?", body_en: "ServiceNow dropped 3.69% despite Q2 results beating estimates and full-year guidance being raised, as the broader market selloff overwhelmed the strong print. Investors are questioning the sustainability of high-multiple software names amid expectations of capex compression, while Oracle's Pentagon contract win diverted attention from the enterprise AI narrative. The disconnect between fundamentals and price action reflects risk-off positioning rather than stock-specific concerns. With valuation compressed despite earnings delivery, does this represent a mispricing and a buying opportunity?" },
  { ticker: "MSFT", title_cn: "微软跌2.2%,谷歌capex警报烧到下周财报?", body_cn: "微软下跌2.24%,谷歌2000亿capex指引引发的\"AI重投入\"担忧向整个云板块传导,而微软下周即将发布财报,市场提前为其资本开支定价。云业务增速与AI变现节奏成为最大看点。分析师仍看好其AI商业化领先地位,但估值对\"投入产出比\"愈发敏感。当同行因烧钱被杀估值,微软的财报要拿出怎样的答卷才能稳住人心?", title_en: "Microsoft Slides 2.2% — Will Alphabet's Capex Warning Cloud Next Week's Earnings?", body_en: "Microsoft fell 2.24% as anxiety over Alphabet's ~$200 billion capex guidance spread across the cloud sector, with markets beginning to pre-price Microsoft's own spending ahead of its earnings report next week. Cloud revenue growth and AI monetization pace are the key focal points. Analysts remain broadly constructive on Microsoft's AI commercialization lead, but valuations are growing increasingly sensitive to return-on-investment metrics. As peers are punished for heavy spending, what kind of earnings report will Microsoft need to deliver to restore confidence?" },
  { ticker: "NOK", title_cn: "诺基亚财报后跌5.4%,通信设备景气证伪了吗?", body_cn: "诺基亚Q2财报后下挫5.35%,尽管电话会议释放AI数据中心网络需求信号,但业绩与指引未能打消市场对增长放缓的疑虑。运营商资本开支节奏与毛利压力仍是核心变量。在科技板块因capex叙事整体分化之际,通信设备商的定位显得尴尬。当AI基建的红利更多流向算力与存储,诺基亚这类\"卖网络\"的玩家还能分到多少?", title_en: "Nokia Tumbles 5.4% Post-Earnings — Is the Telecom Equipment Cycle Broken?", body_en: "Nokia fell 5.35% following Q2 results, as commentary on AI data center networking demand failed to dispel concerns over decelerating growth, with carrier capex timing and margin pressure remaining the key variables. The positioning of telecom equipment vendors looks increasingly awkward as the broader tech sector splits along capex narratives. As AI infrastructure gains flow disproportionately to compute and memory, how much of the upside can network-focused players like Nokia realistically capture?" },
  { ticker: "AMD", title_cn: "AMD跌2.3%,英特尔财报能否点燃CPU叙事?", body_cn: "AMD回落2.29%,与半导体板块同步承压,但基本面暗流涌动:客户名单持续扩张,且随英特尔财报亮眼,\"英特尔与AMD都重获多年未有的议价筹码\"成为市场新叙事。数据中心CPU与AI加速卡的双线布局被重新审视。不过在Mag-7获利了结、板块risk-off的当口,利好难敌情绪。当行业格局向双雄倾斜,AMD的回调是上车时机还是补跌开端?", title_en: "AMD Dips 2.3% — Can Intel's Earnings Reignite the CPU Growth Story?", body_en: "AMD retreated 2.29% in line with broader semiconductor weakness, though underlying fundamentals are shifting: its customer roster continues to expand, and Intel's blowout results have given rise to a new market narrative that 'both Intel and AMD have regained pricing leverage not seen in years.' The dual-track positioning across data center CPUs and AI accelerators is drawing fresh scrutiny. However, with Mag-7 profit-taking driving a sector-wide risk-off move, positive catalysts are struggling to gain traction. As the industry tilts toward a two-horse race, is AMD's pullback a buying opportunity or the beginning of further downside?" },

let current = 0;

function render() {
  if (!topics.length) return;
  const t = topics[current];
  document.getElementById('tickerTag').textContent = t.ticker || 'TOPIC';
  document.getElementById('titleCn').textContent   = t.title_cn;
  document.getElementById('bodyCn').textContent    = t.body_cn;
  document.getElementById('titleEn').textContent   = t.title_en;
  document.getElementById('bodyEn').textContent    = t.body_en;
  document.getElementById('progressText').textContent = (current+1) + ' / ' + topics.length;
  document.getElementById('progressBar').style.width  = ((current+1)/topics.length*100) + '%';
  document.getElementById('prevBtn').disabled = current === 0;
  document.getElementById('nextBtn').disabled = current === topics.length - 1;
  document.getElementById('doneBanner').style.display = 'none';
  document.getElementById('card').style.display = '';
  resetBtns();
}

function navigate(dir) {
  const next = current + dir;
  if (next >= 0 && next < topics.length) { current = next; render(); }
  else if (dir === 1 && current === topics.length - 1) {
    document.getElementById('doneBanner').style.display = 'block';
    document.getElementById('card').style.display = 'none';
  }
}

function resetBtns() {
  [
    ['.copy-title-cn-btn', '复制标题（中文）'],
    ['.copy-body-cn-btn',  '复制正文（中文）'],
    ['.copy-title-en-btn', 'Copy Title (EN)'],
    ['.copy-body-en-btn',  'Copy Body (EN)'],
  ].forEach(([sel, label]) => {
    const btn = document.querySelector(sel);
    if (btn) { btn.textContent = label; btn.classList.remove('copied'); }
  });
}

function copyField(field) {
  const text = topics[current][field];
  const labelMap = {
    title_cn: '复制标题（中文）',
    body_cn:  '复制正文（中文）',
    title_en: 'Copy Title (EN)',
    body_en:  'Copy Body (EN)',
  };
  const selMap = {
    title_cn: '.copy-title-cn-btn',
    body_cn:  '.copy-body-cn-btn',
    title_en: '.copy-title-en-btn',
    body_en:  '.copy-body-en-btn',
  };
  const btn = document.querySelector(selMap[field]);
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = labelMap[field];
      btn.classList.remove('copied');
    }, 1500);
  });
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft')           navigate(-1);
  if (e.key === 'ArrowRight')          navigate(1);
  if (e.key === '1')                   copyField('title_cn');
  if (e.key === '2')                   copyField('body_cn');
  if (e.key.toLowerCase() === 't')     copyField('title_en');
  if (e.key.toLowerCase() === 'b')     copyField('body_en');
});

render();
</script>
</body>
