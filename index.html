<script>
const topics = [
  { ticker: "TSLA", title_cn: "特斯拉飙涨6.7%重返$400上方，站稳后这仓该怎么交易？", body_cn: "特斯拉（TSLA）今日飙涨6.69%、重回$420，强势收复昨日失守的$400关口，\"股价skyrocket\"成为市场焦点。反弹背景是纳指与道指同步走高（道指首破53,000）、科技股情绪整体回暖，资金重新拥抱高beta龙头；但媒体也点出\"BYD的胜利给特斯拉带来隐性警告\"，全球电动车竞争的压力未消。$400既是刚收复的多空分水岭，也是回调时的第一道支撑。站上$400的特斯拉，你会突破追多、等回踩$400确认再进，还是趁反弹先了结？", title_en: "Tesla Surges 6.7%, Reclaims $400 — How Should You Trade This Position?", body_en: "Tesla (TSLA) soared 6.69% to $420, decisively reclaiming the $400 level lost in the prior session. The rebound was fueled by broad tech strength — the Dow broke 53,000 for the first time — as capital rotated back into high-beta leaders. However, media flagged BYD's gains as a silent warning for Tesla, with global EV competition pressure unresolved. With $400 now acting as the key bull-bear line and first support on any pullback, would you chase the breakout, wait for a retest of $400 to confirm, or trim into the rally?" },
  { ticker: "AMD", title_cn: "AMD大涨6.6%冲击万亿俱乐部，高盛上调目标价，还能上车吗？", body_cn: "AMD今日大涨6.61%、站上$552，领跑半导体反弹，直接催化是高盛（Goldman Sachs）上调AMD与泰瑞达（TER）目标价，卖方持续背书。市场同步热议\"AMD能否在2026年结束前跻身万亿美元俱乐部\"，叠加道指破53,000、纳指反弹的强劲科技动能，AMD成为资金轮动的首选。上半年跑赢英伟达的强势叙事仍在延续。当高盛加持遇上万亿想象空间，AMD这波6.6%放量反弹是新一轮主升浪起点，还是短线情绪透支？", title_en: "AMD Surges 6.6% Toward $1T Club as Goldman Raises Target — Still Time to Buy?", body_en: "AMD surged 6.61% to $552, leading the semiconductor rebound after Goldman Sachs raised price targets on both AMD and Teradyne (TER), reinforcing sell-side conviction. Market debate intensified around whether AMD can join the trillion-dollar club before end of 2026, with the Dow's 53,000 breakout and Nasdaq rebound amplifying momentum. AMD's narrative of outperforming Nvidia year-to-date remains intact. With Goldman's backing meeting trillion-dollar ambitions, is AMD's 6.6% high-volume surge the start of a new leg higher, or a short-term sentiment overshoot?" },
  { ticker: "SOXL", title_cn: "三倍半导体SOXL反弹7.3%，半导体V型修复，杠杆过山车还能追吗？", body_cn: "三倍做多半导体ETF（SOXL）今日反弹7.26%、冲上$194，追随半导体板块的V型修复，成为昨日暴跌后的强势反抽。板块催化来自三星财报前夕的半导体走强、SK海力士美股上市在即。但SeekingAlpha持续警示杠杆半导体基金\"在借来的时间里生存\"，3倍杠杆的衰减损耗在震荡中被放大，绝非长持工具。当板块情绪修复推动SOXL单日反弹逾7%，这波急拉是抄底良机，还是杠杆资金的又一次冲动？", title_en: "3x Leveraged SOXL Rebounds 7.3% in Semiconductor V-Shape Recovery — Still Chaseable?", body_en: "The Direxion 3x Leveraged Semiconductor ETF (SOXL) rebounded 7.26% to $194, tracking the semiconductor sector's sharp V-shaped recovery following the prior session's steep selloff. Catalysts included pre-earnings strength in Samsung and the imminent U.S. listing of SK Hynix. However, Seeking Alpha continues to warn that leveraged semiconductor funds are \"living on borrowed time\" — 3x decay is amplified in volatile markets, making SOXL unsuitable for long-term holding. With the sector's sentiment recovery driving a 7%-plus single-day spike, is this a genuine dip-buying opportunity, or another impulsive surge by leveraged traders?" },
  { ticker: "DRAM", title_cn: "内存ETF DRAM涨6.8%，\"AI内存瓶颈见顶\"发酵，超级周期还在加速？", body_cn: "内存ETF（DRAM）今日上涨6.81%、回到$64，随存储板块整体反弹。核心催化是SeekingAlpha的重磅判断——\"AI内存瓶颈正在见顶（Buckle Up As The AI Memory Bottleneck Peaks）\"，暗示DRAM/HBM的结构性紧缺进入最关键阶段。对冲基金Appaloosa（Tepper）靠精准押注内存芯片，上半年大赚32%，更给这轮内存超级周期添了实锤注脚。但该ETF此前曾单日暴跌25%，波动剧烈。当AI内存紧缺叙事再度升温，你会押注内存超级周期延续，还是提防拥挤交易的回撤？", title_en: "Memory ETF DRAM Gains 6.8% as 'AI Memory Bottleneck Peak' Narrative Builds — Is the Super-Cycle Still Accelerating?", body_en: "The Memory ETF (DRAM) rose 6.81% to $64, rallying alongside the broader storage sector. The core catalyst was a high-profile Seeking Alpha thesis — \"Buckle Up As The AI Memory Bottleneck Peaks\" — signaling the most critical phase of structural DRAM/HBM scarcity. Hedge fund Appaloosa (Tepper) added credibility to the memory super-cycle narrative after booking a 32% gain in H1 through targeted memory chip bets. The ETF, however, has previously suffered a single-day drop of 25%. As the AI memory scarcity story resurfaces, would you bet on the super-cycle continuing, or guard against a crowded-trade unwind?" },
  { ticker: "MRVL", title_cn: "Marvell涨势重启，\"悄悄追赶博通AI金矿\"，华尔街终于醒了？", body_cn: "Marvell（MRVL）今日上涨1.62%、回到$249，与NXP半导体同步走强。市场叙事转向积极：媒体称\"Marvell正悄悄追赶博通的AI金矿，华尔街终于开始重视\"，定制AI芯片与光互连（Active Electrical Cable）的成长逻辑获重新定价。相较昨日近10%的杀跌，今日企稳反弹显示卖方前期上调目标价的判断正被验证。当定制芯片赛道被拿来对标博通的估值空间，Marvell这轮修复是价值重估的开始，还是板块普涨下的beta跟随？", title_en: "Marvell Rebounds as 'Quietly Chasing Broadcom's AI Gold Mine' — Has Wall Street Finally Woken Up?", body_en: "Marvell (MRVL) rose 1.62% to $249, recovering alongside NXP Semiconductors. Market narrative turned constructive, with media noting that \"Marvell is quietly chasing Broadcom's AI gold mine as Wall Street finally takes notice\" — repricing the growth thesis around custom AI chips and Active Electrical Cable optical interconnects. The stabilization follows a near-10% selloff the prior session, appearing to validate earlier sell-side price target upgrades. As the custom chip race is increasingly benchmarked against Broadcom's valuation ceiling, is Marvell's recovery the start of a genuine re-rating, or merely beta-driven upside from a broad sector rally?" },
  { ticker: "MSFT", title_cn: "微软逆势跌1%，再砍4800岗位喂养AI，这笔账划算吗？", body_cn: "微软（MSFT）今日逆大盘微跌0.96%、回落至$387，在科技普涨日显得格外落寞。消息面聚焦成本重构：微软再裁4800人（含Xbox部门3200岗）\"以喂养AI机器\"，市场质疑其把资源持续向AI资本开支倾斜的回报兑现节奏。同时Anthropic在澳洲220亿美元AI云招标的动向，也牵动Azure的竞争格局。当巨头一边裁员、一边加码AI烧钱，微软这种\"节流换算力\"的打法，你认为是长期正确，还是短期盈利承压的信号？", title_en: "Microsoft Slips 1% Against the Market, Cuts 4,800 Jobs to Feed AI — Is the Trade-Off Worth It?", body_en: "Microsoft (MSFT) fell 0.96% to $387, an outlier on a broadly positive day for tech. The focus was on cost restructuring: Microsoft announced another 4,800 layoffs — including 3,200 from Xbox — described as \"feeding the AI machine,\" raising questions about the pace at which heavy AI capex will translate into returns. Meanwhile, Anthropic's involvement in a A$22 billion Australian AI cloud tender adds a competitive overhang for Azure. As the tech giant simultaneously cuts headcount and accelerates AI spending, is Microsoft's \"cut costs to fund compute\" strategy a long-term winning formula, or a near-term earnings pressure signal?" },
  { ticker: "META", title_cn: "Meta涨3%进军Neocloud，capex 2027将激增，算力野心太大了吗？", body_cn: "Meta（META）今日上涨2.98%、回升至$600，重新站上关键关口。催化来自算力战略升级：Meta正式进入Neocloud（新型云）业务，SemiAnalysis更预计其资本开支将在2027年激增，直指自建AI算力的长期野心。分析师安抚市场称对CoreWeave等云厂商的冲击有限，此前的\"Meta抛售恐慌\"被指是误读。但市值与估值之争仍在（是bargain还是value trap）。当Meta把算力自主权攥在手里，激增的capex是护城河投资，还是又一轮烧钱赌局？", title_en: "Meta Rises 3%, Enters Neocloud, Capex Set to Surge in 2027 — Is the Compute Ambition Overreach?", body_en: "Meta (META) gained 2.98% to $600, reclaiming a key technical level. The catalyst was a strategic compute escalation: Meta formally entered the neocloud business, with SemiAnalysis projecting a sharp capex surge in 2027 as it pursues long-term AI infrastructure self-sufficiency. Analysts moved to reassure markets that the impact on CoreWeave and other cloud providers would be limited, calling the earlier \"Meta selloff panic\" a misread. The valuation debate — bargain versus value trap — persists. As Meta tightens its grip on compute sovereignty, is the surging capex a durable moat investment, or another high-stakes bet with uncertain returns?" },
  { ticker: "NBIS", title_cn: "Nebius逆势跌1.2%，半年已暴涨124%，Meta恐慌是错杀吗？", body_cn: "Nebius（NBIS）今日微跌1.21%、报$213，但拉长看半年已暴涨124%，是AI算力（neocloud）赛道最猛的标的之一。当前分歧巨大：SeekingAlpha连发两文看多，称\"Meta抛售引发的下跌是重大误读\"、\"正在买入Meta算力恐慌\"，认为对neocloud的担忧\"站不住脚（erroneous）\"。多头逻辑是AI算力需求的结构性紧缺，空头则担心高涨幅后的估值透支。当暴涨124%遇上Meta自建算力的竞争疑云，Nebius的回调是黄金上车点，还是趋势见顶的前兆？", title_en: "Nebius Slips 1.2% After 124% Six-Month Rally — Was the Meta Panic a Mispricing?", body_en: "Nebius (NBIS) edged down 1.21% to $213, though the stock has surged 124% over the past six months, making it one of the strongest performers in the AI compute neocloud space. Sentiment is sharply divided: Seeking Alpha published two consecutive bullish pieces arguing that \"the Meta-driven selloff was a major misread\" and that concerns over neocloud demand are \"erroneous.\" Bulls cite structural AI compute scarcity; bears point to valuation risk after a 124% run. With a massive gain now colliding with competitive fears around Meta's self-build strategy, is Nebius's pullback a prime entry point, or an early signal that the trend is peaking?" },
  { ticker: "RKLB", title_cn: "火箭实验室重挫7.3%，太空股集体回调，赛道降温了吗？", body_cn: "火箭实验室（RKLB）今日大跌7.34%、跌至$93，领跌太空板块——AST SpaceMobile跌5%、Intuitive Machines与SpaceX概念也回落3%，太空股集体降温。此前太空赛道因SpaceX合并传闻、星链商业化等题材连续走高，今日在科技普涨日反而逆势回撤，更像前期涨幅过大后的获利了结。板块缺乏新的正向催化。当科技股全线反弹、太空股却独自杀跌，RKLB这波7%回调是题材退潮的开始，还是高波动赛道的正常洗盘？", title_en: "Rocket Lab Plunges 7.3%, Space Stocks Retreat Broadly — Is the Sector Cooling Off?", body_en: "Rocket Lab (RKLB) tumbled 7.34% to $93, leading a broad pullback across space equities — AST SpaceMobile fell 5%, while Intuitive Machines and SpaceX-linked names declined roughly 3%. The sector had rallied sharply on SpaceX merger speculation and Starlink commercialization narratives, making today's reversal on an otherwise strong tape look more like profit-taking after an extended run. No fresh positive catalysts emerged for the sector. With tech stocks broadly higher while space names sold off in isolation, is RKLB's 7% drop the beginning of a theme unwind, or routine consolidation in a high-volatility sector?" },
  { ticker: "PLTR", title_cn: "Palantir六连阳累涨23%站上$132，携手英伟达做主权AI，还追得动吗？", body_cn: "Palantir（PLTR）今日再涨2.51%、站上$132，自6月底$107低点以来已连收6根阳线、累计反弹逾23%，是本轮AI软件反攻最猛的标的之一。持续催化来自与英伟达联手为美国政府部署\"主权AI（Sovereign AI）\"的重磅合作，强化政府订单护城河，媒体称\"Palantir的AI估值难题可能终于开始缓解\"。但连涨6天后短线情绪已高度乐观，且\"以现金流看被低估、以盈利看被高估\"的估值争议未消。六连阳后的Palantir，你会继续追这波强势，还是提防高位获利回吐？", title_en: "Palantir 6-Day Win Streak, Up 23% to $132 on Nvidia Sovereign AI Deal — Can You Still Chase It?", body_en: "Palantir (PLTR) advanced another 2.51% to $132, extending its winning streak to six consecutive sessions and cumulative gains of over 23% from its late-June low of $107, making it the standout AI software name of this rally. The sustained catalyst is a high-profile partnership with Nvidia to deploy \"Sovereign AI\" infrastructure for the U.S. government, deepening its public-sector moat — with media suggesting \"Palantir's AI valuation puzzle may finally be easing.\" However, short-term sentiment is now highly stretched, and the valuation debate — undervalued on cash flow, overvalued on earnings — remains unresolved. After six straight gains, would you continue chasing the momentum, or position defensively against profit-taking at elevated levels?" },
  { ticker: "SPY", title_cn: "标普SPY涨0.9%，道指首破53000，8800点target来了还是要先跌？", body_cn: "标普500 ETF（SPY）今日上涨0.87%、报$751，纳指与标普齐创新高，道指首度突破53,000点，行情由英伟达领衔的科技股强劲反弹支撑。但顶级卖方观点分歧极大：有华尔街策略师喊出\"标普今年或冲8,800点\"，同时警告\"途中可能先来一波10-20%回撤\"；更有SeekingAlpha极端预测\"9月见顶7,800、2029年崩到4,400\"。当创纪录新高遇上愈发响亮的回调警报，你会在道指破53,000时继续追高，还是开始为10-20%的回撤留出仓位？", title_en: "SPY Rises 0.9%, Dow Tops 53,000 for First Time — Is an 8,800 Target Next, or a Dip First?", body_en: "The S&P 500 ETF (SPY) gained 0.87% to $751, with both the Nasdaq and S&P 500 hitting fresh all-time highs as the Dow crossed 53,000 for the first time, driven by a strong rebound in tech led by Nvidia. Sell-side views are sharply polarized: one Wall Street strategist targets S&P 8,800 for the year but warns of a potential 10–20% correction en route, while a more extreme Seeking Alpha forecast calls for a peak at 7,800 in September and a collapse to 4,400 by 2029. With record highs colliding with increasingly loud pullback warnings, would you continue adding exposure at Dow 53,000, or begin building a buffer for a 10–20% drawdown?" },
  { ticker: "INTC", title_cn: "英特尔涨1.5%，但半导体明星ETF\"拒绝持有它\"，掉队焦虑何解？", body_cn: "英特尔（INTC）今日上涨1.54%、报$122，随半导体板块反弹小幅收红。但一则反差叙事刺痛市场：一只年内大涨54%的明星半导体ETF\"拒绝持有英特尔\"，凸显其在AI芯片浪潮中被机构边缘化的处境；同时其投资的AI芯片公司Syntiant递交IPO，成为为数不多的亮点。当同行乘AI东风狂奔、英特尔却被主动剔除出赢家名单，这1.5%的跟涨是困境反转的萌芽，还是板块普涨下的被动跟随？", title_en: "Intel Gains 1.5%, But a Top Semiconductor ETF 'Refuses to Own It' — Can It Escape Its Laggard Status?", body_en: "Intel (INTC) rose 1.54% to $122, posting a modest gain alongside the semiconductor sector rebound. Yet a striking contrast overshadowed the move: a star semiconductor ETF up 54% year-to-date has explicitly excluded Intel from its holdings, underscoring the company's institutional marginalization amid the AI chip wave. One rare bright spot: Intel-backed AI chip startup Syntiant filed for an IPO. As peers ride the AI tailwind to new highs while Intel is actively removed from winning portfolios, is today's 1.5% gain an early sign of a turnaround, or simply passive beta-tracking in a rising sector?" },
];
let current = 0;

function render() {
  if (!topics.length) return;
  const t = topics[current];
  document.getElementById('tickerTag').textContent = t.ticker || 'TOPIC';
  document.getElementById('titleCn').textContent   = t.title_cn;
  document.getElementById('bodyCn').textContent    = t.body_cn;
  document.getElementById('titleEn').textContent   = t.title_en;
  document.getElementById('bodyEn').textContent    = t.body_en;
  document.getElementById('progressText').textContent = (current+1) + ' / ' + topics.length;
  document.getElementById('progressBar').style.width  = ((current+1)/topics.length*100) + '%';
  document.getElementById('prevBtn').disabled = current === 0;
  document.getElementById('nextBtn').disabled = current === topics.length - 1;
  document.getElementById('doneBanner').style.display = 'none';
  document.getElementById('card').style.display = '';
  resetBtns();
}

function navigate(dir) {
  const next = current + dir;
  if (next >= 0 && next < topics.length) { current = next; render(); }
  else if (dir === 1 && current === topics.length - 1) {
    document.getElementById('doneBanner').style.display = 'block';
    document.getElementById('card').style.display = 'none';
  }
}

function resetBtns() {
  [
    ['.copy-title-cn-btn', '复制标题（中文）'],
    ['.copy-body-cn-btn',  '复制正文（中文）'],
    ['.copy-title-en-btn', 'Copy Title (EN)'],
    ['.copy-body-en-btn',  'Copy Body (EN)'],
  ].forEach(([sel, label]) => {
    const btn = document.querySelector(sel);
    if (btn) { btn.textContent = label; btn.classList.remove('copied'); }
  });
}

function copyField(field) {
  const text = topics[current][field];
  const labelMap = {
    title_cn: '复制标题（中文）',
    body_cn:  '复制正文（中文）',
    title_en: 'Copy Title (EN)',
    body_en:  'Copy Body (EN)',
  };
  const selMap = {
    title_cn: '.copy-title-cn-btn',
    body_cn:  '.copy-body-cn-btn',
    title_en: '.copy-title-en-btn',
    body_en:  '.copy-body-en-btn',
  };
  const btn = document.querySelector(selMap[field]);
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = labelMap[field];
      btn.classList.remove('copied');
    }, 1500);
  });
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft')           navigate(-1);
  if (e.key === 'ArrowRight')          navigate(1);
  if (e.key === '1')                   copyField('title_cn');
  if (e.key === '2')                   copyField('body_cn');
  if (e.key.toLowerCase() === 't')     copyField('title_en');
  if (e.key.toLowerCase() === 'b')     copyField('body_en');
});

render();
</script>
</body>
</html>
