<script>
const topics = [
  { ticker: "NFLX", title_cn: "奈飞财报后续跌7.3%，一年腰斩近50%，抄底时机还是价值陷阱？", body_cn: "奈飞（NFLX）上周五续跌7.26%、报$69，延续财报后的抛售，过去一年已近乎腰斩、跌约50%。市场争论其下跌\"真正的原因\"——用户增长见顶、内容成本高企的结构性隐忧盖过了短期业绩。有意思的是消息面：奈飞斥$5.87亿收购本·阿弗莱克的AI电影初创，财报后的抛售也被解读为它此前竞购华纳兄弟、Roku的动机所在。SeekingAlpha则逆势\"上调\"评级、称市场\"给的尊重不够\"。当深跌近50%遇上分歧极大的多空观点，奈飞是错杀的抄底良机，还是增长见顶的价值陷阱？", title_en: "Netflix Extends Post-Earnings Slide 7.3%, Down ~50% YoY — Dip Buy or Value Trap?", body_en: "Netflix (NFLX) fell 7.26% Friday to $69, extending post-earnings selling as shares have lost roughly 50% over the past year. Structural concerns — plateauing subscriber growth and elevated content costs — continue to overshadow near-term results. Netflix also acquired Ben Affleck's AI film startup for $587M, while Seeking Alpha bucked the trend with an upgrade, arguing the market is giving NFLX insufficient credit. With shares down nearly 50% amid sharply divided bulls and bears, is Netflix a mispriced buying opportunity or a growth-ceiling value trap?" },
  { ticker: "GOOG", title_cn: "谷歌跌2.2%、Gemini 3.5 Pro难产，财报前夜AI领头羊掉队了吗？", body_cn: "Alphabet（GOOG）上周五下跌2.17%、报$346，在周三盘后财报前走弱。压制来自AI进度担忧——\"Gemini 3.5 Pro延迟发布、股价随之下滑，这位AI领头羊是否正在掉队？\"叠加大盘对AI资本开支回报的整体质疑。作为周三盘后与特斯拉同晚发财报的Mag 7巨头，谷歌的云增长、广告韧性与AI变现节奏将成焦点。当模型进度落后遇上财报大考，谷歌这波回调是财报前的谨慎定价，还是AI竞赛地位真的松动？", title_en: "Alphabet Drops 2.2%, Gemini 3.5 Pro Delayed — Is the AI Leader Falling Behind?", body_en: "Alphabet (GOOG) fell 2.17% Friday to $346, weakening ahead of its Wednesday after-hours earnings report. The decline reflects growing concerns over AI execution — Gemini 3.5 Pro's delayed launch rattled sentiment — compounded by broader market skepticism over AI capex returns. As a Mag 7 heavyweight reporting alongside Tesla on Wednesday, Google's cloud growth, advertising resilience, and AI monetization pace will be closely scrutinized. With model delays colliding with a high-stakes earnings test, is this pullback cautious pre-earnings pricing or a genuine loss of standing in the AI race?" },
  { ticker: "TSLA", title_cn: "特斯拉跌2.6%，周三盘后财报大考，\"最后的创始人巨头\"还能买吗？", body_cn: "特斯拉（TSLA）上周五下跌2.61%、报$381，在周三盘后Q2财报前承压。市场情绪谨慎——媒体热议\"马斯克的特斯拉仍是最后几家伟大的创始人主导科技巨头之一，7月22日财报前该买吗\"，同时奔驰新款CLA 250 Plus直接对标Model 3，竞争压力再添话题。作为本周与谷歌同晚开考的Mag 7重头，交付、利润率与自动驾驶进展将定调。当创始人光环撞上竞争加剧与财报大考，特斯拉这波回调你会财报前埋伏，还是等靴子落地？", title_en: "Tesla Drops 2.6% Ahead of Wednesday Earnings — Still Worth Buying?", body_en: "Tesla (TSLA) fell 2.61% Friday to $381, under pressure ahead of its Q2 earnings report after Wednesday's close. Market sentiment is cautious — debate swirls over whether Tesla, as one of the last great founder-led tech giants, is worth buying before the July 22 print — while Mercedes-Benz's new CLA 250 Plus targeting the Model 3 adds to competitive concerns. Reporting the same night as Alphabet, delivery figures, margins, and autonomous driving progress will set the tone. With founder mystique colliding with intensifying competition and an imminent earnings test, will you position ahead of results or wait for the dust to settle?" },
  { ticker: "SNDK, MU, SKHY", title_cn: "存储陷熊市：美光较高点跌30%，但闪迪年内仍涨580%，谁看得懂？", body_cn: "存储板块上周五继续分化下探。SanDisk（SNDK）跌3.99%、美光（MU）微跌0.50%、海力士（SKHY）逆势微涨1.13%。剧烈反差引发热议：内存芯片\"正式跌入熊市\"，美光已较高点回落30%——即便AI需求仍在爆发；但另一边，SNDK年内仍暴涨580%、被喊\"仍是尖叫式买入\"，美光也因强劲Q3业绩与上调指引获看多。SeekingAlpha还提示海力士\"HBM顺风强劲、但要留意ADR溢价与周期\"。当\"熊市\"与\"仍涨580%\"两种叙事并存，存储的剧烈波动里，你更信超级周期还是周期见顶？", title_en: "Memory Enters Bear Market: Micron -30% From Highs, Yet SanDisk Still +580% YTD — Make Sense of It?", body_en: "The memory sector continued to diverge Friday: SanDisk (SNDK) fell 3.99%, Micron (MU) slipped 0.50%, while SK Hynix (SKHY) edged up 1.13%. The contrast is stark — memory chips have \"officially entered a bear market\" with Micron down 30% from its peak despite surging AI demand, yet SNDK remains up 580% YTD and is still being called a screaming buy, while Micron draws bulls on strong Q3 results and raised guidance. Seeking Alpha also flags Hynix's strong HBM tailwinds but warns on ADR premium and cyclicality. With \"bear market\" and \"+580% YTD\" narratives coexisting, do you trust the AI supercycle or a cycle peak?" },
  { ticker: "NVDA", title_cn: "英伟达跌2.2%，中国AI突破引芯片抛售，超级周期叙事动摇了吗？", body_cn: "英伟达（NVDA）上周五下跌2.21%、报$203，随半导体板块回调。近期一条主线是\"中国的AI突破（Kimi等）触发了半导体抛售\"，市场担忧算力需求格局生变；同时投资者在AI财报超级周前对高估值科技整体谨慎。不过多头视角未变——有观点称\"TSMC的AI超级周期只是更强了\"，龙头的长期逻辑仍受追捧。当中国AI突破的扰动撞上财报周的观望情绪，英伟达这波回调是叙事动摇，还是超级周期中的高波动洗盘？", title_en: "Nvidia Falls 2.2% as China AI Breakthroughs Spark Chip Selloff — Is the Supercycle Narrative Cracking?", body_en: "Nvidia (NVDA) fell 2.21% Friday to $203, retreating alongside the broader semiconductor sector. A key narrative driver: China's AI breakthroughs — including Kimi — triggered chip selling on fears of a shifting compute demand landscape, while investors broadly trimmed high-valuation tech exposure ahead of AI earnings season. Bulls remain unfazed, however, with some arguing TSMC's AI supercycle is only accelerating and that the long-term thesis for sector leaders remains intact. With China AI disruption colliding with pre-earnings caution, is this pullback a crack in the supercycle narrative or routine volatility within a secular upcycle?" },
  { ticker: "MSFT", title_cn: "微软跌1.8%但财报被看好\"重回$500\"，云评论成关键，怎么押？", body_cn: "微软（MSFT）上周五下跌1.82%、报$394，随科技股回调，但财报预期偏乐观。SeekingAlpha连发看多——\"微软财报应会改变叙事、把股价送回$500上方\"，并点明\"最关键的是这一条云业务评论\"。作为AI capex最重的巨头，Azure增长与AI变现节奏是市场检验\"烧钱能否转化为回报\"的关键样本。当大盘质疑AI资本开支回报、而微软财报被寄望扭转叙事，你会在财报前布局微软，还是等云增长数据落地？", title_en: "Microsoft Slips 1.8% but Earnings Seen Pushing Stock Back to $500 — How Do You Play It?", body_en: "Microsoft (MSFT) fell 1.82% Friday to $394, dragged lower by the broader tech selloff, though earnings expectations remain constructive. Seeking Alpha published multiple bullish calls, arguing Microsoft's upcoming report \"should change the narrative and send the stock back above $500,\" pinpointing a single cloud business commentary as the make-or-break data point. As the heaviest AI capex spender in Big Tech, Azure growth and AI monetization pace will be the key test of whether massive spending is translating into returns. With the market questioning AI capex ROI and Microsoft expected to shift sentiment, will you position ahead of earnings or wait for the cloud numbers?" },
  { ticker: "AAPL", title_cn: "苹果历史高位微涨0.1%，HSBC称还能更高，高位还追得动吗？", body_cn: "苹果（AAPL）上周五微涨0.14%、报$334，在科技普跌中守住历史高位、继续扮演避风港。多头再获背书——苹果刚创新高，HSBC认为\"它还能爬得更高\"；市场也在问\"历史新高的苹果还是买入良机吗\"。此外苹果对阿里的AI合作被称\"最大的AI背书\"，其AI布局的外溢效应受关注。当避险买盘把苹果推上历史高位、卖方还看更高，你会在高位继续追，还是担心缺乏新催化的拥挤抱团？", title_en: "Apple Holds All-Time High, Up 0.1% — HSBC Says It Can Go Higher, But Can You Still Chase It?", body_en: "Apple (AAPL) edged up 0.14% Friday to $334, holding its all-time high as a safe-haven amid broad tech weakness. Bulls received fresh validation — HSBC believes the stock \"can climb even higher\" after its record close — while Apple's AI partnership with Alibaba is being called its \"biggest AI endorsement,\" drawing attention to the broader implications of its AI strategy. The market is also asking whether Apple at all-time highs still represents a buying opportunity. With defensive inflows pushing Apple to record levels and sell-side still bullish, will you chase the breakout or worry about a crowded trade with few near-term catalysts?" },
  { ticker: "SPCX", title_cn: "SpaceX再跌5.4%深陷破发，首份财报将至，破发盘能抄吗？", body_cn: "SpaceX（SPCX）上周五再跌5.43%、报$124，持续深陷破发（低于IPO发行价）。地缘扰动加剧——美伊冲突升级、油价跳涨压制风险偏好。市场焦点转向\"要不要在SpaceX首份财报前买$1000\"，但破发+新股情绪退潮让分歧巨大，甚至有观点\"宁可买高股息股也不碰SPCX\"。此前的合并想象与长期蓝图，短期压不住破发压力。当明星新股跌破发行价、首份财报又将至，SpaceX这波深跌是错杀，还是新股泡沫的持续挤压？", title_en: "SpaceX Sinks Another 5.4% Below IPO Price — Buy the Breakdown Before First Earnings?", body_en: "SpaceX (SPCX) tumbled another 5.43% Friday to $124, sinking deeper below its IPO issue price as post-listing enthusiasm continues to fade. Escalating U.S.-Iran tensions and an oil price spike further dampened risk appetite. Market debate is intensifying over whether to buy SPCX ahead of its first-ever earnings report, though the broken-IPO dynamic and fading new-issue sentiment have sharply divided opinion — some investors saying they'd rather own high-dividend stocks than touch SPCX. Early merger speculation and long-term vision have done little to offset near-term selling pressure. With a high-profile new issue trading below its IPO price and first earnings imminent, is this a mispriced opportunity or continued deflation of a new-issue premium?" },
  { ticker: "MRVL", title_cn: "Marvell微涨企稳，收购XConn获华尔街升温，\"内存墙\"受益者？", body_cn: "Marvell（MRVL）上周五微涨0.20%、报$189，在半导体普跌中相对企稳。个股叙事转暖——\"华尔街在其收购XConn后开始转向看好Marvell\"，并给出新的目标价；同时\"AI'内存墙'正变得更高，这3只股票将大赢\"把MRVL列为受益者。此前它因竞争与估值担忧深跌，如今并购与AI互连的成长逻辑重新被定价。当板块杀跌中出现个股企稳信号，Marvell是超跌反转的先行者，还是板块反弹前的短暂喘息？", title_en: "Marvell Steadies After XConn Deal Warms Wall Street — AI Memory Wall Beneficiary?", body_en: "Marvell (MRVL) edged up 0.20% Friday to $189, holding relatively firm amid a broad semiconductor selloff. Sentiment is turning — Wall Street is warming to Marvell following its acquisition of XConn, issuing fresh price target upgrades — while MRVL is also named among three key beneficiaries of the rising AI \"memory wall\" constraint. After a deep correction driven by competition and valuation concerns, the M&A and AI interconnect growth thesis is being repriced. With an individual stock stabilizing while the sector sells off, is Marvell a leading indicator of a broader reversal, or just a brief respite before the next leg down?" },
  { ticker: "RKLB", title_cn: "火箭实验室企稳微涨，新交易\"直指SpaceX\"，太空二当家稳了吗？", body_cn: "火箭实验室（RKLB）上周五微涨0.40%、报$68，在太空股普跌后企稳。个股催化在积累——\"火箭实验室最新的交易让它与SpaceX正面相撞\"，且公司在扩建发射基础设施以支持更高频次任务；UBS更预测太空经济到2040年TAM高达$1.3万亿。此前RKLB因赛道降温、SpaceX破发而深跌。当长期赛道空间与个股扩张叙事并存、股价开始企稳，RKLB这波是超跌后的筑底，还是太空题材反复中的又一次反弹？", title_en: "Rocket Lab Steadies With Gain of 0.4%, New Deal Targets SpaceX Head-On — Is the #2 Space Play Back?", body_en: "Rocket Lab (RKLB) edged up 0.40% Friday to $68, stabilizing after a broad selloff in space-related stocks. Catalysts are accumulating — its latest contract puts it in direct competition with SpaceX, and the company is expanding launch infrastructure to support higher mission frequency; UBS projects the space economy's total addressable market will reach $1.3 trillion by 2040. RKLB had sold off sharply amid sector cooling and SpaceX's broken IPO. With long-term TAM expansion and individual company growth narratives converging as the stock finds its footing, is this a genuine base-building after an oversold decline, or just another bounce in a volatile space theme?" },

let current = 0;

function render() {
  if (!topics.length) return;
  const t = topics[current];
  document.getElementById('tickerTag').textContent = t.ticker || 'TOPIC';
  document.getElementById('titleCn').textContent   = t.title_cn;
  document.getElementById('bodyCn').textContent    = t.body_cn;
  document.getElementById('titleEn').textContent   = t.title_en;
  document.getElementById('bodyEn').textContent    = t.body_en;
  document.getElementById('progressText').textContent = (current+1) + ' / ' + topics.length;
  document.getElementById('progressBar').style.width  = ((current+1)/topics.length*100) + '%';
  document.getElementById('prevBtn').disabled = current === 0;
  document.getElementById('nextBtn').disabled = current === topics.length - 1;
  document.getElementById('doneBanner').style.display = 'none';
  document.getElementById('card').style.display = '';
  resetBtns();
}

function navigate(dir) {
  const next = current + dir;
  if (next >= 0 && next < topics.length) { current = next; render(); }
  else if (dir === 1 && current === topics.length - 1) {
    document.getElementById('doneBanner').style.display = 'block';
    document.getElementById('card').style.display = 'none';
  }
}

function resetBtns() {
  [
    ['.copy-title-cn-btn', '复制标题（中文）'],
    ['.copy-body-cn-btn',  '复制正文（中文）'],
    ['.copy-title-en-btn', 'Copy Title (EN)'],
    ['.copy-body-en-btn',  'Copy Body (EN)'],
  ].forEach(([sel, label]) => {
    const btn = document.querySelector(sel);
    if (btn) { btn.textContent = label; btn.classList.remove('copied'); }
  });
}

function copyField(field) {
  const text = topics[current][field];
  const labelMap = {
    title_cn: '复制标题（中文）',
    body_cn:  '复制正文（中文）',
    title_en: 'Copy Title (EN)',
    body_en:  'Copy Body (EN)',
  };
  const selMap = {
    title_cn: '.copy-title-cn-btn',
    body_cn:  '.copy-body-cn-btn',
    title_en: '.copy-title-en-btn',
    body_en:  '.copy-body-en-btn',
  };
  const btn = document.querySelector(selMap[field]);
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = labelMap[field];
      btn.classList.remove('copied');
    }, 1500);
  });
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft')           navigate(-1);
  if (e.key === 'ArrowRight')          navigate(1);
  if (e.key === '1')                   copyField('title_cn');
  if (e.key === '2')                   copyField('body_cn');
  if (e.key.toLowerCase() === 't')     copyField('title_en');
  if (e.key.toLowerCase() === 'b')     copyField('body_en');
});

render();
</script>
