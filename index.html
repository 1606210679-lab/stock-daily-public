<script>
const topics = [
  { ticker: "MU", title_cn: "美光跌4.7%再失守$950，三星点燃AI担忧，内存回调到头没？", body_cn: "美光（MU）今日下跌4.71%、跌破$950，领跌内存板块，导火索是三星财报——尽管三星录得创纪录季度，市场却读出\"AI需求见顶\"的隐忧（Samsung fans AI fears），叠加伊朗局势推升油价，科技股集体承压。但MU此前给出的乐观业绩指引仍在。当板块情绪从超级周期狂热转向获利了结，美光这波回调是健康换手，还是内存拥挤交易降温的开始？", title_en: "Micron Falls 4.7%, Breaks $950 as Samsung Sparks AI Demand Fears — Is the Memory Selloff Over?", body_en: "Micron (MU) dropped 4.71%, breaking below $950 to lead the memory sector lower, after Samsung's record quarterly results paradoxically fueled concerns over peak AI demand. Rising oil prices from Iran tensions added pressure on tech broadly, though MU's previously issued upbeat guidance remains intact. As sector sentiment shifts from supercycle euphoria to profit-taking, is this a healthy rotation or the beginning of a broader memory unwind?" },
  { ticker: "SOXL", title_cn: "三倍半导体SOXL崩15%，三星抛售警示全球，杠杆多头被血洗？", body_cn: "三倍做多半导体ETF（SOXL）今日崩跌15.09%、跌至$165，是三星财报引发半导体全面抛售的最大放大器——Benzinga称\"三星抛售给美国投资者敲响警钟\"。与此同时，反向的三倍做空ETF（SOXS）今日暴涨15.11%，成为杀跌日里少数的赢家。3倍杠杆在单边下跌中加速衰减，SOXL两天内上演过山车。当半导体多头情绪急速逆转，你会抄底SOXL赌反弹，还是承认杠杆多头这轮已被血洗？", title_en: "3x Semiconductor ETF SOXL Crashes 15% — Are Leveraged Longs Getting Wiped Out?", body_en: "The 3x leveraged semiconductor ETF (SOXL) plunged 15.09% to $165, amplifying the broad chip selloff triggered by Samsung's earnings, with Benzinga warning the \"Samsung selloff is a wake-up call for U.S. investors.\" Inverse counterpart SOXS surged 15.11%, emerging as one of the session's rare winners. With 3x leverage accelerating decay in a one-sided decline and SOXL swinging wildly over two days, will you buy the dip betting on a rebound, or accept that leveraged longs have been washed out?" },
  { ticker: "SNDK", title_cn: "SanDisk跌7.3%，三星利润暴增反成导火索，新故事要被证伪？", body_cn: "SanDisk（SNDK）今日下跌7.26%、回落至$1,618，随内存板块杀跌。耐人寻味的是导火索——三星录得利润暴增的创纪录季度，却因供给增加的担忧触发整个存储板块抛售（西部数据同日跌8.5%）。媒体直指\"一个关键数字将考验SanDisk的新故事\"，SK海力士即将美股上市也让\"谁来买单\"的竞争疑云升温。当供给端好消息反成利空，SanDisk的超级周期叙事你还信几分？", title_en: "SanDisk Drops 7.3% as Samsung's Record Profit Triggers Selloff — Is the New Story Unraveling?", body_en: "SanDisk (SNDK) fell 7.26% to $1,618, swept lower alongside the broader memory sector. In a paradox, Samsung's record-profit quarter triggered a storage-wide selloff on supply-glut fears, with Western Digital also sliding 8.5% on the day. Media flagged \"one key number\" set to test SanDisk's new narrative, while SK Hynix's pending U.S. listing adds competitive uncertainty over who absorbs future supply. When positive supply-side news turns bearish, how much do you still believe in SanDisk's supercycle thesis?" },
  { ticker: "SPCX", title_cn: "SpaceX重挫6.8%失守$150，\"买了别看它\"，太空热还撑得住吗？", body_cn: "SpaceX（SPCX）今日重挫6.83%、失守$150，随科技股回调走弱。市场观点两极：有专家喊出\"SpaceX股价终将翻倍\"，却又建议\"买了就收起来别看它（Put it away, don't look at it）\"，暗示短期波动剧烈。消息面仍有催化：SpaceXAI计划最快周三发布新模型、并加速进入指数基金。当长期想象与短期剧震并存，SpaceX这波回调你会当上车机会，还是先躲开这波高波动？", title_en: "SpaceX Plunges 6.8%, Breaks $150 — Can the Space Rally Hold Up?", body_en: "SpaceX (SPCX) tumbled 6.83%, breaking below $150 as it pulled back with the broader tech selloff. Sentiment is sharply divided — one analyst predicts SpaceX's stock price will eventually double, yet advises investors to \"put it away, don't look at it,\" signaling extreme near-term volatility. Potential catalysts remain: SpaceXAI may launch a new model as early as Wednesday, and index fund inclusion is accelerating. With long-term upside and short-term turbulence colliding, is this dip a buying opportunity or a volatility trap to avoid?" },
  { ticker: "NVDA", title_cn: "英伟达逆势翻红0.7%，半导体血流成河它独扛，避险资金选它？", body_cn: "英伟达（NVDA）今日逆势微涨0.71%、站稳$196，在三星引发的半导体全面抛售中罕见抗跌，被列入\"3只仍有上行空间的强势股\"。当SOXL崩15%、AMD与英特尔重挫之际，资金反而向AI算力的绝对龙头集中避险，NVDA的相对强弱明显回升。生态护城河与稀缺性在恐慌日凸显定价权。当板块杀跌把英伟达衬托成\"最后的堡垒\"，你会把它当科技回调中的避风港加仓吗？", title_en: "Nvidia Defies Selloff, Gains 0.7% — Are Investors Parking Safe-Haven Capital in NVDA?", body_en: "Nvidia (NVDA) bucked the sector rout, rising 0.71% to hold $196 as a semiconductor-wide selloff triggered by Samsung's earnings hammered peers. Named among \"3 stocks still with upside,\" NVDA saw notable relative strength as capital fled high-beta chips and concentrated in the dominant AI compute leader, even as SOXL cratered 15% and AMD and Intel suffered steep losses. When panic selling frames Nvidia as \"the last fortress,\" will you add to positions and use the tech pullback as a shelter?" },
  { ticker: "INTC", title_cn: "英特尔暴跌9.7%领跌芯片股，三星+油价双杀，困境又加深？", body_cn: "英特尔（INTC）今日暴跌9.66%、跌破$111，是mega-cap芯片股杀跌的重灾区，直接背景是三星财报引爆的半导体抛售、叠加伊朗局势推升油价拖累风险资产，道指也因此结束连涨。英特尔本就在AI芯片浪潮中掉队，杀跌日向下弹性更大。当宏观利空与个股弱势叠加，英特尔这波近10%重挫是错杀反弹机会，还是掉队者被率先抛弃的信号？", title_en: "Intel Crashes 9.7% to Lead Chip Losses — Is the Turnaround Story Getting Worse?", body_en: "Intel (INTC) plunged 9.66%, breaking below $111 to become the hardest-hit mega-cap chipmaker, as Samsung's earnings ignited a semiconductor selloff compounded by rising oil prices from Iran tensions — pressuring risk assets broadly and ending the Dow's winning streak. Already lagging in the AI chip wave, Intel exhibited amplified downside on a risk-off day. With macro headwinds stacking on top of structural weakness, is Intel's near-10% drop a contrarian opportunity, or a signal that laggards get sold first?" },
  { ticker: "TSLA", title_cn: "特斯拉回落4%重新考验$400，昨日刚收复今又承压，支撑守得住吗？", body_cn: "特斯拉（TSLA）今日回落4.02%、退守$402附近，昨日刚强势收复的$400关口再度承压。今日下跌并非个股利空，而是全市场科技回调所致——\"Tesla dips more than broader market\"。消息面仍有想象：有银行基于潜在的SpaceX合并上调了TSLA目标价。$400成了这两天多空反复争夺的关键位。刚收复又回踩的特斯拉，$400这道支撑你认为守得住，还是会回补昨日的跳空？", title_en: "Tesla Retreats 4%, Tests $400 Again — Can the Key Support Level Hold?", body_en: "Tesla (TSLA) fell 4.02% to around $402, putting the $400 level back under pressure just one day after a strong reclaim of that key threshold. The decline was market-driven rather than stock-specific, as Tesla \"dipped more than the broader market\" amid a broad tech selloff. On the news front, at least one bank raised its TSLA price target on the potential for a SpaceX merger. With $400 becoming a fierce battleground over two sessions, do you think support holds, or will Tesla fill yesterday's gap up?" },
  { ticker: "QQQ", title_cn: "纳指QQQ挫1.9%，三星+油价+AI泡沫争议齐发，回调才刚开始？", body_cn: "纳指100 ETF（QQQ）今日下跌1.85%、跌至$709，科技股全面承压，道指更结束连涨记录。三重利空叠加：三星财报点燃\"AI需求见顶\"担忧、伊朗局势推升油价、SeekingAlpha再抛\"AI泡沫：好泡沫，坏交易\"的争议。半导体作为领跌板块拖累整体。当创纪录高点后利空集中释放，这轮回调是牛市中的正常换手，还是更大级别调整的前奏？", title_en: "QQQ Falls 1.9% as Samsung, Oil, and AI Bubble Fears Hit Simultaneously — Is This Just the Start?", body_en: "The Nasdaq 100 ETF (QQQ) dropped 1.85% to $709 as tech stocks faced broad pressure, with the Dow ending its winning streak. Three headwinds converged: Samsung's earnings reignited \"peak AI demand\" fears, Iran tensions drove oil prices higher, and SeekingAlpha renewed debate with \"AI Bubble: Good Bubble, Bad Trade.\" Semiconductors led losses across the board. After record highs followed by concentrated negative catalysts, is this pullback a healthy bull-market rotation, or the prelude to a larger correction?" },
  { ticker: "DRAM", title_cn: "内存ETF DRAM跌6.4%，\"AI内存繁荣开始裂缝\"，超级周期见顶了？", body_cn: "内存ETF（DRAM）今日下跌6.44%、回落至$60，随存储板块杀跌。SeekingAlpha一篇\"AI内存繁荣终于开始裂缝（The AI Memory Boom Is Finally Cracking）\"直击要害，叠加三星创纪录利润反引发供给担忧、西部数据同日跌8.5%。此前狂热的内存超级周期叙事首次遭遇像样的质疑。当\"紧缺\"逻辑被\"供给要来了\"的担忧动摇，你会趁回调布局内存，还是相信这轮超级周期已见顶？", title_en: "Memory ETF DRAM Drops 6.4% — Is the AI Memory Supercycle Topping Out?", body_en: "The memory ETF (DRAM) fell 6.44% to $60, tracking the broader storage sector selloff. A SeekingAlpha piece titled \"The AI Memory Boom Is Finally Cracking\" struck at the heart of the move, as Samsung's record profits paradoxically stoked supply-glut fears and Western Digital slid 8.5% on the same day. The previously unchallenged memory supercycle narrative is now facing its first serious test. With the \"scarcity\" thesis threatened by incoming supply, will you buy the dip in memory, or do you believe this supercycle has peaked?" },
  { ticker: "MSFT", title_cn: "微软逆势涨0.5%，软件股集体避险走强，杀跌日的诺亚方舟？", body_cn: "微软（MSFT）今日逆势微涨0.54%、报$389，在半导体血洗日显现防御价值，与之呼应的是一批SaaS软件股（HubSpot、Five9、RingCentral等）集体大涨——资金明显从高波动芯片撤向现金流稳定的软件巨头。微软被列入\"2026最值得买的软件股\"候选。当AI叙事从\"卖铲子\"的芯片转向\"用铲子\"的软件应用，微软这类软件龙头的避险属性能延续多久？", title_en: "Microsoft Gains 0.5% as Software Stocks Find Safe-Haven Bid — The Noah's Ark of a Down Day?", body_en: "Microsoft (MSFT) edged up 0.54% to $389, displaying defensive value amid the semiconductor rout, as a cohort of SaaS software stocks — including HubSpot, Five9, and RingCentral — rallied sharply in tandem. Capital visibly rotated out of high-volatility chips and into software giants with stable cash flows, with Microsoft named a top candidate for \"best software stock to buy in 2026.\" As the AI narrative shifts from \"selling shovels\" in chips to \"using shovels\" in software applications, how long can Microsoft's safe-haven appeal last?" },
  { ticker: "AMD", title_cn: "AMD暴跌6.5%，昨日冲万亿今日被打回，高盛又下调了？", body_cn: "AMD今日暴跌6.51%、跌回$516，几乎回吐前一日的全部涨幅——\"Why AMD Stock Tanked\"成为热议。背景是三星引发的半导体全面抛售，高盛（Goldman Sachs）也在此时重设了AMD年内目标价，为高位情绪降温。昨日\"冲击万亿俱乐部\"的狂热，今日被板块杀跌迅速证伪。当高beta芯片股两天上演冰火两重天，AMD这波回调是上车机会，还是追高者被套的教训？", title_en: "AMD Crashes 6.5% One Day After Trillion-Dollar Push — Did Goldman Just Cool the Rally?", body_en: "AMD plunged 6.51% to $516, erasing nearly all of the prior session's gains as \"Why AMD Stock Tanked\" dominated headlines. The backdrop was a semiconductor-wide selloff sparked by Samsung's earnings, while Goldman Sachs simultaneously reset its AMD price target for the year, tempering elevated expectations. The prior session's euphoria around AMD joining the trillion-dollar club was swiftly invalidated by sector-wide selling pressure. With a high-beta chip stock swinging from fire to ice in 48 hours, is AMD's pullback a re-entry point, or a lesson for chasers?" },

];
let current = 0;

function render() {
  if (!topics.length) return;
  const t = topics[current];
  document.getElementById('tickerTag').textContent = t.ticker || 'TOPIC';
  document.getElementById('titleCn').textContent   = t.title_cn;
  document.getElementById('bodyCn').textContent    = t.body_cn;
  document.getElementById('titleEn').textContent   = t.title_en;
  document.getElementById('bodyEn').textContent    = t.body_en;
  document.getElementById('progressText').textContent = (current+1) + ' / ' + topics.length;
  document.getElementById('progressBar').style.width  = ((current+1)/topics.length*100) + '%';
  document.getElementById('prevBtn').disabled = current === 0;
  document.getElementById('nextBtn').disabled = current === topics.length - 1;
  document.getElementById('doneBanner').style.display = 'none';
  document.getElementById('card').style.display = '';
  resetBtns();
}

function navigate(dir) {
  const next = current + dir;
  if (next >= 0 && next < topics.length) { current = next; render(); }
  else if (dir === 1 && current === topics.length - 1) {
    document.getElementById('doneBanner').style.display = 'block';
    document.getElementById('card').style.display = 'none';
  }
}

function resetBtns() {
  [
    ['.copy-title-cn-btn', '复制标题（中文）'],
    ['.copy-body-cn-btn',  '复制正文（中文）'],
    ['.copy-title-en-btn', 'Copy Title (EN)'],
    ['.copy-body-en-btn',  'Copy Body (EN)'],
  ].forEach(([sel, label]) => {
    const btn = document.querySelector(sel);
    if (btn) { btn.textContent = label; btn.classList.remove('copied'); }
  });
}

function copyField(field) {
  const text = topics[current][field];
  const labelMap = {
    title_cn: '复制标题（中文）',
    body_cn:  '复制正文（中文）',
    title_en: 'Copy Title (EN)',
    body_en:  'Copy Body (EN)',
  };
  const selMap = {
    title_cn: '.copy-title-cn-btn',
    body_cn:  '.copy-body-cn-btn',
    title_en: '.copy-title-en-btn',
    body_en:  '.copy-body-en-btn',
  };
  const btn = document.querySelector(selMap[field]);
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = labelMap[field];
      btn.classList.remove('copied');
    }, 1500);
  });
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft')           navigate(-1);
  if (e.key === 'ArrowRight')          navigate(1);
  if (e.key === '1')                   copyField('title_cn');
  if (e.key === '2')                   copyField('body_cn');
  if (e.key.toLowerCase() === 't')     copyField('title_en');
  if (e.key.toLowerCase() === 'b')     copyField('body_en');
});

render();
</script>
