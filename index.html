  { ticker: "NVDA", title_cn: "英伟达逆势涨2.3%，持股Nebius曝光、AI算力叙事再升温，还能追？", body_cn: "英伟达今日逆大盘涨2.30%至$212.06，监管文件披露其持有AI云商Nebius约9.3%股权，强化\"卖铲人\"卡位AI基础设施的叙事。同期市场热议某中国AI模型因过热暂停新用户，卖方认为算力需求最终仍利好英伟达。在科技巨头财报密集披露、板块分化加剧之际，英伟达的相对强势能否延续？", title_en: "Nvidia Gains 2.3% to $212.06 as Nebius Stake Surfaces — Still a Buy?", body_en: "Nvidia rose 2.30% to $212.06 against a weak tape after regulatory filings revealed an ~9.3% stake in AI cloud provider Nebius, reinforcing its infrastructure-picks-and-shovels narrative. Reports of a Chinese AI model suspending new users due to overload capacity further supported the view that compute demand ultimately benefits Nvidia. With Big Tech earnings accelerating and sector rotation intensifying, can Nvidia's relative strength hold?" },
  { ticker: "SKHY", title_cn: "SK海力士跌3.9%，传成英特尔俄亥俄晶圆厂运营候选，利好还是站队？", body_cn: "SK海力士今日跌3.88%至$165.27，随内存与半导体板块回调。据Semafor报道，英特尔正为俄亥俄晶圆厂寻找运营合作伙伴，SK海力士被列入候选名单，若落地将深化其在美制造布局。另有卖方以\"AI浪潮\"为其长期背书。在HBM高景气与地缘、代工站队交织下，这波回调是上车点还是风险信号？", title_en: "SK Hynix Drops 3.9% Amid Reports of Intel Ohio Fab Operator Role — Risk or Opportunity?", body_en: "SK Hynix fell 3.88% to $165.27 alongside a broader memory and semiconductor pullback. Semafor reported Intel is seeking an operating partner for its Ohio wafer fab, with SK Hynix named as a candidate — a move that would deepen its U.S. manufacturing footprint. Against a backdrop of strong HBM demand and intensifying geopolitical positioning, is this dip a buying opportunity or an early risk signal?" },
  { ticker: "TSLA", title_cn: "特斯拉财报后盘后跌4.3%，马斯克警告未来资本开支攀升，拐点已至？", body_cn: "特斯拉盘后跌4.30%至$357.93（日内收跌1.30%），财报后马斯克称未来2-3年资本开支将上升、并可接受\"资本效率略降\"，引发盈利端担忧。市场解读为AI与算力投入优先于短期利润率，这与谷歌财报\"capex高企\"形成共振。当增长故事让位于烧钱叙事，估值该如何重新锚定？", title_en: "Tesla Drops 4.3% After-Hours as Musk Warns of Rising Capex — Is the Inflection Here?", body_en: "Tesla slid 4.30% after hours to $357.93, having closed the regular session down 1.30%, after Musk signaled capital expenditures will increase over the next two to three years and that a \"modest decline in capital efficiency\" is acceptable. Markets interpreted this as AI and compute investment taking priority over near-term margins, echoing Google's own elevated-capex narrative. As growth stories give way to heavy-spending cycles, how should valuations be re-anchored?" },
  { ticker: "GOOG", title_cn: "谷歌云暴增82%仍被嫌弃，AI资本开支吓退买盘，该抄底吗？", body_cn: "谷歌今日收跌1.24%至$341.91，财报显示云业务同比大增82%，却因AI资本开支持续攀升令市场失望。CFO表示需求仍超过产能，暗示投入还将加码；皮查伊则回击\"谷歌在AI竞赛掉队\"的说法。当强劲基本面撞上开支忧虑，这轮回调是估值重置还是黄金坑？", title_en: "Google Cloud Surges 82% Yet Stock Falls — Is the AI Capex Selloff a Buying Opportunity?", body_en: "Alphabet closed down 1.24% to $341.91 despite reporting cloud revenue up 82% year-over-year, as markets focused on continued AI capital expenditure increases. CFO Ruth Porat noted demand still exceeds capacity, signaling further investment ahead, while CEO Sundar Pichai pushed back against claims Google is falling behind in the AI race. When strong fundamentals collide with spending concerns, is this pullback a valuation reset or a golden entry point?" },
  { ticker: "SMCI", title_cn: "超微电脑单日暴涨近20%，Q4订单创纪录、毛利意外超预期，反转来了？", body_cn: "超微电脑今日暴涨19.84%至$30.56，公司披露第四财季订单创纪录、并录得超预期的毛利率改善，一举扭转此前AI服务器价格战的悲观预期。作为英伟达GB系列的核心组装厂，订单回暖被视为AI服务器需求的前瞻信号。在经历财务风波与做空冲击后，这波放量拉升是趋势反转，还是又一次估值透支？", title_en: "Super Micro Surges Nearly 20% on Record Q4 Orders, Margin Beat — Is the Reversal Real?", body_en: "Super Micro Computer soared 19.84% to $30.56 after the company disclosed record fourth-quarter orders and a better-than-expected gross margin improvement, decisively reversing bearish sentiment tied to AI server price wars. As a core assembly partner for Nvidia's GB-series platforms, the order rebound is viewed as a leading indicator of AI server demand. After months of accounting controversy and short-seller pressure, is this high-volume surge a genuine trend reversal or another valuation overshoot?" },
  { ticker: "INTC", title_cn: "英特尔今晚盘后放榜，代工首获具名大客户，能否证明转型？", body_cn: "英特尔今日跌2.68%至$102.62，将于今晚美股盘后公布财报。财报前催化不断：新任CEO Lip-Bu Tan治下代工业务落地首个具名外部客户，消息刺激股价两日前一度大涨逾8%；另有报道称其正为俄亥俄晶圆厂寻找运营伙伴。市场焦点在代工进展与下季指引，今晚的数字能否兑现转型叙事？", title_en: "Intel Reports After the Bell — First Named Foundry Customer Secured, Can It Prove the Turnaround?", body_en: "Intel fell 2.68% to $102.62 ahead of its after-hours earnings release. Pre-report catalysts have been building: the company landed its first publicly named external foundry customer under new CEO Lip-Bu Tan, a development that briefly drove shares up more than 8% two days ago, while separate reports indicate Intel is also seeking an operating partner for its Ohio fab. With foundry progress and forward guidance as the key focal points, can tonight's numbers validate the transformation narrative?" },
  { ticker: "AMD", title_cn: "AMD签下Anthropic 50亿美元AI芯片大单，能撬动英伟达铁盘？", body_cn: "AMD今日涨1.45%至$552.33，宣布与Anthropic达成规模约50亿美元的AI芯片合作，为其MI系列加速卡再添重量级客户。该订单被视为AMD切入大模型训练与推理市场、挑战英伟达垄断的关键一步。在AI算力军备竞赛白热化之际，这笔大单能否成为AMD数据中心营收的新引擎？", title_en: "AMD Lands $5B Anthropic AI Chip Deal — Can It Crack Nvidia's Dominance?", body_en: "AMD rose 1.45% to $552.33 after announcing an approximately $5 billion AI chip partnership with Anthropic, adding a marquee customer to its MI-series accelerator lineup. The deal is seen as a pivotal step in AMD's push into large-model training and inference markets to challenge Nvidia's near-monopoly position. As the AI compute arms race intensifies, can this contract become a new engine for AMD's data center revenue growth?" },
  { ticker: "MSFT", title_cn: "微软回调1.9%，散户逆势抄底，AI开支忧虑下谁在坚守？", body_cn: "微软今日跌1.86%至$390.34，随谷歌财报引发的\"AI资本开支\"忧虑波及大盘科技股。不过有数据显示散户正逢跌买入微软，视其为AI变现确定性最高的巨头之一。在Azure与Copilot商业化预期支撑下，微软下周自身财报将成关键验证。当市场为AI烧钱定价，微软的防御属性还能撑多久？", title_en: "Microsoft Dips 1.9% as Retail Investors Buy the Dip — How Long Can Its Defensive Appeal Last?", body_en: "Microsoft fell 1.86% to $390.34 as Google's earnings-driven AI capex concerns rippled across large-cap tech. However, data indicates retail investors are buying the dip, viewing Microsoft as one of the highest-conviction AI monetization stories among mega-caps. With Azure and Copilot commercialization underpinning the outlook, Microsoft's own earnings next week will serve as a critical test. As markets reprice AI spending, how long can Microsoft's defensive premium hold?" },
  { ticker: "QQQ", title_cn: "纳指ETF科技财报周承压回落，巨头业绩能否顶住高估值？", body_cn: "纳指100 ETF（QQQ）今日微跌0.51%至$705.35，谷歌、特斯拉财报后科技股集体承压，标普与纳指连续收低。市场对AI资本开支不断攀升的担忧盖过了云业务的强劲增长，资金在巨头间轮动、分化加剧。随着微软、Meta等下周接力放榜，这轮财报季能否顶住高估值、维系新高动能？", title_en: "QQQ Slips 0.51% Under Tech Earnings Pressure — Can Mega-Caps Justify Elevated Valuations?", body_en: "The Nasdaq 100 ETF (QQQ) edged down 0.51% to $705.35 as Google and Tesla earnings weighed on broad tech sentiment, pushing both the S&P 500 and Nasdaq to consecutive lower closes. Concerns over rising AI capital expenditures overshadowed strong cloud growth figures, with rotation and divergence intensifying across mega-cap names. As Microsoft, Meta, and others report next week, can this earnings season sustain elevated valuations and maintain upside momentum?" },
  { ticker: "NOW", title_cn: "ServiceNow财报前重挫6%、盘后V型反弹5%，是错杀吗？", body_cn: "ServiceNow日内因财报前避险重挫6.47%至$95.46，盘后财报出炉后急拉4.87%至$100.11。二季度关键指标稳健、订阅增长兑现预期，扭转了盘前的悲观情绪。作为企业AI Agent落地的代表标的，其订阅与cRPO指引备受关注。盘后V型反转之后，这波\"错杀修复\"能否延续到日内交易？", title_en: "ServiceNow Plunges 6% Pre-Earnings, Then V-Shape Rebounds 5% After-Hours — Oversold?", body_en: "ServiceNow tumbled 6.47% intraday to $95.46 on pre-earnings risk aversion before surging 4.87% after hours to $100.11 following the release of solid second-quarter results, with subscription growth meeting expectations and reversing the day's pessimism. As a benchmark name for enterprise AI Agent deployment, its subscription revenue and cRPO guidance remain closely watched metrics. Can the after-hours V-shaped recovery extend into the next regular trading session?" },
  { ticker: "NBIS", title_cn: "英伟达持股背书、Baird看多启动覆盖，Nebius这波才刚起步？", body_cn: "Nebius今日微涨0.57%至$218.16，消息面持续升温：英伟达披露持有其约9.3%股权，Baird新启动看多覆盖，与CoreWeave同获华尔街买入评级。作为新兴AI云基础设施商，叠加谷歌CFO\"需求仍超产能\"的行业背书，算力租赁赛道景气延续。在龙头持股与卖方看多共振下，这轮AI infra行情是刚起步还是已透支？", title_en: "Nvidia Stake Revealed, Baird Initiates Buy on Nebius — Is This AI Infra Rally Just Getting Started?", body_en: "Nebius edged up 0.57% to $218.16 as positive catalysts accumulated: regulatory filings confirmed Nvidia holds an ~9.3% stake, and Baird initiated coverage with a buy rating, matching a similar call on CoreWeave. As an emerging AI cloud infrastructure provider, the stock also benefits from Google CFO commentary that industry demand continues to exceed supply capacity. With a top-tier strategic investor and fresh sell-side buy ratings converging, is this AI infrastructure rally just beginning or already priced in?" },
  { ticker: "PLTR", title_cn: "Palantir财报前重挫6%，高估值遇获利了结，还能上车吗？", body_cn: "Palantir今日跌6.10%至$124.57，财报披露前市场情绪转谨慎，高企的估值与前期涨幅引发获利了结。有报道称投资者担忧其增长能否匹配当前定价。作为AI应用端的明星标的，商业客户放量与政府订单是核心看点。在财报大考前的这波回调，是风险出清还是估值泡沫的预警？", title_en: "Palantir Plunges 6% Ahead of Earnings as Profit-Taking Hits High Valuation — Still a Buy?", body_en: "Palantir dropped 6.10% to $124.57 as markets turned cautious ahead of earnings, with elevated valuations and prior gains triggering profit-taking. Reports suggest investors are questioning whether growth can justify current pricing levels. As a flagship AI software application name, commercial client expansion and government contract momentum remain the key metrics to watch. Is this pre-earnings pullback a healthy clearing of risk, or an early warning sign of valuation excess?" },
];
let current = 0;

function render() {
  if (!topics.length) return;
  const t = topics[current];
  document.getElementById('tickerTag').textContent = t.ticker || 'TOPIC';
  document.getElementById('titleCn').textContent   = t.title_cn;
  document.getElementById('bodyCn').textContent    = t.body_cn;
  document.getElementById('titleEn').textContent   = t.title_en;
  document.getElementById('bodyEn').textContent    = t.body_en;
  document.getElementById('progressText').textContent = (current+1) + ' / ' + topics.length;
  document.getElementById('progressBar').style.width  = ((current+1)/topics.length*100) + '%';
  document.getElementById('prevBtn').disabled = current === 0;
  document.getElementById('nextBtn').disabled = current === topics.length - 1;
  document.getElementById('doneBanner').style.display = 'none';
  document.getElementById('card').style.display = '';
  resetBtns();
}

function navigate(dir) {
  const next = current + dir;
  if (next >= 0 && next < topics.length) { current = next; render(); }
  else if (dir === 1 && current === topics.length - 1) {
    document.getElementById('doneBanner').style.display = 'block';
    document.getElementById('card').style.display = 'none';
  }
}

function resetBtns() {
  [
    ['.copy-title-cn-btn', '复制标题（中文）'],
    ['.copy-body-cn-btn',  '复制正文（中文）'],
    ['.copy-title-en-btn', 'Copy Title (EN)'],
    ['.copy-body-en-btn',  'Copy Body (EN)'],
  ].forEach(([sel, label]) => {
    const btn = document.querySelector(sel);
    if (btn) { btn.textContent = label; btn.classList.remove('copied'); }
  });
}

function copyField(field) {
  const text = topics[current][field];
  const labelMap = {
    title_cn: '复制标题（中文）',
    body_cn:  '复制正文（中文）',
    title_en: 'Copy Title (EN)',
    body_en:  'Copy Body (EN)',
  };
  const selMap = {
    title_cn: '.copy-title-cn-btn',
    body_cn:  '.copy-body-cn-btn',
    title_en: '.copy-title-en-btn',
    body_en:  '.copy-body-en-btn',
  };
  const btn = document.querySelector(selMap[field]);
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = labelMap[field];
      btn.classList.remove('copied');
    }, 1500);
  });
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft')           navigate(-1);
  if (e.key === 'ArrowRight')          navigate(1);
  if (e.key === '1')                   copyField('title_cn');
  if (e.key === '2')                   copyField('body_cn');
  if (e.key.toLowerCase() === 't')     copyField('title_en');
  if (e.key.toLowerCase() === 'b')     copyField('body_en');
});

render();
</script>
</body>
</html>
