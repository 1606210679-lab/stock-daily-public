<script>
const topics = [
  { ticker: "NFLX", title_cn: "奈飞财报后续跌7.3%，一年腰斩近50%，抄底时机还是价值陷阱？", body_cn: "奈飞（NFLX）今日续跌7.26%、报$69，延续财报后的抛售，过去一年已近乎腰斩、跌约50%。市场争论其下跌\"真正的原因\"——用户增长见顶、内容成本高企的结构性隐忧盖过了短期业绩。有意思的是消息面：奈飞斥$5.87亿收购本·阿弗莱克的AI电影初创，财报后的抛售也被解读为它此前竞购华纳兄弟、Roku的动机所在。SeekingAlpha则逆势\"上调\"评级、称市场\"给的尊重不够\"。当深跌近50%遇上分歧极大的多空观点，奈飞是错杀的抄底良机，还是增长见顶的价值陷阱？", title_en: "NFLX Extends Post-Earnings Slide 7.3%, Down 50% in a Year — Dip or Trap?", body_en: "Netflix (NFLX) fell another 7.26% to $69, extending post-earnings selling as shares have lost roughly 50% over the past year. Structural concerns — peak subscriber growth and elevated content costs — continue to overshadow near-term results. Netflix acquired Ben Affleck's AI film startup for $587M, while SeekingAlpha bucked the trend with an upgrade, arguing the market is giving the stock insufficient credit. With shares down nearly 50% amid sharply divided sentiment, is Netflix a mispriced buying opportunity or a growth-ceiling value trap?" },
  { ticker: "GOOG", title_cn: "谷歌跌2.2%、Gemini 3.5 Pro难产，财报前夜AI领头羊掉队了吗？", body_cn: "Alphabet（GOOG）今日下跌2.17%、报$346，在周三盘后财报前走弱。压制来自AI进度担忧——\"Gemini 3.5 Pro延迟发布、股价随之下滑，这位AI领头羊是否正在掉队？\"叠加大盘对AI资本开支回报的整体质疑。作为周三盘后与特斯拉同晚发财报的Mag 7巨头，谷歌的云增长、广告韧性与AI变现节奏将成焦点。当模型进度落后遇上财报大考，谷歌这波回调是财报前的谨慎定价，还是AI竞赛地位真的松动？", title_en: "Alphabet Slides 2.2% Pre-Earnings as Gemini 3.5 Pro Delay Stokes AI Concerns — Falling Behind?", body_en: "Alphabet (GOOG) fell 2.17% to $346 ahead of its Wednesday after-hours earnings report, pressured by concerns over AI execution — Gemini 3.5 Pro's delayed launch sent shares lower, raising questions about whether the AI frontrunner is losing ground. Broader market skepticism over AI capital expenditure returns added to the drag. Alongside Tesla on Wednesday evening, Google's cloud growth, advertising resilience, and AI monetization pace will be in sharp focus. With model delays colliding with a major earnings test, is this pullback cautious pre-earnings pricing or a genuine shift in Google's AI competitive standing?" },
  { ticker: "TSLA", title_cn: "特斯拉跌2.6%，周三盘后财报大考，\"最后的创始人巨头\"还能买吗？", body_cn: "特斯拉（TSLA）今日下跌2.61%、报$381，在周三盘后Q2财报前承压。市场情绪谨慎——媒体热议\"马斯克的特斯拉仍是最后几家伟大的创始人主导科技巨头之一，7月22日财报前该买吗\"，同时奔驰新款CLA 250 Plus直接对标Model 3，竞争压力再添话题。作为本周与谷歌同晚开考的Mag 7重头，交付、利润率与自动驾驶进展将定调。当创始人光环撞上竞争加剧与财报大考，特斯拉这波回调你会财报前埋伏，还是等靴子落地？", title_en: "Tesla Drops 2.6% Ahead of Wednesday Q2 Earnings — Buy Before or Wait?", body_en: "Tesla (TSLA) fell 2.61% to $381, under pressure ahead of its Q2 earnings report Wednesday after the close. Market sentiment is cautious — commentary highlights Tesla as one of the last great founder-led tech giants, with debate swirling over whether to buy before the July 22 print; Mercedes' new CLA 250 Plus targeting the Model 3 adds competitive noise. As a Mag 7 heavyweight reporting the same night as Google, delivery volumes, margins, and Autopilot progress will set the tone. With founder mystique meeting intensifying competition and an imminent earnings test, would you buy Tesla ahead of results or wait for the dust to settle?" },
  { ticker: "SNDK, MU, SKHY", title_cn: "存储陷熊市：美光较高点跌30%，但闪迪年内仍涨580%，谁看得懂？", body_cn: "存储板块今日继续分化下探。SanDisk（SNDK）跌3.99%、美光（MU）微跌0.50%、海力士（SKHY）逆势微涨1.13%。剧烈反差引发热议：内存芯片\"正式跌入熊市\"，美光已较高点回落30%——即便AI需求仍在爆发；但另一边，SNDK年内仍暴涨580%、被喊\"仍是尖叫式买入\"，美光也因强劲Q3业绩与上调指引获看多。SeekingAlpha还提示海力士\"HBM顺风强劲、但要留意ADR溢价与周期\"。当\"熊市\"与\"仍涨580%\"两种叙事并存，存储的剧烈波动里，你更信超级周期还是周期见顶？", title_en: "Memory Stocks Diverge: Micron 30% Off Highs, Yet SanDisk Still Up 580% YTD — Who's Right?", body_en: "The memory sector continued to fragment on Tuesday. SanDisk (SNDK) fell 3.99%, Micron (MU) slipped 0.50%, while SK Hynix (SKHY) edged up 1.13%. The contrast is stark: memory chips have officially entered a bear market, with Micron down 30% from its peak despite surging AI demand, yet SNDK remains up 580% year-to-date and is still called a screaming buy, and Micron draws bulls on strong Q3 results and raised guidance. SeekingAlpha flags SK Hynix's robust HBM tailwinds while cautioning on ADR premium and cyclicality. With 'bear market' and 'up 580%' coexisting in the same sector, do you believe in the memory supercycle or a cycle peak?" },
  { ticker: "NVDA", title_cn: "英伟达跌2.2%，中国AI突破引芯片抛售，超级周期叙事动摇了吗？", body_cn: "英伟达（NVDA）今日下跌2.21%、报$203，随半导体板块回调。近期一条主线是\"中国的AI突破（Kimi等）触发了半导体抛售\"，市场担忧算力需求格局生变；同时投资者在AI财报超级周前对高估值科技整体谨慎。不过多头视角未变——有观点称\"TSMC的AI超级周期只是更强了\"，龙头的长期逻辑仍受追捧。当中国AI突破的扰动撞上财报周的观望情绪，英伟达这波回调是叙事动摇，还是超级周期中的高波动洗盘？", title_en: "Nvidia Falls 2.2% as China AI Breakthroughs Spark Chip Selloff — Is the Supercycle Narrative Cracking?", body_en: "Nvidia (NVDA) dropped 2.21% to $203, declining alongside the broader semiconductor sector. A key narrative: China's AI breakthroughs — including Kimi — have triggered chip selling as markets question whether demand dynamics are shifting. Investors are also broadly cautious on high-multiple tech ahead of the AI earnings super-week. Bulls remain firm, however, with views that TSMC's AI supercycle is only accelerating and that long-term structural demand for leading chips stays intact. With China AI disruption colliding with pre-earnings caution, is this pullback a narrative crack or a high-volatility shake-out within an ongoing supercycle?" },
  { ticker: "MSFT", title_cn: "微软跌1.8%但财报被看好\"重回$500\"，云评论成关键，怎么押？", body_cn: "微软（MSFT）今日下跌1.82%、报$394，随科技股回调，但财报预期偏乐观。SeekingAlpha连发看多——\"微软财报应会改变叙事、把股价送回$500上方\"，并点明\"最关键的是这一条云业务评论\"。作为AI capex最重的巨头，Azure增长与AI变现节奏是市场检验\"烧钱能否转化为回报\"的关键样本。当大盘质疑AI资本开支回报、而微软财报被寄望扭转叙事，你会在财报前布局微软，还是等云增长数据落地？", title_en: "Microsoft Dips 1.8% But Bulls Eye Return to $500 — One Cloud Comment Could Move It All", body_en: "Microsoft (MSFT) fell 1.82% to $394 alongside the broader tech selloff, though earnings expectations remain constructive. SeekingAlpha issued multiple bullish calls, arguing Microsoft's upcoming report 'should shift the narrative and push shares back above $500,' pinpointing a single cloud business comment as the most critical data point. As the heaviest AI capital spender among mega-caps, Azure growth and AI monetization pace serve as the market's key test of whether massive spending is translating into returns. With the market questioning AI capex ROI but Microsoft's earnings eyed as a potential narrative reset, would you position ahead of the print or wait for cloud growth data to land?" },
  { ticker: "AAPL", title_cn: "苹果历史高位微涨0.1%，HSBC称还能更高，高位还追得动吗？", body_cn: "苹果（AAPL）今日微涨0.14%、报$334，在科技普跌中守住历史高位、继续扮演避风港。多头再获背书——苹果刚创新高，HSBC认为\"它还能爬得更高\"；市场也在问\"历史新高的苹果还是买入良机吗\"。此外苹果对阿里的AI合作被称\"最大的AI背书\"，其AI布局的外溢效应受关注。当避险买盘把苹果推上历史高位、卖方还看更高，你会在高位继续追，还是担心缺乏新催化的拥挤抱团？", title_en: "Apple Holds All-Time Highs With 0.1% Gain; HSBC Sees Further Upside — Still Room to Chase?", body_en: "Apple (AAPL) edged up 0.14% to $334, holding at all-time highs as a safe-haven amid a broad tech selloff. Bulls received fresh support — HSBC argues Apple 'can climb even higher' following the record print, while the market asks whether new highs still represent a buying opportunity. Apple's AI partnership with Alibaba is being called its 'biggest AI endorsement,' with spillover effects drawing increasing attention. With defensive buying lifting Apple to record levels and the sell-side still bullish, would you continue chasing at these highs or worry about crowded positioning without a clear new catalyst?" },
  { ticker: "SPCX", title_cn: "SpaceX再跌5.4%深陷破发，首份财报将至，破发盘能抄吗？", body_cn: "SpaceX（SPCX）今日再跌5.43%、报$124，持续深陷破发（低于IPO发行价）。地缘扰动加剧——美伊冲突升级、油价跳涨压制风险偏好。市场焦点转向\"要不要在SpaceX首份财报前买$1000\"，但破发+新股情绪退潮让分歧巨大，甚至有观点\"宁可买高股息股也不碰SPCX\"。此前的合并想象与长期蓝图，短期压不住破发压力。当明星新股跌破发行价、首份财报又将至，SpaceX这波深跌是错杀，还是新股泡沫的持续挤压？", title_en: "SpaceX Sinks Another 5.4% Below IPO Price Ahead of First Earnings — Buy the Break?", body_en: "SpaceX (SPCX) tumbled another 5.43% to $124, deepening its slide below its IPO issue price. Geopolitical risk intensified as escalating U.S.-Iran tensions and a spike in oil prices weighed on risk appetite. Market debate centers on whether to buy at $124 ahead of the company's first-ever earnings report, but the combination of a broken IPO and fading new-issue sentiment has created deep disagreement — some investors say they would rather own high-dividend stocks than touch SPCX. Near-term selling pressure is overwhelming earlier merger speculation and long-term vision narratives. With a marquee new issue trading below its offer price and its first earnings report approaching, is SpaceX's selloff an overreaction or continued deflation of new-issue premium?" },
  { ticker: "MRVL", title_cn: "Marvell微涨企稳，收购XConn获华尔街升温，\"内存墙\"受益者？", body_cn: "Marvell（MRVL）今日微涨0.20%、报$189，在半导体普跌中相对企稳。个股叙事转暖——\"华尔街在其收购XConn后开始转向看好Marvell\"，并给出新的目标价；同时\"AI'内存墙'正变得更高，这3只股票将大赢\"把MRVL列为受益者。此前它因竞争与估值担忧深跌，如今并购与AI互连的成长逻辑重新被定价。当板块杀跌中出现个股企稳信号，Marvell是超跌反转的先行者，还是板块反弹前的短暂喘息？", title_en: "Marvell Steadies After XConn Deal Warms Wall Street — Key Beneficiary of AI's 'Memory Wall'?", body_en: "Marvell (MRVL) edged up 0.20% to $189, holding relatively firm amid a broad semiconductor decline. Sentiment is improving — Wall Street has grown more constructive following Marvell's acquisition of XConn, issuing new price targets, while a separate analysis naming MRVL among three key beneficiaries of AI's rising 'memory wall' adds a growth angle. The stock had previously sold off sharply on competition and valuation concerns; the M&A and AI interconnect thesis is now being re-rated. With an individual stock showing signs of stability during a sector-wide selloff, is Marvell leading a mean-reversion or just catching a brief breather ahead of a broader sector rebound?" },
  { ticker: "RKLB", title_cn: "火箭实验室企稳微涨，新交易\"直指SpaceX\"，太空二当家稳了吗？", body_cn: "火箭实验室（RKLB）今日微涨0.40%、报$68，在太空股普跌后企稳。个股催化在积累——\"火箭实验室最新的交易让它与SpaceX正面相撞\"，且公司在扩建发射基础设施以支持更高频次任务；UBS更预测太空经济到2040年TAM高达$1.3万亿。此前RKLB因赛道降温、SpaceX破发而深跌。当长期赛道空间与个股扩张叙事并存、股价开始企稳，RKLB这波是超跌后的筑底，还是太空题材反复中的又一次反弹？", title_en: "Rocket Lab Steadies With 0.1% Gain as New Deal Targets SpaceX Head-On — Is No. 2 Secure?", body_en: "Rocket Lab (RKLB) rose 0.40% to $68, stabilizing after a broad selloff in space stocks. Catalysts are building — its latest contract puts it in direct competition with SpaceX, the company is expanding launch infrastructure to support higher mission cadence, and UBS projects the total addressable space economy could reach $1.3 trillion by 2040. RKLB had previously sold off sharply as sector enthusiasm cooled and SpaceX's IPO stumbled. With long-term TAM expansion and individual company growth narratives converging as the stock begins to stabilize, is this the start of a base-building recovery or another fleeting bounce in a volatile space theme?" },

let current = 0;

function render() {
  if (!topics.length) return;
  const t = topics[current];
  document.getElementById('tickerTag').textContent = t.ticker || 'TOPIC';
  document.getElementById('titleCn').textContent   = t.title_cn;
  document.getElementById('bodyCn').textContent    = t.body_cn;
  document.getElementById('titleEn').textContent   = t.title_en;
  document.getElementById('bodyEn').textContent    = t.body_en;
  document.getElementById('progressText').textContent = (current+1) + ' / ' + topics.length;
  document.getElementById('progressBar').style.width  = ((current+1)/topics.length*100) + '%';
  document.getElementById('prevBtn').disabled = current === 0;
  document.getElementById('nextBtn').disabled = current === topics.length - 1;
  document.getElementById('doneBanner').style.display = 'none';
  document.getElementById('card').style.display = '';
  resetBtns();
}

function navigate(dir) {
  const next = current + dir;
  if (next >= 0 && next < topics.length) { current = next; render(); }
  else if (dir === 1 && current === topics.length - 1) {
    document.getElementById('doneBanner').style.display = 'block';
    document.getElementById('card').style.display = 'none';
  }
}

function resetBtns() {
  [
    ['.copy-title-cn-btn', '复制标题（中文）'],
    ['.copy-body-cn-btn',  '复制正文（中文）'],
    ['.copy-title-en-btn', 'Copy Title (EN)'],
    ['.copy-body-en-btn',  'Copy Body (EN)'],
  ].forEach(([sel, label]) => {
    const btn = document.querySelector(sel);
    if (btn) { btn.textContent = label; btn.classList.remove('copied'); }
  });
}

function copyField(field) {
  const text = topics[current][field];
  const labelMap = {
    title_cn: '复制标题（中文）',
    body_cn:  '复制正文（中文）',
    title_en: 'Copy Title (EN)',
    body_en:  'Copy Body (EN)',
  };
  const selMap = {
    title_cn: '.copy-title-cn-btn',
    body_cn:  '.copy-body-cn-btn',
    title_en: '.copy-title-en-btn',
    body_en:  '.copy-body-en-btn',
  };
  const btn = document.querySelector(selMap[field]);
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = labelMap[field];
      btn.classList.remove('copied');
    }, 1500);
  });
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft')           navigate(-1);
  if (e.key === 'ArrowRight')          navigate(1);
  if (e.key === '1')                   copyField('title_cn');
  if (e.key === '2')                   copyField('body_cn');
  if (e.key.toLowerCase() === 't')     copyField('title_en');
  if (e.key.toLowerCase() === 'b')     copyField('body_en');
});

render();
</script>
