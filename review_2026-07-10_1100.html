<script>
const topics = [
  { ticker: "SKHY", title_cn: "SK海力士登陆纳斯达克募资$265亿，7倍超购点燃内存，超级周期真来了？", body_cn: "SK海力士今日正式登陆纳斯达克、发行价$149，募资高达$265亿并获约7倍超额认购，成为点燃整个AI内存板块的核心事件（注：新股上市首日，实时行情尚未稳定，暂以发行价与募资规模为准）。作为全球HBM高带宽内存的龙头，海力士的火爆上市被视为\"AI存储需求旺盛\"的强力背书，直接带动美光（MU）、SanDisk（SNDK）同步大涨，媒体称其给市场带来约$2500亿AI提振，甚至有散户\"清仓美光去换海力士\"。当资本市场用7倍超购为AI内存投下信任票，海力士的登场是内存超级周期的又一记强音，还是上市情绪见顶的信号？", title_en: "SK Hynix Hits Nasdaq, Raises $26.5B at 7x Oversubscription — Is Memory's Super-Cycle Here?", body_en: "SK Hynix officially listed on Nasdaq today at $149 per share, raising $26.5 billion with roughly 7x oversubscription, igniting the AI memory sector in what analysts are calling a landmark event. As the global leader in HBM high-bandwidth memory, the blockbuster debut is seen as a powerful endorsement of surging AI storage demand, directly lifting Micron (MU) and SanDisk (SNDK), with media attributing approximately $250 billion in AI-driven market gains to the listing. With capital markets casting a 7x vote of confidence in AI memory, is SK Hynix's debut another confirmation of a memory super-cycle — or a peak-sentiment signal?" },
  { ticker: "MU", title_cn: "美光大涨4.5%重回$990，SK海力士上市点燃内存，超级周期回归？", body_cn: "美光（MU）今日大涨4.52%、重回$990上方，\"股价skyrocket\"成为焦点。核心催化是SK海力士美股上市募资高达$265亿、获7倍超额认购，直接点燃整个内存板块，媒体称美光给市场带来\"$2500亿AI提振\"。同时有分析指出MU正悄悄为下一份强劲财报蓄势。前期因三星恐慌的杀跌被快速修复。当SK海力士上市验证了市场对AI内存的旺盛需求，美光这波强反弹是超级周期二次启动，还是财报前的抢跑？", title_en: "Micron Surges 4.5% Back Above $990 as SK Hynix IPO Ignites Memory — Super-Cycle Revival?", body_en: "Micron (MU) surged 4.52% today, reclaiming $990, with shares described as \"skyrocketing\" as SK Hynix's $26.5 billion Nasdaq IPO — secured at 7x oversubscription — ignited the entire memory sector, with media attributing a \"$250 billion AI boost\" to Micron's market impact. Analysts note MU is quietly positioning for a strong upcoming earnings report, while the panic-driven selloff triggered by Samsung fears was swiftly reversed. With SK Hynix's listing validating robust AI memory demand, is Micron's sharp rebound the second ignition of a super-cycle — or a pre-earnings front-run?" },
  { ticker: "SNDK", title_cn: "SanDisk飙涨7.6%创新高，海力士上市带旺内存，还能追吗？", body_cn: "SanDisk（SNDK）今日飙涨7.59%、站上$1,858，领涨内存板块的强劲反弹。催化同样来自SK海力士$265亿美股上市、7倍超购点燃的存储热潮，Micron、SanDisk两大内存巨头同步走强。前几日刚经历三星引发的急跌，如今V型反攻凸显资金对AI存储需求的坚定信心。但连续大幅波动也说明该板块交易高度拥挤。当海力士上市把内存热情重新点燃，SanDisk这波7.6%飙涨你会追高，还是等回踩确认？", title_en: "SanDisk Surges 7.6% to Record High on Hynix IPO Memory Wave — Still Worth Chasing?", body_en: "SanDisk (SNDK) surged 7.59% today to $1,858, leading a powerful memory sector rebound fueled by SK Hynix's $26.5 billion Nasdaq listing and 7x oversubscription, which ignited broad enthusiasm across storage stocks, lifting both Micron and SanDisk sharply. The V-shaped recovery from last week's Samsung-driven selloff underscores firm conviction in AI storage demand, though the violent back-to-back swings highlight how crowded this trade has become. With SK Hynix's IPO reigniting memory excitement, would you chase SanDisk's 7.6% spike — or wait for a pullback to confirm support?" },
  { ticker: "SPCX", title_cn: "SpaceX反弹2.6%但遭美银警示目标价，华尔街集体看多靠谱吗？", body_cn: "SpaceX（SPCX）今日反弹2.60%、回到$152，止住此前的深跌。消息面矛盾激烈：华尔街突然涌现大量\"买入\"评级，但美国银行（BofA）却给出了一个\"令人警惕\"的目标价；同时市场热议\"分析师是不是知道散户不知道的事\"。此外两只新ETF明确剔除马斯克旗下资产，投资者分歧加剧。当机构一边喊买、一边给谨慎目标价，SpaceX这波反弹你会信华尔街的看多，还是警惕高波动的接盘风险？", title_en: "SpaceX Rebounds 2.6% but BofA Issues Cautious Target — Can You Trust Wall Street's Bull Chorus?", body_en: "SpaceX (SPCX) rebounded 2.60% today to $152, halting a steep prior decline, even as conflicting signals cloud the outlook: a wave of Wall Street \"buy\" ratings has suddenly emerged, yet Bank of America issued a target price that markets are calling \"alarming,\" sparking debate over whether analysts know something retail investors don't. Meanwhile, two newly launched ETFs have explicitly excluded Musk-linked assets, deepening investor disagreement. With institutions simultaneously shouting buy and flashing cautious targets, do you trust Wall Street's bullish call on SpaceX — or stay wary of catching a high-volatility falling knife?" },
  { ticker: "NVDA", title_cn: "英伟达逆势微跌0.7%，芯片股普涨它却歇脚，龙头要换手了？", body_cn: "英伟达（NVDA）今日微跌0.66%、报$203，在半导体板块因SK海力士上市而全面走强的背景下罕见落后。资金似乎在芯片股内部轮动——AMD、Marvell、内存股集体大涨，NVDA则高位歇脚。市场也在讨论\"英伟达独占AI芯片市场，但谷歌、亚马逊等正在赶来\"的长期竞争格局。作为绝对龙头，NVDA的短暂落后更像获利了结而非逻辑转弱。当板块普涨龙头却按兵不动，你会趁NVDA歇脚低吸，还是跟随资金去追补涨的芯片股？", title_en: "Nvidia Dips 0.7% as Chip Stocks Rally — Is Sector Leadership Rotating?", body_en: "Nvidia (NVDA) slipped 0.66% to $203 today, a rare laggard as the broader semiconductor sector surged on the catalyst of SK Hynix's Nasdaq debut, with AMD, Marvell, and memory names posting sharp gains while NVDA paused at elevated levels. Capital appears to be rotating within chip stocks, though Nvidia's brief underperformance looks more like profit-taking than any fundamental weakening of its AI dominance thesis. Markets are also debating the longer-term competitive landscape as Google, Amazon, and others accelerate custom silicon development. With the sector rallying but the leader standing still, would you buy NVDA on this pause — or chase the catching-up chip names?" },
  { ticker: "TSLA", title_cn: "特斯拉涨3.2%收复$400，Miami Robotaxi落地，自动驾驶叙事回来了？", body_cn: "特斯拉（TSLA）今日上涨3.17%、重新收复$400关口，止住连日回落。催化来自自动驾驶的实质进展——特斯拉在迈阿密的Robotaxi正式落地，叠加Q2交付数据，市场重新讨论\"这是否把TSLA重新拉回'自动驾驶优先'的估值叙事\"。在科技股整体反弹的助推下，$400关口再度失而复得。当Robotaxi从PPT走向落地，特斯拉这波反弹是自动驾驶叙事的重启，还是又一次消息面驱动的脉冲？", title_en: "Tesla Climbs 3.2% to Reclaim $400 as Miami Robotaxi Launches — Is the Self-Driving Story Back?", body_en: "Tesla (TSLA) rose 3.17% today, reclaiming the key $400 level and snapping a multi-day losing streak, driven by tangible autonomous driving progress as the company's Robotaxi service officially launched in Miami, alongside Q2 delivery data reigniting debate over whether TSLA is re-anchoring to an \"autonomy-first\" valuation narrative. A broader tech sector rebound provided additional tailwind as $400 was recovered for a second time. With Robotaxi moving from slides to the street, is Tesla's rebound a genuine restart of the self-driving narrative — or another news-driven pulse destined to fade?" },
  { ticker: "INTC", title_cn: "英特尔涨2.1%跟随芯片反弹，油价回落风险偏好回升，掉队者翻身？", body_cn: "英特尔（INTC）今日上涨2.09%、回到$112，跟随半导体板块的整体反弹，油价回落、市场看淡中东局势推动风险偏好回升。但英特尔今日更多是板块beta的被动跟涨，缺乏个股层面的独立强催化，前期在AI芯片浪潮中掉队的处境未变。当板块普涨把落后者也一并抬起，英特尔这2%的跟涨是困境反转的起点，还是仅仅搭了SK海力士行情的顺风车？", title_en: "Intel Gains 2.1% Riding Chip Rebound as Oil Falls, Risk Appetite Returns — Can the Laggard Turn?", body_en: "Intel (INTC) rose 2.09% to $112 today, carried higher by the semiconductor sector's broad rebound as falling oil prices and fading Middle East tensions lifted overall risk appetite. However, today's move reads largely as passive beta participation rather than any stock-specific catalyst, leaving Intel's structural disadvantage in the AI chip wave fundamentally unchanged. With a sector-wide rally lifting even the laggards, is Intel's 2% gain the beginning of a genuine turnaround — or simply a free ride on the SK Hynix momentum?" },
  { ticker: "AMD", title_cn: "AMD飙涨5.7%，Meta 9月自产AI芯片搅动格局，谁最受益？", body_cn: "AMD今日飙涨5.67%、站上$546，\"Why Is AMD Rocketing Higher\"成为热议。催化来自AI芯片格局的新变化——有备忘录显示Meta将于9月量产自研AI芯片，市场重新评估英伟达之外的算力供应链，AMD作为第二供应商与代工/IP生态受益预期升温。叠加SK海力士上市带动的半导体全面走强，AMD弹性尽显。当\"去英伟达单一依赖\"成为大厂共识，AMD这波5.7%飙涨是格局重塑的受益者，还是板块普涨的高beta跟随？", title_en: "AMD Surges 5.7% as Meta's September In-House AI Chip Disrupts the Landscape — Who Benefits Most?", body_en: "AMD surged 5.67% to $546 today, with \"Why Is AMD Rocketing Higher\" trending widely, as a leaked memo revealing Meta will begin mass-producing its own AI chips in September prompted markets to reassess the compute supply chain beyond Nvidia, boosting AMD's prospects as an alternative supplier within the broader IP and foundry ecosystem. The move was amplified by the semiconductor-wide rally sparked by SK Hynix's Nasdaq listing. With \"de-risking Nvidia dependency\" becoming a major-platform consensus, is AMD's 5.7% surge a structural beneficiary of a reshaping landscape — or just a high-beta ride on a sector-wide wave?" },
  { ticker: "META", title_cn: "Meta涨4.7%创新高，扎克伯格力挺云业务+9月自产芯片，AI野心多大？", body_cn: "Meta（META）今日大涨4.70%、站上$631，领涨大型科技股。双重催化发酵：\"Meta股价大涨，AI竞赛升温，扎克伯格称云业务'说得通'\"，同时备忘录显示Meta将于9月量产自研AI芯片，垂直整合算力的野心进一步落地。市场同步热议\"Alphabet vs Meta谁是更好的AI标的\"。当Meta既自建芯片、又下场云业务，全栈AI布局的想象空间被打开。这波创新高是AI战略兑现的重估，还是资本开支狂飙前的乐观定价？", title_en: "Meta Surges 4.7% to Record High as Zuckerberg Backs Cloud and September Chip Launch — How Big Is the AI Ambition?", body_en: "Meta (META) surged 4.70% to $631 today, leading large-cap tech, on a dual catalyst: Zuckerberg publicly endorsed the cloud business as \"making sense,\" while an internal memo confirmed Meta will mass-produce its own AI chips in September, further advancing its vertical integration of compute infrastructure. Markets simultaneously debated \"Alphabet vs. Meta: which is the better AI play.\" With Meta building its own silicon and entering cloud, the full-stack AI imagination has been fully unlocked. Is this record-breaking rally a re-rating on AI strategy execution — or optimistic pricing ahead of a capex surge?" },
  { ticker: "MRVL", title_cn: "Marvell涨5%跟随芯片反攻，与MACOM同步走强，超跌反弹开始了？", body_cn: "Marvell（MRVL）今日上涨4.99%、回到$243，跟随半导体板块在SK海力士上市催化下的强劲反攻，与MACOM等同步走强。此前MRVL因\"英伟达重金押注对手+被踢出指数\"而深跌逾22%，今日反弹更像超跌修复。油价回落、科技领涨的大环境提供了顺风。但公司前期的竞争与资金面利空并未根本扭转。当板块普涨把超跌股一并拉起，Marvell这5%反弹是逻辑修复的起点，还是空头回补的一次性脉冲？", title_en: "Marvell Gains 5% in Chip Rebound Alongside MACOM — Is the Oversold Recovery Underway?", body_en: "Marvell (MRVL) rose 4.99% to $243 today, joining a broad semiconductor rebound catalyzed by SK Hynix's Nasdaq listing, moving in tandem with MACOM and other chip names, in what reads largely as an oversold bounce after shares previously plunged more than 22% on news of Nvidia backing a rival and MRVL's removal from a major index. Falling oil prices and tech sector leadership provided a supportive macro backdrop, though the company's underlying competitive and capital-flow headwinds remain unresolved. With a broad rally lifting oversold names, is Marvell's 5% rebound the start of a logic-driven recovery — or a one-off short-covering spike?" },

let current = 0;

function render() {
  if (!topics.length) return;
  const t = topics[current];
  document.getElementById('tickerTag').textContent = t.ticker || 'TOPIC';
  document.getElementById('titleCn').textContent   = t.title_cn;
  document.getElementById('bodyCn').textContent    = t.body_cn;
  document.getElementById('titleEn').textContent   = t.title_en;
  document.getElementById('bodyEn').textContent    = t.body_en;
  document.getElementById('progressText').textContent = (current+1) + ' / ' + topics.length;
  document.getElementById('progressBar').style.width  = ((current+1)/topics.length*100) + '%';
  document.getElementById('prevBtn').disabled = current === 0;
  document.getElementById('nextBtn').disabled = current === topics.length - 1;
  document.getElementById('doneBanner').style.display = 'none';
  document.getElementById('card').style.display = '';
  resetBtns();
}

function navigate(dir) {
  const next = current + dir;
  if (next >= 0 && next < topics.length) { current = next; render(); }
  else if (dir === 1 && current === topics.length - 1) {
    document.getElementById('doneBanner').style.display = 'block';
    document.getElementById('card').style.display = 'none';
  }
}

function resetBtns() {
  [
    ['.copy-title-cn-btn', '复制标题（中文）'],
    ['.copy-body-cn-btn',  '复制正文（中文）'],
    ['.copy-title-en-btn', 'Copy Title (EN)'],
    ['.copy-body-en-btn',  'Copy Body (EN)'],
  ].forEach(([sel, label]) => {
    const btn = document.querySelector(sel);
    if (btn) { btn.textContent = label; btn.classList.remove('copied'); }
  });
}

function copyField(field) {
  const text = topics[current][field];
  const labelMap = {
    title_cn: '复制标题（中文）',
    body_cn:  '复制正文（中文）',
    title_en: 'Copy Title (EN)',
    body_en:  'Copy Body (EN)',
  };
  const selMap = {
    title_cn: '.copy-title-cn-btn',
    body_cn:  '.copy-body-cn-btn',
    title_en: '.copy-title-en-btn',
    body_en:  '.copy-body-en-btn',
  };
  const btn = document.querySelector(selMap[field]);
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = labelMap[field];
      btn.classList.remove('copied');
    }, 1500);
  });
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft')           navigate(-1);
  if (e.key === 'ArrowRight')          navigate(1);
  if (e.key === '1')                   copyField('title_cn');
  if (e.key === '2')                   copyField('body_cn');
  if (e.key.toLowerCase() === 't')     copyField('title_en');
  if (e.key.toLowerCase() === 'b')     copyField('body_en');
});

render();
</script>

</html>
