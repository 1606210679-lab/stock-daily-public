<script>
const topics = [
  { ticker: "SKHY", title_cn: "SK海力士暴跌9.3%引爆内存杀跌，\"它会再次拖累大盘\"，狂欢终结了？", body_cn: "SK海力士（SKHY）今日暴跌9.32%、跌至$152，从上市狂欢急转为领跌全场，SeekingAlpha一篇\"SK海力士将再次拖累大盘\"精准预言了这场杀跌。它引爆了整个内存板块的崩塌——闪迪、美光、内存ETF（DRAM）集体重挫。就在上周它还以$265亿募资、7倍超购创下\"史上最佳ETF首秀\"，Benzinga如今直呼\"从最佳首秀到熊市，DRAM的疯狂过山车\"。当上市不过数日便高台跳水，海力士这波暴跌是内存超级周期被证伪，还是拥挤交易的剧烈出清？", title_en: "SK Hynix Plunges 9.3%, Torching Memory Sector — Is the IPO Party Over?", body_en: "SK Hynix (SKHY) cratered 9.32% to $152, reversing sharply from its blockbuster IPO debut to lead the entire memory sector lower. The selloff swept SanDisk, Micron, and the DRAM ETF into a collective rout. Just last week, SKHY raised $26.5B with 7x oversubscription, hailed as the best-ever ETF debut — Benzinga now calls it 'from best debut to bear market.' Does this plunge disprove the memory supercycle, or is it simply an overcrowded trade violently unwinding?" },
  { ticker: "SNDK", title_cn: "SanDisk崩跌12.6%领跌存储，内存超级周期一夜变脸，还能信吗？", body_cn: "SanDisk（SNDK）今日崩跌12.63%、失守$1,700，成为存储板块杀跌的重灾区。在SK海力士暴跌的连锁冲击下，存储与半导体设备股集体跳水——Nova、泰瑞达、Kulicke and Soffa等\"应声重挫\"。此前SNDK因内存超级周期狂热连创新高、高盛还给出惊人目标价，如今风向骤变、获利回吐汹涌。当\"史上最强内存行情\"在一周内从狂欢转为踩踏，SanDisk这12.6%的暴跌是黄金坑，还是超级周期见顶的确认？", title_en: "SanDisk Crashes 12.6% to Lead Storage Rout — Can the Memory Supercycle Be Trusted?", body_en: "SanDisk (SNDK) collapsed 12.63%, breaching $1,700, emerging as the hardest-hit name in the storage selloff. The chain reaction from SK Hynix's plunge dragged down semiconductor equipment stocks including Nova, Teradyne, and Kulicke & Soffa. SNDK had surged to record highs on memory supercycle euphoria, with Goldman Sachs issuing a lofty price target — now profit-taking is fierce. With the 'strongest memory rally ever' turning into a stampede within a week, is SanDisk's 12.6% drop a buying opportunity or confirmation that the supercycle has peaked?" },
  { ticker: "MU", title_cn: "美光跌4.3%失守$940，\"AI超级牛论\"仍在但内存踩踏难挡，怎么选？", body_cn: "美光（MU）今日下跌4.32%、失守$940，随内存板块整体杀跌回落。多空剧烈拉扯：一位知名AI投资人重申\"英伟达、美光、博通的超级牛市论\"，中长线逻辑未变；但SK海力士暴跌引爆的板块踩踏、叠加美-伊局势重燃，短期抛压难挡。相较闪迪双位数暴跌，MU相对抗跌但仍难独善其身。当长期\"超级牛\"叙事撞上短期恐慌性抛售，美光失守$940后你会逢跌布局，还是等踩踏结束再说？", title_en: "Micron Falls 4.3% Below $940 Amid Memory Rout — Buy the Dip or Wait?", body_en: "Micron (MU) declined 4.32%, slipping below $940 as the broader memory sector sold off sharply. Bulls and bears clashed: a prominent AI investor reiterated a 'super-bull thesis' on Nvidia, Micron, and Broadcom, leaving the long-term narrative intact; but the sector stampede triggered by SK Hynix's crash, compounded by renewed U.S.-Iran tensions, made short-term selling pressure irresistible. MU held up better than SanDisk's double-digit collapse but couldn't escape unscathed. With the long-term 'super-bull' thesis colliding with short-term panic selling, will you buy MU below $940 or wait for the stampede to end?" },
  { ticker: "NVDA", title_cn: "英伟达跌3.5%回落$203，\"整个芯片交易在等一份财报\"，拐点将至？", body_cn: "英伟达（NVDA）今日下跌3.52%、回落至$203，随半导体板块普跌走弱，但相对内存股跌幅温和。市场焦点转向即将到来的关键财报——\"整个芯片交易都在等这一份报告\"，台积电等的指引将为AI叙事定调。同时知名AI投资人把NVDA列为\"超级牛市论\"的核心标的，长期逻辑仍受追捧。在海力士暴跌、美-伊局势扰动的短期恐慌中，英伟达的相对抗跌能否延续？这份关键财报会成为芯片股的拐点吗？", title_en: "Nvidia Slips 3.5% to $203 — 'Entire Chip Trade Awaiting One Earnings Report.' Inflection Point Ahead?", body_en: "Nvidia (NVDA) fell 3.52% to $203, retreating with the broader semiconductor sector but posting a relatively modest decline compared to memory stocks. Market attention is shifting to an imminent critical earnings report — 'the entire chip trade is waiting for this one,' with TSMC's guidance set to frame the AI narrative. A prominent AI investor also names NVDA as the centerpiece of the 'super-bull thesis,' keeping long-term conviction intact. Amid short-term panic from the Hynix crash and U.S.-Iran tensions, can Nvidia's relative resilience hold — and will this key earnings report mark an inflection point for chip stocks?" },
  { ticker: "SPCX", title_cn: "SpaceX再跌4.2%失守$140，花旗Jefferies齐发看多，分歧多大？", body_cn: "SpaceX（SPCX）今日再跌4.24%、失守$140，随科技回调与地缘扰动继续走弱。但机构却密集示好：花旗（Citi）向SpaceX投资者\"发出强力信号\"，Jefferies则称Tesla-SpaceX合并\"可能给股东带来溢价\"、并借此看多TSLA重返$400。此外有长线预测\"今日投入$2.5万，到2050年将增值可观\"。当股价持续下探、卖方却集体看多，SpaceX这波深跌你更信机构的长期蓝图，还是警惕地缘与情绪的短期杀跌？", title_en: "SpaceX Falls 4.2% Below $140; Citi and Jefferies Both Bullish — How Wide Is the Divide?", body_en: "SpaceX (SPCX) dropped another 4.24%, breaching $140 as tech weakness and geopolitical headwinds persisted. Yet institutional conviction is building: Citi sent a 'strong signal' to SpaceX investors, while Jefferies argued a Tesla-SpaceX merger 'could deliver a premium to shareholders,' using the thesis to reiterate a bullish view on TSLA toward $400. One long-term forecast projects a $25,000 investment today growing substantially by 2050. With the stock sliding while sell-side analysts line up bullishly, do you trust the institutions' long-term blueprint or stay cautious amid near-term geopolitical and sentiment-driven selling?" },
  { ticker: "TSLA", title_cn: "特斯拉跌3.2%失守$400，Jefferies喊合并溢价能重返$400吗？", body_cn: "特斯拉（TSLA）今日下跌3.19%、失守$400，跌幅大于大盘。但看多声音同步升温：Jefferies明确给出\"TSLA重返$400\"的看涨逻辑，核心论据正是潜在的SpaceX合并\"可能为股东带来溢价\"；另有分析认为\"特斯拉的股价停滞即将结束\"。不过在美-伊局势重燃、科技普跌的大环境下，短期抛压难免。当合并溢价的想象撞上大盘杀跌，特斯拉失守$400后你会押注反弹，还是等地缘扰动平息？", title_en: "Tesla Drops 3.2% Below $400 — Can Jefferies' Merger Premium Thesis Bring It Back?", body_en: "Tesla (TSLA) fell 3.19%, breaking below $400 in a decline that outpaced the broader market. Bullish voices are simultaneously growing louder: Jefferies laid out a clear path back to $400, anchored by the thesis that a potential SpaceX merger 'could deliver a premium to shareholders'; separately, analysts argue 'Tesla's stock stagnation is about to end.' Still, renewed U.S.-Iran tensions and broad tech weakness make near-term selling pressure hard to escape. With merger-premium optimism colliding with macro-driven selling, will you bet on a Tesla rebound below $400 or wait for geopolitical uncertainty to clear?" },
  { ticker: "INTC", title_cn: "英特尔暴跌6.1%破$104，美-伊冲突+芯片踩踏双杀，还有底吗？", body_cn: "英特尔（INTC）今日暴跌6.12%、跌破$104，跌幅大于大盘，是半导体杀跌中的重灾区。宏观利空叠加：特朗普重启对伊朗的封锁、要求20%\"过路费\"，霍尔木兹局势重燃打压风险资产；半导体又因海力士暴跌集体踩踏。英特尔本就在AI芯片竞赛中掉队，杀跌日向下弹性更大。当地缘冲突与板块踩踏同时砸下，英特尔这波6%重挫是超跌机会，还是掉队者继续被抛的信号？", title_en: "Intel Plunges 6.1% Below $104 — U.S.-Iran Tensions Plus Chip Stampede: Is There a Floor?", body_en: "Intel (INTC) tumbled 6.12%, breaking below $104 in one of the steepest declines across semiconductors. Macro headwinds compounded sector pain: the Trump administration's renewed Iran blockade and demands for a 20% 'transit fee' reignited Strait of Hormuz tensions, pressuring risk assets broadly, while the SK Hynix-triggered chip stampede deepened the selloff. Intel, already losing ground in the AI chip race, amplified losses on a down day. With geopolitical conflict and sector-wide panic hitting simultaneously, is Intel's 6% plunge a deep-value entry or a signal that a laggard continues to be abandoned?" },
  { ticker: "MSFT", title_cn: "微软逆势涨1.5%成杀跌日避风港，软件替代芯片成新宠？", body_cn: "微软（MSFT）今日逆势上涨1.53%、报$391，在半导体与内存全面杀跌中罕见收红，凸显防御价值。资金明显从暴跌的芯片/内存股撤向现金流稳定的软件巨头——HubSpot、Salesforce、Intuit等一批软件股同步走强。微软还被知名AI投资人间接纳入\"AI超级牛\"版图。当AI交易从高波动的\"卖铲人\"转向确定性更强的软件应用，微软这类软件龙头的避险属性在杀跌日格外抢眼。这轮防御性买盘能持续多久？", title_en: "Microsoft Gains 1.5% as Safe Haven on Brutal Selloff Day — Is Software the New Chip Trade?", body_en: "Microsoft (MSFT) bucked the trend, rising 1.53% to $391 while semiconductors and memory stocks were broadly hammered, underscoring its defensive appeal. Capital visibly rotated from collapsing chip and memory names into stable-cashflow software giants — HubSpot, Salesforce, and Intuit moved higher in tandem. Microsoft was also indirectly cited as part of the 'AI super-bull' portfolio by a prominent AI investor. As the AI trade shifts from high-volatility 'picks-and-shovels' plays toward higher-conviction software applications, Microsoft's safe-haven status shone brightly on a brutal selloff day. How long can this defensive bid last?" },
  { ticker: "MRVL", title_cn: "Marvell暴跌7.8%破$220，与同业集体重挫，AI芯片故事凉了吗？", body_cn: "Marvell（MRVL）今日暴跌7.75%、跌破$220，与Vishay、Allegro等模拟/芯片同业集体重挫。在海力士引爆的半导体踩踏中，前期涨多的定制AI芯片股回撤尤为剧烈。此前MRVL刚因\"隐藏增长引擎达里程碑\"被看好、又遭\"英伟达押注对手+被踢出指数\"的利空，多空分歧本就巨大，杀跌日放大了波动。当板块系统性下杀盖过个股逻辑，Marvell破$220是深度错杀，还是AI芯片估值集体回归的延续？", title_en: "Marvell Plunges 7.8% Below $220 in Sector Rout — Is the AI Chip Story Broken?", body_en: "Marvell (MRVL) plunged 7.75%, falling below $220 alongside broad declines in Vishay, Allegro, and other analog and chip peers. In the semiconductor stampede ignited by SK Hynix, custom AI chip stocks that had run sharply higher saw the steepest pullbacks. MRVL had recently been praised for a 'hidden growth engine hitting a milestone,' but also faced headwinds from Nvidia reportedly backing a rival and the stock being dropped from an index — setting up a large bull-bear divide that the selloff day amplified. With systemic sector selling overwhelming individual stock fundamentals, is Marvell's break below $220 a deep mispricing or part of a broader AI chip valuation reset?" },
  { ticker: "ORCL", title_cn: "甲骨文跌6.5%逼近52周低$132，一个月暴跌28%，AI基建叙事崩了？", body_cn: "甲骨文（ORCL）今日下跌6.47%、报$131附近，逼近52周低点$132，一个月内已暴跌28%。在科技普跌与自身债务担忧的双重打压下，市场追问\"$132这道关口会守住还是跌穿\"。此前它因激进AI云资本开支、$1600亿债务与标普评级下调而持续承压，AI基建的宏大叙事正遭遇现实的偿债与盈利拷问。当一个月跌去近三成、逼近关键支撑，甲骨文是深度超跌的价值洼地，还是杠杆扩张后遗症刚开始显现？", title_en: "Oracle Drops 6.5%, Near 52-Week Low $132, Down 28% in a Month — Has the AI Infrastructure Narrative Collapsed?", body_en: "Oracle (ORCL) fell 6.47% to approximately $131, pressing against its 52-week low of $132 after losing 28% in a single month. Broad tech weakness compounded company-specific debt concerns, with markets questioning whether the $132 level will hold or break. Oracle has faced sustained pressure from aggressive AI cloud capital expenditure, $160B in debt, and an S&P rating downgrade — its grand AI infrastructure narrative is now under intense scrutiny over debt servicing and profitability. After losing nearly 30% in a month and testing key support, is Oracle a deeply oversold value opportunity or the early symptom of a leveraged-expansion hangover just beginning to surface?" },
  { ticker: "META", title_cn: "Meta跌1.9%相对抗跌，\"整个芯片交易在等财报\"，巨头能扛住吗？", body_cn: "Meta（META）今日下跌1.86%、报$657，跌幅小于半导体板块，在杀跌日相对抗跌。作为AI应用与算力自建并进的巨头，META受地缘扰动与\"AI泡沫\"情绪拖累回调，但其自研芯片、Neocloud布局的长期逻辑仍获资金一定支撑。市场普遍在等待关键芯片财报为AI叙事定调。当美-伊局势重燃、芯片踩踏拖累大盘，Meta这类现金流强劲的应用型巨头，能否继续跑赢杀跌中的芯片股？", title_en: "Meta Slips 1.9%, Holds Up Relatively Well — Can Big Tech Weather the Chip Selloff?", body_en: "Meta (META) declined 1.86% to $657, outperforming the semiconductor sector in a broad selloff and demonstrating relative resilience. As a major player in both AI applications and in-house compute infrastructure, META was dragged by geopolitical headwinds and 'AI bubble' sentiment, but its proprietary chip development and Neocloud positioning continued to draw a measure of institutional support. Markets broadly await a key chip earnings report to set the tone for the AI narrative. With U.S.-Iran tensions reigniting and chip-driven selling weighing on indices, can Meta and other cash-generative application-layer giants continue to outperform battered chip stocks?" },
  { ticker: "AAPL", title_cn: "苹果逆势微涨0.6%守$317，OpenAI诉讼被称\"重量级\"，避险choice？", body_cn: "苹果（AAPL）今日逆势微涨0.63%、守在$317，在科技普跌中显现避险属性。话题聚焦其与OpenAI的法律战——Jim Cramer称苹果起诉OpenAI是\"重量级\"事件，暗示\"库克一定相信OpenAI在窃密\"。在海力士暴跌、地缘扰动的恐慌日，资金向现金流稳健的苹果聚拢，与半导体的重挫形成鲜明对比。当法律纠纷与避险买盘并存，苹果这只杀跌日里的红盘，你会当稳健配置，还是担心它AI进展仍偏慢？", title_en: "Apple Edges Up 0.6% to $317; OpenAI Lawsuit Called 'Heavyweight' — Safe Haven of Choice?", body_en: "Apple (AAPL) edged up 0.63% to $317, displaying safe-haven characteristics amid broad tech declines. The spotlight fell on its legal battle with OpenAI — Jim Cramer called Apple's lawsuit against OpenAI a 'heavyweight' move, suggesting 'Cook must believe OpenAI is stealing secrets.' On a day marked by the SK Hynix collapse and geopolitical anxiety, capital gravitated toward Apple's sturdy cash flows, forming a sharp contrast with the semiconductor carnage. With legal controversy and defensive buying coexisting, do you see Apple's rare green close as solid portfolio ballast, or does concern over its still-sluggish AI progress give you pause?" },
  { ticker: "SPY", title_cn: "标普SPY跌0.8%，美-伊战火重燃+海力士杀跌，回调要扩大吗？", body_cn: "标普500 ETF（SPY）今日下跌0.77%、报$749，三大股指集体收跌。双重利空发酵：特朗普重启对伊朗封锁、霍尔木兹海峡局势再度紧张，\"美-伊战争担忧重现\"；同时SK海力士暴跌引爆半导体/内存板块踩踏，拖累科技权重股。避险情绪下资金转向防御性资产。当地缘冲突与AI龙头杀跌同时施压，这轮从高位的回调是短暂避险，还是更大级别调整的开端？", title_en: "SPY Falls 0.8%; U.S.-Iran Tensions and Hynix Selloff Combine — Is the Pullback Deepening?", body_en: "The S&P 500 ETF (SPY) fell 0.77% to $749 as all three major indices closed lower. Two headwinds converged: the Trump administration's renewed Iran blockade reignited Strait of Hormuz tensions, with 'U.S.-Iran war fears resurfacing,' while SK Hynix's crash triggered a semiconductor and memory sector stampede that dragged down heavyweight tech names. Risk-off sentiment drove capital into defensive assets. With geopolitical conflict and AI bellwether selloffs pressing simultaneously, is this pullback from recent highs a brief flight to safety — or the opening move of a larger-scale correction?" },
];
let current = 0;

function render() {
  if (!topics.length) return;
  const t = topics[current];
  document.getElementById('tickerTag').textContent = t.ticker || 'TOPIC';
  document.getElementById('titleCn').textContent   = t.title_cn;
  document.getElementById('bodyCn').textContent    = t.body_cn;
  document.getElementById('titleEn').textContent   = t.title_en;
  document.getElementById('bodyEn').textContent    = t.body_en;
  document.getElementById('progressText').textContent = (current+1) + ' / ' + topics.length;
  document.getElementById('progressBar').style.width  = ((current+1)/topics.length*100) + '%';
  document.getElementById('prevBtn').disabled = current === 0;
  document.getElementById('nextBtn').disabled = current === topics.length - 1;
  document.getElementById('doneBanner').style.display = 'none';
  document.getElementById('card').style.display = '';
  resetBtns();
}

function navigate(dir) {
  const next = current + dir;
  if (next >= 0 && next < topics.length) { current = next; render(); }
  else if (dir === 1 && current === topics.length - 1) {
    document.getElementById('doneBanner').style.display = 'block';
    document.getElementById('card').style.display = 'none';
  }
}

function resetBtns() {
  [
    ['.copy-title-cn-btn', '复制标题（中文）'],
    ['.copy-body-cn-btn',  '复制正文（中文）'],
    ['.copy-title-en-btn', 'Copy Title (EN)'],
    ['.copy-body-en-btn',  'Copy Body (EN)'],
  ].forEach(([sel, label]) => {
    const btn = document.querySelector(sel);
    if (btn) { btn.textContent = label; btn.classList.remove('copied'); }
  });
}

function copyField(field) {
  const text = topics[current][field];
  const labelMap = {
    title_cn: '复制标题（中文）',
    body_cn:  '复制正文（中文）',
    title_en: 'Copy Title (EN)',
    body_en:  'Copy Body (EN)',
  };
  const selMap = {
    title_cn: '.copy-title-cn-btn',
    body_cn:  '.copy-body-cn-btn',
    title_en: '.copy-title-en-btn',
    body_en:  '.copy-body-en-btn',
  };
  const btn = document.querySelector(selMap[field]);
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = labelMap[field];
      btn.classList.remove('copied');
    }, 1500);
  });
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft')           navigate(-1);
  if (e.key === 'ArrowRight')          navigate(1);
  if (e.key === '1')                   copyField('title_cn');
  if (e.key === '2')                   copyField('body_cn');
  if (e.key.toLowerCase() === 't')     copyField('title_en');
  if (e.key.toLowerCase() === 'b')     copyField('body_en');
});

render();
</script>

</html>
