<script>
const topics = [
  { ticker: "SKHY", title_cn: "SK海力士暴跌9.3%引爆内存杀跌，\"它会再次拖累大盘\"，狂欢终结了？", body_cn: "SK海力士（SKHY）今日暴跌9.32%、跌至$152，从上市狂欢急转为领跌全场，SeekingAlpha一篇\"SK海力士将再次拖累大盘\"精准预言了这场杀跌。它引爆了整个内存板块的崩塌——闪迪、美光、内存ETF（DRAM）集体重挫。就在上周它还以$265亿募资、7倍超购创下\"史上最佳ETF首秀\"，Benzinga如今直呼\"从最佳首秀到熊市，DRAM的疯狂过山车\"。当上市不过数日便高台跳水，海力士这波暴跌是内存超级周期被证伪，还是拥挤交易的剧烈出清？", title_en: "SK Hynix Plunges 9.3%, Igniting Memory Selloff — Is the Rally Over?", body_en: "SK Hynix (SKHY) cratered 9.32% to $152, reversing its post-IPO euphoria to lead the market lower — precisely as a SeekingAlpha piece warned it would \"drag down the broader market again.\" The rout rippled across the memory sector, sending SanDisk, Micron, and the DRAM ETF sharply lower. Just last week, SKHY raised $26.5B at 7x oversubscription in what was hailed as the \"best-ever ETF debut.\" Does today's plunge signal a memory supercycle bust, or a violent unwind of an overcrowded trade?" },
  { ticker: "SNDK", title_cn: "SanDisk崩跌12.6%领跌存储，内存超级周期一夜变脸，还能信吗？", body_cn: "SanDisk（SNDK）今日崩跌12.63%、失守$1,700，成为存储板块杀跌的重灾区。在SK海力士暴跌的连锁冲击下，存储与半导体设备股集体跳水——Nova、泰瑞达、Kulicke and Soffa等\"应声重挫\"。此前SNDK因内存超级周期狂热连创新高、高盛还给出惊人目标价，如今风向骤变、获利回吐汹涌。当\"史上最强内存行情\"在一周内从狂欢转为踩踏，SanDisk这12.6%的暴跌是黄金坑，还是超级周期见顶的确认？", title_en: "SanDisk Crashes 12.6% to Lead Storage Rout — Can the Memory Supercycle Be Trusted?", body_en: "SanDisk (SNDK) collapsed 12.63%, breaching $1,700, emerging as the hardest-hit name in the storage selloff. SK Hynix's contagion dragged down semiconductor equipment peers — Nova, Teradyne, and Kulicke & Soffa all tumbled in sympathy. SNDK had previously surged to record highs on memory supercycle fever, with Goldman Sachs issuing a bullish price target, but profit-taking is now overwhelming buyers. With the \"greatest memory rally ever\" turning into a stampede within a week, is SanDisk's 12.6% drop a golden entry or confirmation that the supercycle has peaked?" },
  { ticker: "MU", title_cn: "美光跌4.3%失守$940，\"AI超级牛论\"仍在但内存踩踏难挡，怎么选？", body_cn: "美光（MU）今日下跌4.32%、失守$940，随内存板块整体杀跌回落。多空剧烈拉扯：一位知名AI投资人重申\"英伟达、美光、博通的超级牛市论\"，中长线逻辑未变；但SK海力士暴跌引爆的板块踩踏、叠加美-伊局势重燃，短期抛压难挡。相较闪迪双位数暴跌，MU相对抗跌但仍难独善其身。当长期\"超级牛\"叙事撞上短期恐慌性抛售，美光失守$940后你会逢跌布局，还是等踩踏结束再说？", title_en: "Micron Falls 4.3%, Breaches $940 Amid Memory Rout — Buy the Dip or Wait?", body_en: "Micron (MU) dropped 4.32%, slipping below $940 as the broader memory sector sold off sharply. The bull-bear tug-of-war intensified: a prominent AI investor reiterated a \"super-bull thesis\" for Nvidia, Micron, and Broadcom, keeping the long-term narrative intact, while SK Hynix's collapse and renewed U.S.-Iran tensions unleashed near-term selling pressure. MU held up better than SanDisk's double-digit decline but could not escape the carnage. With a long-term \"super-bull\" thesis colliding with panic selling, will you buy Micron below $940 or wait for the stampede to clear?" },
  { ticker: "NVDA", title_cn: "英伟达跌3.5%回落$203，\"整个芯片交易在等一份财报\"，拐点将至？", body_cn: "英伟达（NVDA）今日下跌3.52%、回落至$203，随半导体板块普跌走弱，但相对内存股跌幅温和。市场焦点转向即将到来的关键财报——\"整个芯片交易都在等这一份报告\"，台积电等的指引将为AI叙事定调。同时知名AI投资人把NVDA列为\"超级牛市论\"的核心标的，长期逻辑仍受追捧。在海力士暴跌、美-伊局势扰动的短期恐慌中，英伟达的相对抗跌能否延续？这份关键财报会成为芯片股的拐点吗？", title_en: "Nvidia Slips 3.5% to $203 — \"Entire Chip Trade Awaiting One Earnings Report.\" Inflection Ahead?", body_en: "Nvidia (NVDA) fell 3.52% to $203, pulled lower by the broader semiconductor selloff but posting a relatively contained decline compared to memory peers. Market attention is pivoting to a pivotal upcoming earnings report — \"the entire chip trade is waiting for this one\" — with TSMC's guidance set to frame the AI narrative. A prominent AI investor continues to cite NVDA as the centerpiece of the \"super-bull thesis.\" Amid SK Hynix's collapse and U.S.-Iran tensions, can Nvidia's relative resilience hold — and will the key earnings report mark a turning point for chip stocks?" },
  { ticker: "SPCX", title_cn: "SpaceX再跌4.2%失守$140，花旗Jefferies齐发看多，分歧多大？", body_cn: "SpaceX（SPCX）今日再跌4.24%、失守$140，随科技回调与地缘扰动继续走弱。但机构却密集示好：花旗（Citi）向SpaceX投资者\"发出强力信号\"，Jefferies则称Tesla-SpaceX合并\"可能给股东带来溢价\"、并借此看多TSLA重返$400。此外有长线预测\"今日投入$2.5万，到2050年将增值可观\"。当股价持续下探、卖方却集体看多，SpaceX这波深跌你更信机构的长期蓝图，还是警惕地缘与情绪的短期杀跌？", title_en: "SpaceX Drops 4.2% Below $140; Citi and Jefferies Both Bullish — How Wide Is the Divide?", body_en: "SpaceX (SPCX) fell another 4.24%, slipping below $140 as tech weakness and geopolitical uncertainty continued to weigh. Yet institutional sentiment remains constructive: Citi sent a \"strong signal\" to SpaceX investors, while Jefferies argued a Tesla-SpaceX merger \"could deliver a premium to shareholders\" and used the thesis to back a TSLA return to $400. One long-range forecast projects a $25,000 investment today growing substantially by 2050. With the stock grinding lower while sell-side analysts turn collectively bullish, do you trust the institutions' long-term blueprint or heed the near-term geopolitical and sentiment-driven pressure?" },
  { ticker: "TSLA", title_cn: "特斯拉跌3.2%失守$400，Jefferies喊合并溢价能重返$400吗？", body_cn: "特斯拉（TSLA）今日下跌3.19%、失守$400，跌幅大于大盘。但看多声音同步升温：Jefferies明确给出\"TSLA重返$400\"的看涨逻辑，核心论据正是潜在的SpaceX合并\"可能为股东带来溢价\"；另有分析认为\"特斯拉的股价停滞即将结束\"。不过在美-伊局势重燃、科技普跌的大环境下，短期抛压难免。当合并溢价的想象撞上大盘杀跌，特斯拉失守$400后你会押注反弹，还是等地缘扰动平息？", title_en: "Tesla Drops 3.2% Below $400 — Can Jefferies' Merger Premium Thesis Drive a Recovery?", body_en: "Tesla (TSLA) declined 3.19%, breaching $400 and underperforming the broader market. Bullish voices are growing louder nonetheless: Jefferies laid out a clear case for TSLA returning to $400, anchored by the thesis that a potential SpaceX merger \"could deliver a premium to shareholders,\" while separate analysis argues Tesla's \"share price stagnation is about to end.\" Near-term headwinds persist, however, as renewed U.S.-Iran tensions and broad tech selling sustain selling pressure. With merger-premium optimism colliding with macro-driven weakness, will you bet on a TSLA rebound below $400 or wait for the geopolitical noise to subside?" },
  { ticker: "INTC", title_cn: "英特尔暴跌6.1%破$104，美-伊冲突+芯片踩踏双杀，还有底吗？", body_cn: "英特尔（INTC）今日暴跌6.12%、跌破$104，跌幅大于大盘，是半导体杀跌中的重灾区。宏观利空叠加：特朗普重启对伊朗的封锁、要求20%\"过路费\"，霍尔木兹局势重燃打压风险资产；半导体又因海力士暴跌集体踩踏。英特尔本就在AI芯片竞赛中掉队，杀跌日向下弹性更大。当地缘冲突与板块踩踏同时砸下，英特尔这波6%重挫是超跌机会，还是掉队者继续被抛的信号？", title_en: "Intel Plunges 6.1% Below $104 — U.S.-Iran Tensions and Chip Stampede Combine. Is There a Floor?", body_en: "Intel (INTC) tumbled 6.12%, breaking below $104 and suffering one of the steepest declines in the semiconductor selloff. A dual macro shock hit simultaneously: the Trump administration's reimposition of Iran sanctions and a demand for 20% \"transit fees\" reignited Strait of Hormuz concerns, pressuring risk assets broadly, while SK Hynix's meltdown sparked a sector-wide chip stampede. Intel, already trailing in the AI chip race, showed amplified downside on a risk-off day. With geopolitical shock and sector panic landing at once, is Intel's 6% plunge an oversold opportunity or a signal that a laggard continues to be abandoned?" },
  { ticker: "MSFT, AAPL", title_cn: "芯片血洗日，微软涨1.5%、苹果涨0.6%逆势收红，避险资金回流巨头？", body_cn: "在半导体与内存全面杀跌中，微软（MSFT）逆势上涨1.53%、报$391，苹果（AAPL）微涨0.63%、守在$317，成为杀跌日里罕见的红盘，凸显软件与消费巨头的防御价值。资金明显从暴跌的芯片/内存股撤向现金流稳定的巨头——HubSpot、Salesforce、Intuit等软件股同步走强；苹果则因起诉OpenAI窃密的\"重量级\"法律战继续吸睛。当AI交易从高波动的\"卖铲人\"转向确定性更强的软件与消费龙头，微软、苹果这轮避险买盘能持续多久，还是只是杀跌中的短暂避风港？", title_en: "Chips Bleed, Microsoft +1.5% and Apple +0.6% Outperform — Is Defensive Capital Rotating Into Mega-Caps?", body_en: "As semiconductors and memory stocks collapsed, Microsoft (MSFT) bucked the trend with a 1.53% gain to $391, while Apple (AAPL) edged up 0.63% to hold $317 — rare patches of green on a broadly red tape that underscored the defensive value of software and consumer platform giants. Capital visibly rotated out of battered chip and memory names into steady cash-flow compounders, with HubSpot, Salesforce, and Intuit advancing in tandem; Apple also drew attention from a high-profile lawsuit alleging OpenAI data theft. As AI-driven money shifts from high-volatility \"picks-and-shovels\" plays toward higher-certainty software and consumer leaders, can Microsoft and Apple's defensive bid last — or is this merely a fleeting shelter in the storm?" },
  { ticker: "MRVL", title_cn: "Marvell暴跌7.8%破$220，与同业集体重挫，AI芯片故事凉了吗？", body_cn: "Marvell（MRVL）今日暴跌7.75%、跌破$220，与Vishay、Allegro等模拟/芯片同业集体重挫。在海力士引爆的半导体踩踏中，前期涨多的定制AI芯片股回撤尤为剧烈。此前MRVL刚因\"隐藏增长引擎达里程碑\"被看好、又遭\"英伟达押注对手+被踢出指数\"的利空，多空分歧本就巨大，杀跌日放大了波动。当板块系统性下杀盖过个股逻辑，Marvell破$220是深度错杀，还是AI芯片估值集体回归的延续？", title_en: "Marvell Plunges 7.8% Below $220 Alongside Peers — Is the AI Chip Story Fading?", body_en: "Marvell (MRVL) plunged 7.75%, breaking below $220 as analog and chip peers including Vishay and Allegro sold off in unison. Custom AI chip names with elevated valuations bore the steepest pullbacks in the SK Hynix-triggered semiconductor stampede. MRVL had already been navigating a sharp bull-bear divide — recently praised for a \"hidden growth engine milestone\" while simultaneously pressured by reports of Nvidia backing a rival and an index exclusion. With systematic sector selling overwhelming stock-specific narratives, is Marvell's break below $220 a deep mispricing, or part of a broader AI chip valuation reset?" },
  { ticker: "ORCL", title_cn: "甲骨文跌6.5%逼近52周低$132，一个月暴跌28%，AI基建叙事崩了？", body_cn: "甲骨文（ORCL）今日下跌6.47%、报$131附近，逼近52周低点$132，一个月内已暴跌28%。在科技普跌与自身债务担忧的双重打压下，市场追问\"$132这道关口会守住还是跌穿\"。此前它因激进AI云资本开支、$1600亿债务与标普评级下调而持续承压，AI基建的宏大叙事正遭遇现实的偿债与盈利拷问。当一个月跌去近三成、逼近关键支撑，甲骨文是深度超跌的价值洼地，还是杠杆扩张后遗症刚开始显现？", title_en: "Oracle Drops 6.5%, Nears 52-Week Low of $132 After 28% One-Month Crash — Has the AI Infrastructure Narrative Broken Down?", body_en: "Oracle (ORCL) fell 6.47% to approximately $131, closing in on its 52-week low of $132 after losing 28% in a single month. Broad tech weakness compounded company-specific debt concerns, with markets questioning whether the $132 support level will hold. Oracle has faced sustained pressure from its aggressive AI cloud capex posture, $160 billion debt load, and an S&P credit-rating downgrade — forcing investors to weigh its grand AI infrastructure narrative against hard-nosed debt-service and profitability realities. After losing nearly 30% in a month and approaching a key technical level, is Oracle a deeply oversold value opportunity or the early stages of a leveraged-expansion hangover?" },
  { ticker: "META", title_cn: "Meta跌1.9%相对抗跌，\"整个芯片交易在等财报\"，巨头能扛住吗？", body_cn: "Meta（META）今日下跌1.86%、报$657，跌幅小于半导体板块，在杀跌日相对抗跌。作为AI应用与算力自建并进的巨头，META受地缘扰动与\"AI泡沫\"情绪拖累回调，但其自研芯片、Neocloud布局的长期逻辑仍获资金一定支撑。市场普遍在等待关键芯片财报为AI叙事定调。当美-伊局势重燃、芯片踩踏拖累大盘，Meta这类现金流强劲的应用型巨头，能否继续跑赢杀跌中的芯片股？", title_en: "Meta Dips 1.9%, Outperforms Chips — \"Entire Chip Trade Awaiting Earnings.\" Can Mega-Caps Hold?", body_en: "Meta (META) fell 1.86% to $657, posting a notably smaller decline than the semiconductor sector and demonstrating relative resilience on a brutal tape. As both an AI application powerhouse and a self-directed compute investor, META was not immune to geopolitical jitters and \"AI bubble\" sentiment, yet its custom silicon and Neocloud positioning continued to attract steady institutional support. Broader markets are holding their breath for critical chip earnings to set the tone for the AI narrative. With U.S.-Iran tensions reigniting and a chip stampede weighing on indices, can cash-flow-rich application giants like Meta continue to outperform battered semiconductor stocks?" },
  { ticker: "SPY", title_cn: "标普SPY跌0.8%，美-伊战火重燃+海力士杀跌，回调要扩大吗？", body_cn: "标普500 ETF（SPY）今日下跌0.77%、报$749，三大股指集体收跌。双重利空发酵：特朗普重启对伊朗封锁、霍尔木兹海峡局势再度紧张，\"美-伊战争担忧重现\"；同时SK海力士暴跌引爆半导体/内存板块踩踏，拖累科技权重股。避险情绪下资金转向防御性资产。当地缘冲突与AI龙头杀跌同时施压，这轮从高位的回调是短暂避险，还是更大级别调整的开端？", title_en: "SPY Falls 0.8% as U.S.-Iran Tensions and SK Hynix Rout Converge — Is the Pullback Deepening?", body_en: "The S&P 500 ETF (SPY) declined 0.77% to $749, with all three major indices closing lower as two distinct headwinds converged. On the macro front, the Trump administration's reimposition of Iran sanctions and renewed Strait of Hormuz tensions resurfaced war-risk premiums; simultaneously, SK Hynix's collapse triggered a semiconductor and memory sector stampede that dragged on tech-heavy index weights. Defensive flows rotated into safer assets amid the risk-off tone. With geopolitical shocks and AI bellwether selloffs hitting simultaneously, is this pullback from recent highs a brief flight to safety — or the opening leg of a more significant correction?" },
];
let current = 0;

function render() {
  if (!topics.length) return;
  const t = topics[current];
  document.getElementById('tickerTag').textContent = t.ticker || 'TOPIC';
  document.getElementById('titleCn').textContent   = t.title_cn;
  document.getElementById('bodyCn').textContent    = t.body_cn;
  document.getElementById('titleEn').textContent   = t.title_en;
  document.getElementById('bodyEn').textContent    = t.body_en;
  document.getElementById('progressText').textContent = (current+1) + ' / ' + topics.length;
  document.getElementById('progressBar').style.width  = ((current+1)/topics.length*100) + '%';
  document.getElementById('prevBtn').disabled = current === 0;
  document.getElementById('nextBtn').disabled = current === topics.length - 1;
  document.getElementById('doneBanner').style.display = 'none';
  document.getElementById('card').style.display = '';
  resetBtns();
}

function navigate(dir) {
  const next = current + dir;
  if (next >= 0 && next < topics.length) { current = next; render(); }
  else if (dir === 1 && current === topics.length - 1) {
    document.getElementById('doneBanner').style.display = 'block';
    document.getElementById('card').style.display = 'none';
  }
}

function resetBtns() {
  [
    ['.copy-title-cn-btn', '复制标题（中文）'],
    ['.copy-body-cn-btn',  '复制正文（中文）'],
    ['.copy-title-en-btn', 'Copy Title (EN)'],
    ['.copy-body-en-btn',  'Copy Body (EN)'],
  ].forEach(([sel, label]) => {
    const btn = document.querySelector(sel);
    if (btn) { btn.textContent = label; btn.classList.remove('copied'); }
  });
}

function copyField(field) {
  const text = topics[current][field];
  const labelMap = {
    title_cn: '复制标题（中文）',
    body_cn:  '复制正文（中文）',
    title_en: 'Copy Title (EN)',
    body_en:  'Copy Body (EN)',
  };
  const selMap = {
    title_cn: '.copy-title-cn-btn',
    body_cn:  '.copy-body-cn-btn',
    title_en: '.copy-title-en-btn',
    body_en:  '.copy-body-en-btn',
  };
  const btn = document.querySelector(selMap[field]);
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = labelMap[field];
      btn.classList.remove('copied');
    }, 1500);
  });
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft')           navigate(-1);
  if (e.key === 'ArrowRight')          navigate(1);
  if (e.key === '1')                   copyField('title_cn');
  if (e.key === '2')                   copyField('body_cn');
  if (e.key.toLowerCase() === 't')     copyField('title_en');
  if (e.key.toLowerCase() === 'b')     copyField('body_en');
});

render();
</script>
</body>
</html>
