<script>
const topics = [
  { ticker: "SKHY, SNDK, MU", title_cn: "海力士领跌存储集体崩盘，闪迪跌12.6%、美光失守$940，还能抄底吗？", body_cn: "存储板块今日集体崩盘。SK海力士（SKHY）暴跌9.32%、跌至$152，从上市狂欢急转为领跌全场，SeekingAlpha一篇\"海力士将再次拖累大盘\"精准预言；连带闪迪（SNDK）崩12.63%失守$1,700、美光（MU）跌4.32%失守$940、内存ETF（DRAM）跌9.11%、港股两倍做多产品更泻超10%。就在上周海力士还以$265亿募资、7倍超购创下\"史上最佳ETF首秀\"，转眼便高台跳水，\"内存派对见顶\"的警告正被兑现，叠加美-伊局势重燃打压风险偏好。狂欢一周内变踩踏——你觉得存储还能抄底吗？如果抄，你会选领跌的海力士、跌最狠的闪迪，还是相对抗跌的美光？", title_en: "SK Hynix Leads Memory Rout; SanDisk -12.6%, Micron Breaches $940 — Buy the Dip?", body_en: "Memory stocks collapsed across the board. SK Hynix (SKHY) plunged 9.32% to $152, reversing sharply from its blockbuster ETF debut — which raised $26.5B at 7x oversubscription last week — as a SeekingAlpha warning proved prescient. SanDisk (SNDK) cratered 12.63% below $1,700, Micron (MU) fell 4.32% below $940, DRAM ETF dropped 9.11%, and a Hong Kong 2x leveraged product shed over 10%, with US-Iran tensions further souring risk appetite. Is memory still a dip worth buying — and if so, do you pick SKHY, SNDK, or the relatively resilient MU?" },
  { ticker: "NVDA", title_cn: "英伟达跌3.5%回落$203，\"整个芯片交易在等一份财报\"，拐点将至？", body_cn: "英伟达（NVDA）今日下跌3.52%、回落至$203，随半导体板块普跌走弱，但相对内存股跌幅温和。市场焦点转向即将到来的关键财报——\"整个芯片交易都在等这一份报告\"，台积电等的指引将为AI叙事定调。同时知名AI投资人把NVDA列为\"超级牛市论\"的核心标的，长期逻辑仍受追捧。在海力士暴跌、美-伊局势扰动的短期恐慌中，英伟达的相对抗跌能否延续？这份关键财报会成为芯片股的拐点吗？", title_en: "Nvidia Slides 3.5% to $203 as Chip Trade Awaits One Crucial Earnings Report — Turning Point Ahead?", body_en: "Nvidia (NVDA) fell 3.52% to $203, declining with the broader semiconductor sector but posting a milder loss than memory peers. Market attention is shifting to an imminent earnings report — widely described as the one result \"the entire chip trade is waiting for\" — with TSMC guidance expected to set the tone for the AI narrative. Prominent AI investors continue to name NVDA as the core holding in their bull case. Amid the SK Hynix shock and US-Iran uncertainty, can Nvidia's relative resilience hold — and will this report mark a sector inflection point?" },
  { ticker: "SPCX", title_cn: "SpaceX再跌4.2%失守$140，花旗Jefferies齐发看多，分歧多大？", body_cn: "SpaceX（SPCX）今日再跌4.24%、失守$140，随科技回调与地缘扰动继续走弱。但机构却密集示好：花旗（Citi）向SpaceX投资者\"发出强力信号\"，Jefferies则称Tesla-SpaceX合并\"可能给股东带来溢价\"、并借此看多TSLA重返$400。此外有长线预测\"今日投入$2.5万，到2050年将增值可观\"。当股价持续下探、卖方却集体看多，SpaceX这波深跌你更信机构的长期蓝图，还是警惕地缘与情绪的短期杀跌？", title_en: "SpaceX Drops Another 4.2% Below $140; Citi and Jefferies Both Bullish — How Wide Is the Gap?", body_en: "SpaceX (SPCX) fell a further 4.24%, breaching $140, as tech weakness and geopolitical uncertainty continued to weigh. Institutional sentiment remains sharply contrarian: Citi sent a \"strong signal\" to SpaceX investors, while Jefferies argued a Tesla-SpaceX merger could deliver a shareholder premium and reiterated a $400 target on TSLA. Long-range forecasts suggest a $25,000 investment today could grow substantially by 2050. As the stock keeps sliding while sell-side analysts pile on bullish calls, do you trust the institutional long-term blueprint — or heed the near-term geopolitical and sentiment risks?" },
  { ticker: "TSLA", title_cn: "特斯拉跌3.2%失守$400，Jefferies喊合并溢价能重返$400吗？", body_cn: "特斯拉（TSLA）今日下跌3.19%、失守$400，跌幅大于大盘。但看多声音同步升温：Jefferies明确给出\"TSLA重返$400\"的看涨逻辑，核心论据正是潜在的SpaceX合并\"可能为股东带来溢价\"；另有分析认为\"特斯拉的股价停滞即将结束\"。不过在美-伊局势重燃、科技普跌的大环境下，短期抛压难免。当合并溢价的想象撞上大盘杀跌，特斯拉失守$400后你会押注反弹，还是等地缘扰动平息？", title_en: "Tesla Drops 3.2% Below $400; Jefferies Cites Merger Premium — Can It Reclaim $400?", body_en: "Tesla (TSLA) declined 3.19%, slipping below $400 and underperforming the broader market. Bulls are pushing back: Jefferies laid out a clear path for TSLA to reclaim $400, anchored on the premise that a potential SpaceX merger could generate a meaningful shareholder premium, while separate analysis argues Tesla's \"period of price stagnation is nearing its end.\" Near-term headwinds remain as US-Iran tensions reignite and tech sells off broadly. With merger-premium optimism colliding with macro-driven selling pressure, do you bet on a rebound from below $400 — or wait for geopolitical noise to fade first?" },
  { ticker: "INTC", title_cn: "英特尔暴跌6.1%破$104，美-伊冲突+芯片踩踏双杀，还有底吗？", body_cn: "英特尔（INTC）今日暴跌6.12%、跌破$104，跌幅大于大盘，是半导体杀跌中的重灾区。宏观利空叠加：特朗普重启对伊朗的封锁、要求20%\"过路费\"，霍尔木兹局势重燃打压风险资产；半导体又因海力士暴跌集体踩踏。英特尔本就在AI芯片竞赛中掉队，杀跌日向下弹性更大。当地缘冲突与板块踩踏同时砸下，英特尔这波6%重挫是超跌机会，还是掉队者继续被抛的信号？", title_en: "Intel Crashes 6.1% Below $104 Under US-Iran Pressure and Chip Rout — Is There a Floor?", body_en: "Intel (INTC) plummeted 6.12% to below $104, one of the hardest-hit names in today's semiconductor selloff. A double macro blow landed simultaneously: Trump's reimposition of Iran sanctions, including demands for a 20% \"transit fee,\" reignited Strait of Hormuz fears and crushed risk appetite, while SK Hynix's collapse triggered broad chip capitulation. Already trailing in the AI chip race, Intel shows amplified downside on heavy-volume selloff days. With geopolitical conflict and sector contagion hitting at once, is Intel's 6% plunge a deep-value entry — or a continued signal that laggards keep getting sold?" },
  { ticker: "MSFT, AAPL", title_cn: "芯片血洗日，微软涨1.5%、苹果涨0.6%逆势收红，避险资金回流巨头？", body_cn: "在半导体与内存全面杀跌中，微软（MSFT）逆势上涨1.53%、报$391，苹果（AAPL）微涨0.63%、守在$317，成为杀跌日里罕见的红盘，凸显软件与消费巨头的防御价值。资金明显从暴跌的芯片/内存股撤向现金流稳定的巨头——HubSpot、Salesforce、Intuit等软件股同步走强；苹果则因起诉OpenAI窃密的\"重量级\"法律战继续吸睛。当AI交易从高波动的\"卖铲人\"转向确定性更强的软件与消费龙头，微软、苹果这轮避险买盘能持续多久，还是只是杀跌中的短暂避风港？", title_en: "Chip Bloodbath: Microsoft +1.5%, Apple +0.6% Buck the Selloff — Safe-Haven Rotation Into Mega-Caps?", body_en: "As semiconductors and memory stocks were eviscerated, Microsoft (MSFT) gained 1.53% to $391 and Apple (AAPL) edged up 0.63% to $317, emerging as rare green spots and highlighting the defensive appeal of software and consumer giants. Capital visibly rotated out of beaten-down chip and memory names into steady cash-flow compounders — HubSpot, Salesforce, and Intuit moved higher in tandem, while Apple drew additional attention from a high-profile lawsuit alleging OpenAI trade-secret theft. As AI positioning shifts from volatile \"picks-and-shovels\" plays toward higher-certainty software and consumer leaders, can Microsoft and Apple's safe-haven bid last — or is it merely a temporary shelter in the storm?" },
  { ticker: "MRVL", title_cn: "Marvell暴跌7.8%破$220，与同业集体重挫，AI芯片故事凉了吗？", body_cn: "Marvell（MRVL）今日暴跌7.75%、跌破$220，与Vishay、Allegro等模拟/芯片同业集体重挫。在海力士引爆的半导体踩踏中，前期涨多的定制AI芯片股回撤尤为剧烈。此前MRVL刚因\"隐藏增长引擎达里程碑\"被看好、又遭\"英伟达押注对手+被踢出指数\"的利空，多空分歧本就巨大，杀跌日放大了波动。当板块系统性下杀盖过个股逻辑，Marvell破$220是深度错杀，还是AI芯片估值集体回归的延续？", title_en: "Marvell Plunges 7.8% Below $220 Alongside Peers — Is the AI Chip Story Over?", body_en: "Marvell (MRVL) tumbled 7.75% to below $220, falling in lockstep with Vishay, Allegro, and other analog and chip peers. Custom AI chip names that had rallied sharply bore the brunt of today's semiconductor capitulation triggered by SK Hynix's collapse. MRVL already carried elevated uncertainty — fresh bullish coverage citing a \"hidden growth engine milestone\" clashed with headwinds from Nvidia reportedly backing a rival and an index exclusion. With sector-wide selling overwhelming stock-specific fundamentals, is Marvell's break below $220 a deep mispricing — or part of a broader AI chip valuation reset?" },
  { ticker: "ORCL", title_cn: "甲骨文跌6.5%逼近52周低$132，一个月暴跌28%，AI基建叙事崩了？", body_cn: "甲骨文（ORCL）今日下跌6.47%、报$131附近，逼近52周低点$132，一个月内已暴跌28%。在科技普跌与自身债务担忧的双重打压下，市场追问\"$132这道关口会守住还是跌穿\"。此前它因激进AI云资本开支、$1600亿债务与标普评级下调而持续承压，AI基建的宏大叙事正遭遇现实的偿债与盈利拷问。当一个月跌去近三成、逼近关键支撑，甲骨文是深度超跌的价值洼地，还是杠杆扩张后遗症刚开始显现？", title_en: "Oracle Drops 6.5% Near 52-Week Low $132, Down 28% in One Month — Has the AI Infrastructure Story Broken Down?", body_en: "Oracle (ORCL) fell 6.47% to approximately $131, pressing against its 52-week low of $132 and extending a 28% one-month decline. The stock faces a dual overhang of broad tech weakness and mounting debt concerns, with markets now openly questioning whether the $132 support level holds. Aggressive AI cloud capital expenditure, $160B in total debt, and an S&P rating downgrade have kept sustained pressure on the name, forcing a hard reality check on the grand AI infrastructure narrative. Down nearly 30% in a month and testing critical support, is Oracle a deeply oversold value opportunity — or is the hangover from leveraged expansion only beginning to surface?" },
  { ticker: "META", title_cn: "Meta跌1.9%相对抗跌，\"整个芯片交易在等财报\"，巨头能扛住吗？", body_cn: "Meta（META）今日下跌1.86%、报$657，跌幅小于半导体板块，在杀跌日相对抗跌。作为AI应用与算力自建并进的巨头，META受地缘扰动与\"AI泡沫\"情绪拖累回调，但其自研芯片、Neocloud布局的长期逻辑仍获资金一定支撑。市场普遍在等待关键芯片财报为AI叙事定调。当美-伊局势重燃、芯片踩踏拖累大盘，Meta这类现金流强劲的应用型巨头，能否继续跑赢杀跌中的芯片股？", title_en: "Meta Slides 1.9% but Outperforms Amid Chip Carnage — Can the Mega-Cap Hold Up?", body_en: "Meta (META) fell 1.86% to $657, a notably smaller decline than the semiconductor sector, making it one of the relative outperformers on a bruising day. As both an AI application powerhouse and an in-house silicon developer with Neocloud ambitions, META was not immune to geopolitical jitters and AI-bubble sentiment, but its long-term thesis retained enough support to cushion the drop. The broader market is in a holding pattern, awaiting pivotal chip earnings to re-anchor the AI narrative. With US-Iran tensions flaring and chip stocks in freefall, can Meta and other cash-generative application-layer giants continue to outperform the hardware carnage?" },
  { ticker: "SPY", title_cn: "标普SPY跌0.8%，美-伊战火重燃+海力士杀跌，回调要扩大吗？", body_cn: "标普500 ETF（SPY）今日下跌0.77%、报$749，三大股指集体收跌。双重利空发酵：特朗普重启对伊朗封锁、霍尔木兹海峡局势再度紧张，\"美-伊战争担忧重现\"；同时SK海力士暴跌引爆半导体/内存板块踩踏，拖累科技权重股。避险情绪下资金转向防御性资产。当地缘冲突与AI龙头杀跌同时施压，这轮从高位的回调是短暂避险，还是更大级别调整的开端？", title_en: "SPY Drops 0.8% as US-Iran Tensions Reignite and Hynix Sparks Chip Rout — Is the Pullback Deepening?", body_en: "The S&P 500 ETF (SPY) fell 0.77% to $749, with all three major indices closing in the red. Two catalysts drove the selloff: Trump's reimposition of Iran sanctions ratcheted up Strait of Hormuz tensions and revived war-risk concerns, while SK Hynix's collapse ignited a full-scale semiconductor and memory capitulation that dragged down heavily-weighted tech names. Defensive assets attracted inflows as risk sentiment deteriorated sharply. With geopolitical conflict and AI-sector selling hitting simultaneously, is this pullback from recent highs a brief risk-off pause — or the early stage of a more significant correction?" },
];
let current = 0;

function render() {
  if (!topics.length) return;
  const t = topics[current];
  document.getElementById('tickerTag').textContent = t.ticker || 'TOPIC';
  document.getElementById('titleCn').textContent   = t.title_cn;
  document.getElementById('bodyCn').textContent    = t.body_cn;
  document.getElementById('titleEn').textContent   = t.title_en;
  document.getElementById('bodyEn').textContent    = t.body_en;
  document.getElementById('progressText').textContent = (current+1) + ' / ' + topics.length;
  document.getElementById('progressBar').style.width  = ((current+1)/topics.length*100) + '%';
  document.getElementById('prevBtn').disabled = current === 0;
  document.getElementById('nextBtn').disabled = current === topics.length - 1;
  document.getElementById('doneBanner').style.display = 'none';
  document.getElementById('card').style.display = '';
  resetBtns();
}

function navigate(dir) {
  const next = current + dir;
  if (next >= 0 && next < topics.length) { current = next; render(); }
  else if (dir === 1 && current === topics.length - 1) {
    document.getElementById('doneBanner').style.display = 'block';
    document.getElementById('card').style.display = 'none';
  }
}

function resetBtns() {
  [
    ['.copy-title-cn-btn', '复制标题（中文）'],
    ['.copy-body-cn-btn',  '复制正文（中文）'],
    ['.copy-title-en-btn', 'Copy Title (EN)'],
    ['.copy-body-en-btn',  'Copy Body (EN)'],
  ].forEach(([sel, label]) => {
    const btn = document.querySelector(sel);
    if (btn) { btn.textContent = label; btn.classList.remove('copied'); }
  });
}

function copyField(field) {
  const text = topics[current][field];
  const labelMap = {
    title_cn: '复制标题（中文）',
    body_cn:  '复制正文（中文）',
    title_en: 'Copy Title (EN)',
    body_en:  'Copy Body (EN)',
  };
  const selMap = {
    title_cn: '.copy-title-cn-btn',
    body_cn:  '.copy-body-cn-btn',
    title_en: '.copy-title-en-btn',
    body_en:  '.copy-body-en-btn',
  };
  const btn = document.querySelector(selMap[field]);
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = labelMap[field];
      btn.classList.remove('copied');
    }, 1500);
  });
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft')           navigate(-1);
  if (e.key === 'ArrowRight')          navigate(1);
  if (e.key === '1')                   copyField('title_cn');
  if (e.key === '2')                   copyField('body_cn');
  if (e.key.toLowerCase() === 't')     copyField('title_en');
  if (e.key.toLowerCase() === 'b')     copyField('body_en');
});

render();
</script>
</body>
</html>
