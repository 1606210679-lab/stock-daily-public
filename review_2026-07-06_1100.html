<script>
const topics = [
  { ticker: "MU", title_cn: "美光跌5.5%失守$1000，刚签下通用又被诉，超级周期变味了吗？", body_cn: "美光（MU）今日回落5.49%、失守$1,000关口，但基本面仍在加码：公司刚与通用汽车（GM）签订战略供货协议，锁定车用存储的长期需求。另一面，MU却因\"AI热潮下DRAM价格暴涨\"被起诉，恰恰反证内存紧缺已紧到下游开始反弹。多头坚持的\"短缺延续到2027年后\"逻辑未变，今日更像获利了结而非趋势反转。签下车企大单 vs 涨价惹官司，美光这波回调你会加仓，还是等企稳？", title_en: "Micron Drops 5.5% Below $100, Sued Over DRAM Prices After GM Deal — Is the Super Cycle Turning?", body_en: "Micron (MU) fell 5.49%, breaching the $100 mark, even as fundamentals strengthened: the company just signed a strategic supply agreement with General Motors (GM), securing long-term automotive memory demand. Simultaneously, MU faces a lawsuit alleging artificial DRAM price inflation amid the AI boom — ironically confirming how acute the memory shortage has become. Bulls maintain the supply shortage extends beyond 2027, framing today's move as profit-taking rather than trend reversal. With a major automaker deal signed against a price-gouging lawsuit, would you add to MU on this dip or wait for stabilization?" },
  { ticker: "SNDK", title_cn: "SanDisk重挫14%，牵手铠侠锁产到2034，超级周期退潮了吗？", body_cn: "SanDisk（SNDK）今日暴跌14.13%、回落至$1,745，是前期内存超级周期最猛标的的一次剧烈获利了结。基本面并未转弱：公司宣布与铠侠（Kioxia）启动第十代3D NAND量产、合作锁定至2034年，供给端护城河进一步加深。但从美光财报后一路抛物线上涨，单日两位数回撤说明交易过度拥挤、杠杆资金开始撤退。存储最纯粹的高弹性标的，14%急杀是上车机会，还是拥挤交易破裂的第一张多米诺？", title_en: "SanDisk Crashes 14%, Locks Kioxia Supply Through 2034 — Is the Super Cycle Fading?", body_en: "SanDisk (SNDK) plunged 14.13% to $1,745, marking a violent profit-taking session in one of the memory super-cycle's most aggressive names. Fundamentals remain intact: the company announced Gen-10 3D NAND mass production with Kioxia, with the partnership secured through 2034, deepening its supply-side moat. Yet the parabolic rally following Micron's earnings and today's double-digit single-day reversal signal an overcrowded trade with leveraged capital unwinding. Is SNDK's 14% selloff a buying opportunity in the purest memory play, or the first domino in a crowded-trade unwind?" },
  { ticker: "SPCX", title_cn: "SpaceX逆势涨2.8%，特斯拉合并传闻升温，太空叙事要变天吗？", body_cn: "SpaceX（SPCX）今日逆半导体颓势上涨2.83%、站上$162，成为科技普跌中的少数亮点。催化来自华尔街热议的\"特斯拉与SpaceX合并概率超80%\"——若成真，将把马斯克旗下火箭、星链与电动车资产打包，重塑太空商业化叙事。SeekingAlpha同步指出太空板块的增长前景正加速兑现。不过合并仍停留在传闻与期权异动层面，缺乏官方确认。芯片杀跌日资金抱团太空题材，你认为SpaceX是避风港，还是又一轮概念炒作？", title_en: "SpaceX Rises 2.8% as Tesla Merger Speculation Heats Up — Is the Space Narrative Shifting?", body_en: "SpaceX (SPCX) gained 2.83% to $162, standing out as a rare bright spot amid broad semiconductor weakness. The catalyst: Wall Street buzz placing the probability of a Tesla-SpaceX merger above 80%, which would bundle Musk's rocket, Starlink, and EV assets into a single entity, reshaping the commercial space narrative. SeekingAlpha also highlighted accelerating growth prospects for the space sector. However, the merger remains at the rumor and options-activity stage with no official confirmation. As capital rotates into space themes on a chip selloff day, is SpaceX a genuine safe haven or another round of hype-driven speculation?" },
  { ticker: "SOXL", title_cn: "三倍半导体SOXL崩16.6%，500亿杠杆再平衡引爆，还能抄底吗？", body_cn: "三倍做多半导体ETF（SOXL）今日崩跌16.58%、跌至$181，成为半导体板块回调的放大器。Benzinga警示本轮杠杆ETF再平衡规模高达500亿美元，正成为驱动美股波动的\"强力暗流\"；SeekingAlpha更直言杠杆半导体基金\"在借来的时间里生存\"。3倍杠杆在下跌日会加速衰减、放大亏损，绝非长持工具。当芯片龙头集体获利了结、杠杆资金被迫平仓，SOXL的16%急杀是短线反弹诱饵，还是杠杆踩踏的开始？", title_en: "3x Semiconductor ETF SOXL Crashes 16.6% as $50B Leverage Rebalancing Hits — Can You Still Buy the Dip?", body_en: "The 3x leveraged semiconductor ETF (SOXL) collapsed 16.58% to $181, amplifying the sector's broad pullback. Benzinga warned that the current leveraged ETF rebalancing cycle — totaling $50 billion — is becoming a powerful undercurrent driving U.S. equity volatility, while SeekingAlpha bluntly stated leveraged semiconductor funds are \"living on borrowed time.\" Triple leverage accelerates decay and magnifies losses on down days, making it wholly unsuitable as a long-term holding. With chip leaders booking profits and leveraged capital forced to deleverage, is SOXL's 16% crash a short-term bounce setup or the beginning of a full leverage liquidation cascade?" },
  { ticker: "NVDA", title_cn: "英伟达仅跌1.4%抗住杀跌，上半年却跑输AMD英特尔，龙头掉队了吗？", body_cn: "英伟达（NVDA）今日仅微跌1.39%、守住$195，在半导体普跌中相对抗跌，但市场焦点是\"上半年NVDA跑输AMD与英特尔\"的掉队叙事。生态层面NVDA仍在加固护城河：Anthropic的Claude模型已跑在Blackwell Ultra GPU上、并接入微软Foundry，黄仁勋又抛出\"AI新瓶颈\"话题继续定义行业议程。相对强弱转弱但基本面未破。当资金在芯片股内部把NVDA当成\"落后补涨\"标的，你会趁龙头掉队时布局，还是继续追高beta？", title_en: "Nvidia Holds With Only 1.4% Drop, Yet Trails AMD and Intel YTD — Is the Leader Falling Behind?", body_en: "Nvidia (NVDA) dipped just 1.39% to $195, showing relative resilience during a broad semiconductor selloff, but market focus has shifted to NVDA underperforming AMD and Intel year-to-date. The AI ecosystem moat remains intact: Anthropic's Claude is now running on Blackwell Ultra GPUs and integrated into Microsoft Foundry, while CEO Jensen Huang continues to shape industry discourse around \"new AI bottlenecks.\" Relative momentum has softened but fundamentals are unbroken. As capital positions NVDA as a laggard catch-up play within the chip sector, would you buy into the relative weakness or continue chasing higher-beta names?" },
  { ticker: "TSLA", title_cn: "特斯拉跌7.5%失守$400，SpaceX合并传闻搅局，市值之争谁赢？", body_cn: "特斯拉（TSLA）今日重挫7.49%、跌破$400关口，成为Mag 7中今日最弱一员。消息面双向拉扯：一边是\"与SpaceX合并概率超80%\"的重磅传闻，一边是特斯拉市值回落至1.48万亿、与Meta打平的\"巨头市值之争\"。基本面上，特斯拉与法拉利转向铜替代材料的$41亿供应链变化也在发酵。高估值+高beta让TSLA在杀跌日首当其冲。当合并想象空间对冲不了7%的抛压，特斯拉失守$400后你会抄底，还是等基本面拐点？", title_en: "Tesla Plunges 7.5% Below $400, SpaceX Merger Rumors Swirl — Who Wins the Market Cap War?", body_en: "Tesla (TSLA) tumbled 7.49%, breaking below $400 to become the weakest Mag 7 constituent on the day. News flow cut both ways: merger speculation placing SpaceX combination odds above 80% competed with Tesla's market cap sliding to $1.48 trillion — drawing level with Meta in a high-profile valuation contest. On the fundamental side, a $4.1 billion supply chain shift toward copper alternatives, shared with Ferrari, is also in play. High valuation and high beta made TSLA the first casualty on a risk-off day. With merger optionality unable to absorb a 7% selloff, would you buy Tesla below $400 or wait for a fundamental inflection point?" },
  { ticker: "MRVL", title_cn: "Marvell跌近10%，UBS却上调目标价，这波杀跌是错杀吗？", body_cn: "Marvell（MRVL）今日大跌9.84%、回落至$245，与基本面信号明显背离——就在杀跌当口，UBS与Cantor Fitzgerald先后上调其目标价，看好其定制AI芯片与Active Electrical Cable业务的成长性。这轮下跌更多是半导体板块整体获利了结、杠杆资金撤退所致，而非公司个体利空。当卖方持续加码、股价却随板块急挫，MRVL近10%的回调是被错杀的加仓窗口，还是AI芯片估值集体回归的前奏？", title_en: "Marvell Drops Nearly 10%, But UBS Raises Price Target — Is This a Mistaken Selloff?", body_en: "Marvell (MRVL) fell 9.84% to $245, sharply diverging from its fundamental signals — both UBS and Cantor Fitzgerald raised price targets on the same day, citing growth in custom AI chips and Active Electrical Cable businesses. The selloff appears driven by broad semiconductor sector profit-taking and forced leveraged deleveraging rather than any company-specific negative catalyst. With sell-side conviction rising while the stock drops in lockstep with the sector, is MRVL's near-10% pullback a mispriced entry window, or the opening act of a broader AI chip valuation reset?" },
  { ticker: "MSFT", title_cn: "微软逆势涨1.6%，Copilot要合并成统一App，防御属性回来了？", body_cn: "微软（MSFT）今日逆势上涨1.62%、站稳$390，在芯片股集体杀跌中显现防御价值。产品面动作密集：微软计划把分散的Copilot AI助手整合成统一App，同时在Azure Foundry接入Anthropic的Claude模型（由英伟达GPU驱动），软件+平台的AI变现路径更清晰。行业层面，\"大科技为抢电力发愁的3万亿难题\"也提示AI基建的现实约束。当资金从高beta芯片撤向确定性更强的软件巨头，微软这轮相对强势能否延续？", title_en: "Microsoft Gains 1.6% as Copilot Merges Into Unified App — Is Defensive Appeal Back?", body_en: "Microsoft (MSFT) advanced 1.62% to $390, demonstrating defensive value as chip stocks sold off broadly. On the product front, Microsoft plans to consolidate its fragmented Copilot AI assistants into a single unified app, while Azure Foundry now integrates Anthropic's Claude — powered by Nvidia GPUs — sharpening the software-plus-platform AI monetization path. At the macro level, the \"$3 trillion power scramble among Big Tech\" highlights real infrastructure constraints on AI buildout. As capital rotates from high-beta chips into software giants with more predictable earnings, can Microsoft's relative outperformance be sustained?" },
  { ticker: "AAPL", title_cn: "苹果大涨4.8%领跑巨头，但库克警告内存\"极度短缺\"，反弹能续吗？", body_cn: "苹果（AAPL）今日大涨4.84%、回到$308，是今日Mag 7中最强的一员，资金在科技杀跌日明显向确定性避险的苹果聚拢。但隐忧仍在：CEO库克公开警告内存\"极度短缺\"，而内存正是美光、SanDisk暴涨的源头——上游涨价意味着苹果硬件成本与毛利率将持续承压。短期避险买盘与中期成本压力在此交汇。当苹果既是杀跌日的避风港、又是内存超级周期的成本承受方，这波近5%反弹你会追，还是担心margin被侵蚀？", title_en: "Apple Surges 4.8% to Lead Mag 7, But Cook Warns of 'Extreme' Memory Shortage — Can the Rally Last?", body_en: "Apple (AAPL) jumped 4.84% to $308, the strongest Mag 7 performer of the day, as investors sought safety in the company's predictable cash flows during a broad tech selloff. The risk, however, is mounting: CEO Tim Cook publicly flagged an \"extreme\" memory shortage — the same supply tightness that has driven Micron and SanDisk sharply higher — signaling sustained upward pressure on Apple's hardware costs and gross margins. Near-term safe-haven buying and medium-term cost headwinds are now in direct tension. With Apple serving as both a selloff refuge and a cost-bearing end-user of the memory super cycle, would you chase this near-5% rebound or stay cautious on margin erosion?" },
  { ticker: "QQQ", title_cn: "纳指QQQ回落1.7%，3500亿流动性将抽离，创纪录后要变盘吗？", body_cn: "纳指100 ETF（QQQ）今日回落1.73%、跌至$712，为上周创纪录行情后的首次像样回撤。宏观暗流正在积聚：SeekingAlpha警示今夏将有约3500亿美元流动性从市场抽离，并把当前行情定性为\"杠杆泡沫而非盈利泡沫\"，Mag 7的高集中度既是机会也是风险。杠杆ETF被迫再平衡进一步放大了波动。当流动性退潮遇上过度拥挤的科技交易，这轮从高位回调是健康换手，还是更大级别调整的前奏？", title_en: "QQQ Pulls Back 1.7% as $350B Liquidity Drain Looms — Is a Reversal Coming After Record Highs?", body_en: "The Nasdaq 100 ETF (QQQ) retreated 1.73% to $712, marking its first meaningful pullback after last week's record-setting rally. Macro headwinds are building: SeekingAlpha warns approximately $350 billion in liquidity will be withdrawn from markets this summer, characterizing the current environment as a \"leverage bubble rather than an earnings bubble,\" with Mag 7 concentration amplifying both upside and downside risk. Forced leveraged ETF rebalancing further magnified today's volatility. As liquidity ebbs and crowded tech trades unwind, is this pullback from the highs a healthy rotation, or the early signal of a larger-scale correction?" },

  { ticker: "META", title_cn: "Meta跌4.9%，禁工程师用Claude引热议，AI自研路走对了吗？", body_cn: "Meta（META）今日下跌4.90%、回落至$583，随大盘科技股承压。消息面颇具看点：Meta被曝限制工程师使用Anthropic的Claude，凸显其押注自研大模型、与外部AI供应商划清界限的战略取向；同时市值回落至1.48万亿、与特斯拉打平，引发\"巨头市值之争\"。分析师则聚焦Meta在Neocloud与超大规模云之间的算力布局机会。当自研AI的决心遇上短期股价压力，Meta这波回调你会视作布局良机，还是担心AI投入回报存疑？", title_en: "Meta Drops 4.9%, Bans Engineers From Using Claude — Is Its In-House AI Strategy the Right Bet?", body_en: "Meta (META) fell 4.90% to $583, pressured alongside broader mega-cap tech. In a notable strategic signal, Meta reportedly restricted engineers from using Anthropic's Claude, underscoring its commitment to proprietary large language models and a deliberate separation from external AI vendors. Meanwhile, its market cap slid to $1.48 trillion — drawing level with Tesla — reigniting the \"mega-cap valuation race\" narrative. Analysts are also focused on Meta's compute positioning across Neocloud and hyperscaler infrastructure. With in-house AI ambition colliding with near-term stock pressure, is Meta's pullback a strategic entry point, or do concerns about AI investment returns justify caution?" },
  { ticker: "ORCL", title_cn: "甲骨文跌1.6%遭遇1990年来最惨月，AI基建叙事崩了吗？", body_cn: "甲骨文（ORCL）今日续跌1.56%、报$140附近，更受关注的是它刚经历\"1990年以来最糟糕的一个月\"，市场质疑其激进AI云资本开支与债务扩张的可持续性。但公司仍在做多AI基建：宣布启动第三批\"Oracle国防生态\"合作，绑定政府与国防AI需求；行业层面$7500亿AI基建投资浪潮的叙事也未散。当股价已深度回调、基本面动作却在加码，甲骨文是AI基建被错杀的价值洼地，还是杠杆扩张后遗症才刚显现？", title_en: "Oracle Drops 1.6%, Suffers Worst Month Since 1990 — Has the AI Infrastructure Narrative Broken Down?", body_en: "Oracle (ORCL) extended its decline by 1.56% to around $140, with the market more focused on the stock just enduring its worst month since 1990 amid growing scrutiny over the sustainability of its aggressive AI cloud capital expenditure and debt expansion. Yet the company continues to double down on AI infrastructure: it announced a third batch of \"Oracle Defense Ecosystem\" partnerships, locking in government and defense AI demand, while the broader $750 billion AI infrastructure investment thesis remains intact. With the stock deeply discounted but fundamental initiatives accelerating, is Oracle a mispriced AI infrastructure value play, or is the hangover from leveraged expansion only beginning to surface?" },
];
let current = 0;

function render() {
  if (!topics.length) return;
  const t = topics[current];
  document.getElementById('tickerTag').textContent = t.ticker || 'TOPIC';
  document.getElementById('titleCn').textContent   = t.title_cn;
  document.getElementById('bodyCn').textContent    = t.body_cn;
  document.getElementById('titleEn').textContent   = t.title_en;
  document.getElementById('bodyEn').textContent    = t.body_en;
  document.getElementById('progressText').textContent = (current+1) + ' / ' + topics.length;
  document.getElementById('progressBar').style.width  = ((current+1)/topics.length*100) + '%';
  document.getElementById('prevBtn').disabled = current === 0;
  document.getElementById('nextBtn').disabled = current === topics.length - 1;
  document.getElementById('doneBanner').style.display = 'none';
  document.getElementById('card').style.display = '';
  resetBtns();
}

function navigate(dir) {
  const next = current + dir;
  if (next >= 0 && next < topics.length) { current = next; render(); }
  else if (dir === 1 && current === topics.length - 1) {
    document.getElementById('doneBanner').style.display = 'block';
    document.getElementById('card').style.display = 'none';
  }
}

function resetBtns() {
  [
    ['.copy-title-cn-btn', '复制标题（中文）'],
    ['.copy-body-cn-btn',  '复制正文（中文）'],
    ['.copy-title-en-btn', 'Copy Title (EN)'],
    ['.copy-body-en-btn',  'Copy Body (EN)'],
  ].forEach(([sel, label]) => {
    const btn = document.querySelector(sel);
    if (btn) { btn.textContent = label; btn.classList.remove('copied'); }
  });
}

function copyField(field) {
  const text = topics[current][field];
  const labelMap = {
    title_cn: '复制标题（中文）',
    body_cn:  '复制正文（中文）',
    title_en: 'Copy Title (EN)',
    body_en:  'Copy Body (EN)',
  };
  const selMap = {
    title_cn: '.copy-title-cn-btn',
    body_cn:  '.copy-body-cn-btn',
    title_en: '.copy-title-en-btn',
    body_en:  '.copy-body-en-btn',
  };
  const btn = document.querySelector(selMap[field]);
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = labelMap[field];
      btn.classList.remove('copied');
    }, 1500);
  });
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft')           navigate(-1);
  if (e.key === 'ArrowRight')          navigate(1);
  if (e.key === '1')                   copyField('title_cn');
  if (e.key === '2')                   copyField('body_cn');
  if (e.key.toLowerCase() === 't')     copyField('title_en');
  if (e.key.toLowerCase() === 'b')     copyField('body_en');
});

render();
</script>
</body>
</html>
