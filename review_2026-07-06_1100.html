<script>
const topics = [
  { ticker: "MU", title_cn: "美光日间跌5.5%夜盘反抽3.5%，签下通用又被诉，超级周期还在吗？", body_cn: "美光（MU）今日日间大跌5.49%、失守$1,000关口，但夜盘迅速反抽3.49%、重回$1,009，日间更像获利了结而非趋势反转。基本面持续加码：公司刚与通用汽车（GM）签订战略供货协议、锁定车用存储长期需求，另一面又因\"AI热潮下DRAM价格暴涨\"被起诉，反证内存紧缺已传导至下游。多头坚持的\"短缺延续到2027年后\"逻辑未变。日间杀跌、夜盘抢反弹，美光这波你会趁回调加仓，还是等$1000关口反复确认？", title_en: "Micron Drops 5.5% Intraday, Rebounds 3.5% After-Hours; GM Deal Signed Amid Lawsuit — Is the Super-Cycle Still Intact?", body_en: "Micron (MU) plunged 5.49% during regular trading, breaching the $1,000 level, before rebounding 3.49% after-hours to reclaim $1,009 — the intraday selloff resembling profit-taking rather than a trend reversal. Fundamentals continue to strengthen: MU just signed a strategic supply agreement with General Motors (GM) securing long-term automotive memory demand, while simultaneously facing a lawsuit alleging DRAM price-gouging amid AI-driven shortages — itself confirming upstream tightness has reached end markets. The bull thesis of \"shortage extending beyond 2027\" remains intact. With the intraday dip and after-hours snap-back, will you buy MU on this pullback or wait for $1,000 to hold as confirmed support?" },
  { ticker: "SNDK", title_cn: "SanDisk日间崩14%夜盘急拉5.7%，锁产铠侠到2034，是错杀吗？", body_cn: "SanDisk（SNDK）今日日间暴跌14.13%、回落至$1,745，盘后夜盘却急拉5.71%、反弹至$1,844，剧烈双向波动凸显交易极度拥挤。基本面并未转弱：公司宣布与铠侠（Kioxia）启动第十代3D NAND量产、合作锁定至2034年，供给端护城河进一步加深。日间两位数回撤更像杠杆资金踩踏，夜盘V型反抽则显示抄底盘涌入。存储最纯的高弹性标的，SNDK这波日间急杀+夜盘反扑，你会当上车机会，还是提防二次探底？", title_en: "SanDisk Crashes 14% Intraday, Surges 5.7% After-Hours; Kioxia Deal Locked to 2034 — Oversold?", body_en: "SanDisk (SNDK) cratered 14.13% during regular trading to $1,745 before surging 5.71% after-hours to $1,844, the violent two-way swings reflecting extreme positioning crowding. Fundamentals remain solid: SNDK announced the launch of 10th-generation 3D NAND mass production with Kioxia, locking in the partnership through 2034 and deepening its supply-side moat. The double-digit intraday decline looks more like leveraged-fund liquidation than a fundamental breakdown, while the V-shaped after-hours recovery signals aggressive dip-buying. As the purest high-beta memory play, is SNDK's intraday flush an entry opportunity, or do you see risk of a secondary retest?" },
  { ticker: "SPCX", title_cn: "SpaceX逆势涨2.8%，特斯拉合并传闻升温，太空叙事要变天吗？", body_cn: "SpaceX（SPCX）今日逆半导体颓势上涨2.83%、站上$162，成为科技普跌中的少数亮点。催化来自华尔街热议的\"特斯拉与SpaceX合并概率超80%\"——若成真，将把马斯克旗下火箭、星链与电动车资产打包，重塑太空商业化叙事。SeekingAlpha同步指出太空板块的增长前景正加速兑现。不过合并仍停留在传闻与期权异动层面，缺乏官方确认。芯片杀跌日资金抱团太空题材，你认为SpaceX是避风港，还是又一轮概念炒作？", title_en: "SpaceX Gains 2.8% as Tesla Merger Speculation Intensifies — Is the Space Narrative Shifting?", body_en: "SpaceX (SPCX) bucked the semiconductor selloff, rising 2.83% to $162, emerging as one of the few bright spots in a broad tech decline. The catalyst: Wall Street buzz placing the probability of a Tesla-SpaceX merger above 80% — a deal that would bundle Musk's rocket, Starlink, and EV assets, fundamentally reshaping the commercial space narrative. SeekingAlpha simultaneously highlighted accelerating growth prospects across the space sector. However, the merger remains at the rumor and options-activity stage, with no official confirmation. As capital rotates into space themes on a chip-selloff day, is SpaceX a genuine safe haven or another round of narrative speculation?" },
  { ticker: "SOXL", title_cn: "三倍半导体SOXL日间崩16.6%夜盘反弹7.5%，杠杆踩踏结束了吗？", body_cn: "三倍做多半导体ETF（SOXL）今日日间崩跌16.58%、跌至$181，夜盘随即反弹7.54%、回到$195，波动被3倍杠杆成倍放大。Benzinga警示本轮杠杆ETF再平衡规模高达500亿美元，正成为驱动美股波动的\"强力暗流\"。3倍杠杆在震荡中加速衰减、放大亏损，绝非长持工具。日间踩踏、夜盘反抽，SOXL这剧烈双向波动是短线博反弹的机会，还是杠杆资金出逃尚未结束的信号？", title_en: "3x Semiconductor ETF SOXL Crashes 16.6% Intraday, Rebounds 7.5% After-Hours — Is the Leverage Unwind Over?", body_en: "The 3x leveraged semiconductor ETF (SOXL) collapsed 16.58% during regular trading to $181 before rebounding 7.54% after-hours to $195, with 3x leverage amplifying every swing. Benzinga warned that the current leveraged ETF rebalancing cycle involves $50 billion in forced repositioning, acting as a powerful undercurrent driving U.S. equity volatility. Triple leverage accelerates decay and magnifies losses in choppy markets, making it unsuitable for long-term holding. Is SOXL's violent two-way action a short-term bounce opportunity, or a signal that leveraged-fund liquidation is far from over?" },
  { ticker: "NVDA", title_cn: "英伟达仅跌1.4%抗住杀跌，上半年却跑输AMD英特尔，龙头掉队了吗？", body_cn: "英伟达（NVDA）今日仅微跌1.39%、守住$195，在半导体普跌中相对抗跌，但市场焦点是\"上半年NVDA跑输AMD与英特尔\"的掉队叙事。生态层面NVDA仍在加固护城河：Anthropic的Claude模型已跑在Blackwell Ultra GPU上、并接入微软Foundry，黄仁勋又抛出\"AI新瓶颈\"话题继续定义行业议程。相对强弱转弱但基本面未破。当资金在芯片股内部把NVDA当成\"落后补涨\"标的，你会趁龙头掉队时布局，还是继续追高beta？", title_en: "Nvidia Dips Only 1.4%, Outperforms on Down Day — But Has It Trailed AMD and Intel YTD?", body_en: "Nvidia (NVDA) slipped just 1.39% to $195, demonstrating relative resilience during a broad semiconductor selloff, yet market attention has shifted to the narrative of NVDA underperforming AMD and Intel in the first half of the year. The AI ecosystem moat continues to deepen: Anthropic's Claude is now running on Blackwell Ultra GPUs and integrated into Microsoft Foundry, while CEO Jensen Huang reignited industry debate by identifying a new AI bottleneck. Relative strength has faded, but the fundamental thesis remains intact. With capital treating NVDA as a laggard catch-up play within chips, will you position in the fallen leader or keep chasing higher-beta names?" },
  { ticker: "TSLA", title_cn: "特斯拉跌7.5%失守$400，SpaceX合并传闻搅局，市值之争谁赢？", body_cn: "特斯拉（TSLA）今日重挫7.49%、跌破$400关口，成为Mag 7中今日最弱一员。消息面双向拉扯：一边是\"与SpaceX合并概率超80%\"的重磅传闻，一边是特斯拉市值回落至1.48万亿、与Meta打平的\"巨头市值之争\"。基本面上，特斯拉与法拉利转向铜替代材料的$41亿供应链变化也在发酵。高估值+高beta让TSLA在杀跌日首当其冲。当合并想象空间对冲不了7%的抛压，特斯拉失守$400后你会抄底，还是等基本面拐点？", title_en: "Tesla Plunges 7.5%, Breaks $400; SpaceX Merger Rumors Swirl — Who Wins the Market Cap Battle?", body_en: "Tesla (TSLA) tumbled 7.49%, breaking below $400 and ranking as the weakest Mag 7 name on the day. News flow pulled in both directions: merger speculation placing the probability of a Tesla-SpaceX combination above 80% clashed with Tesla's market cap falling to $1.48 trillion, drawing level with Meta in a high-profile megacap valuation contest. On the fundamental side, a $4.1 billion supply chain shift toward copper alternatives — a move shared with Ferrari — is also gaining attention. High valuation and high beta made TSLA the first casualty on a risk-off day. With merger optionality failing to offset 7% selling pressure, will you buy the $400 breakdown or wait for a fundamental inflection?" },
  { ticker: "MRVL", title_cn: "Marvell跌近10%，UBS却上调目标价，这波杀跌是错杀吗？", body_cn: "Marvell（MRVL）今日大跌9.84%、回落至$245，与基本面信号明显背离——就在杀跌当口，UBS与Cantor Fitzgerald先后上调其目标价，看好其定制AI芯片与Active Electrical Cable业务的成长性。这轮下跌更多是半导体板块整体获利了结、杠杆资金撤退所致，而非公司个体利空。当卖方持续加码、股价却随板块急挫，MRVL近10%的回调是被错杀的加仓窗口，还是AI芯片估值集体回归的前奏？", title_en: "Marvell Drops Nearly 10%; UBS Raises Price Target — Is This an Oversold Opportunity?", body_en: "Marvell (MRVL) dropped 9.84% to $245, a sharp divergence from underlying fundamentals — even as shares fell, both UBS and Cantor Fitzgerald raised their price targets, citing growth in custom AI chips and Active Electrical Cable businesses. The selloff appears driven by sector-wide profit-taking and leveraged-fund deleveraging rather than any company-specific negative catalyst. With sell-side conviction actually rising as the stock slides with the broader sector, is MRVL's near-10% pullback a mispriced entry window, or the opening act of a broader AI chip valuation reset?" },
  { ticker: "MSFT", title_cn: "微软逆势涨1.6%，Copilot要合并成统一App，防御属性回来了？", body_cn: "微软（MSFT）今日逆势上涨1.62%、站稳$390，在芯片股集体杀跌中显现防御价值。产品面动作密集：微软计划把分散的Copilot AI助手整合成统一App，同时在Azure Foundry接入Anthropic的Claude模型（由英伟达GPU驱动），软件+平台的AI变现路径更清晰。行业层面，\"大科技为抢电力发愁的3万亿难题\"也提示AI基建的现实约束。当资金从高beta芯片撤向确定性更强的软件巨头，微软这轮相对强势能否延续？", title_en: "Microsoft Gains 1.6% as Copilot Consolidates Into Unified App — Has Defensive Appeal Returned?", body_en: "Microsoft (MSFT) advanced 1.62% to $390, demonstrating defensive value as semiconductor stocks sold off broadly. On the product front, Microsoft plans to consolidate its fragmented Copilot AI assistants into a single unified app, while Azure Foundry has integrated Anthropic's Claude — powered by Nvidia GPUs — further clarifying the software-plus-platform AI monetization roadmap. At the macro level, coverage of Big Tech's $3 trillion power-access challenge underscores real infrastructure constraints on AI scaling. As capital rotates from high-beta chips toward software giants with more visible earnings, can Microsoft's relative outperformance be sustained?" },
  { ticker: "AAPL", title_cn: "苹果大涨4.8%领跑巨头，但库克警告内存\"极度短缺\"，反弹能续吗？", body_cn: "苹果（AAPL）今日大涨4.84%、回到$308，是今日Mag 7中最强的一员，资金在科技杀跌日明显向确定性避险的苹果聚拢。但隐忧仍在：CEO库克公开警告内存\"极度短缺\"，而内存正是美光、SanDisk暴涨的源头——上游涨价意味着苹果硬件成本与毛利率将持续承压。短期避险买盘与中期成本压力在此交汇。当苹果既是杀跌日的避风港、又是内存超级周期的成本承受方，这波近5%反弹你会追，还是担心margin被侵蚀？", title_en: "Apple Surges 4.8% to Lead Mag 7; Cook Warns of Severe Memory Shortage — Can the Rally Hold?", body_en: "Apple (AAPL) surged 4.84% to $308, the strongest Mag 7 performer on the day, as investors visibly rotated into the stock as a defensive anchor amid the tech selloff. The concern, however, is mounting: CEO Tim Cook publicly warned of a severe memory shortage — the same scarcity driving explosive gains in Micron and SanDisk — meaning accelerating upstream prices will translate directly into higher hardware costs and sustained gross margin pressure for Apple. Near-term safe-haven buying and medium-term cost headwinds are now squarely in conflict. With Apple simultaneously serving as a selloff refuge and a primary cost absorber in the memory super-cycle, will you chase this near-5% rebound or worry about margin erosion ahead?" },
  { ticker: "QQQ", title_cn: "纳指QQQ回落1.7%，3500亿流动性将抽离，创纪录后要变盘吗？", body_cn: "纳指100 ETF（QQQ）今日回落1.73%、跌至$712，为上周创纪录行情后的首次像样回撤。宏观暗流正在积聚：SeekingAlpha警示今夏将有约3500亿美元流动性从市场抽离，并把当前行情定性为\"杠杆泡沫而非盈利泡沫\"，Mag 7的高集中度既是机会也是风险。杠杆ETF被迫再平衡进一步放大了波动。当流动性退潮遇上过度拥挤的科技交易，这轮从高位回调是健康换手，还是更大级别调整的前奏？", title_en: "Nasdaq QQQ Retreats 1.7%; $350B Liquidity Drain Looms — Is a Regime Change Coming After Record Highs?", body_en: "The Nasdaq 100 ETF (QQQ) fell 1.73% to $712, marking its first meaningful pullback after last week's record-breaking rally. Macro headwinds are building: SeekingAlpha warned that approximately $350 billion in liquidity will be withdrawn from markets this summer, characterizing the current environment as a \"leverage bubble rather than an earnings bubble,\" with Mag 7 concentration amplifying both the opportunity and the risk. Forced rebalancing by leveraged ETFs is further magnifying volatility. As liquidity recedes and crowded tech positioning unwinds, is this a healthy consolidation or the early signal of a larger-scale correction?" },

  { ticker: "AMD", title_cn: "AMD跌4.3%但富国重申增持，上半年跑赢英伟达，回调该买吗？", body_cn: "AMD今日回落4.26%、跌至$518，随半导体板块整体获利了结，但个股逻辑依然偏多：富国银行重申\"增持\"评级，且\"上半年AMD与英特尔跑赢英伟达\"的强势叙事仍在延续，使其成为资金在芯片股内部轮动的首选。这轮下跌更像领涨股的正常回吐，而非基本面转向。当卖方持续背书、板块却集体降温，AMD的4%回调是上半年赢家的上车机会，还是高beta估值回归的开始？", title_en: "AMD Drops 4.3%; Wells Fargo Reiterates Overweight as AMD Outpaces Nvidia YTD — Buy the Dip?", body_en: "AMD fell 4.26% to $518 alongside broad semiconductor profit-taking, yet the individual stock thesis remains constructive: Wells Fargo reiterated its Overweight rating, and the narrative of AMD and Intel outperforming Nvidia in the first half of the year continues to position AMD as the preferred rotation target within the chip sector. This pullback looks more like a normal giveback from a leading performer than any fundamental deterioration. With sell-side support intact but the sector cooling collectively, is AMD's 4% decline an entry point into a first-half winner or the beginning of a high-beta valuation normalization?" },
  { ticker: "META", title_cn: "Meta跌4.9%，禁工程师用Claude引热议，AI自研路走对了吗？", body_cn: "Meta（META）今日下跌4.90%、回落至$583，随大盘科技股承压。消息面颇具看点：Meta被曝限制工程师使用Anthropic的Claude，凸显其押注自研大模型、与外部AI供应商划清界限的战略取向；同时市值回落至1.48万亿、与特斯拉打平，引发\"巨头市值之争\"。分析师则聚焦Meta在Neocloud与超大规模云之间的算力布局机会。当自研AI的决心遇上短期股价压力，Meta这波回调你会视作布局良机，还是担心AI投入回报存疑？", title_en: "Meta Drops 4.9%; Engineers Barred From Using Claude — Is the AI Self-Sufficiency Bet Paying Off?", body_en: "Meta (META) fell 4.90% to $583, caught in the broader large-cap tech selloff. On the news front, Meta was reported to have restricted engineers from using Anthropic's Claude, underscoring its strategic commitment to proprietary large language models and a deliberate distancing from external AI vendors; simultaneously, its market cap slipped to $1.48 trillion, drawing level with Tesla in a closely watched megacap valuation contest. Analysts are increasingly focused on Meta's positioning at the intersection of Neocloud and hyperscale compute buildouts. With AI self-sufficiency conviction clashing against near-term share price pressure, is Meta's pullback a strategic entry point or a sign that AI investment returns remain uncertain?" },
  { ticker: "ORCL", title_cn: "甲骨文跌1.6%遭遇1990年来最惨月，AI基建叙事崩了吗？", body_cn: "甲骨文（ORCL）今日续跌1.56%、报$140附近，更受关注的是它刚经历\"1990年以来最糟糕的一个月\"，市场质疑其激进AI云资本开支与债务扩张的可持续性。但公司仍在做多AI基建：宣布启动第三批\"Oracle国防生态\"合作，绑定政府与国防AI需求；行业层面$7500亿AI基建投资浪潮的叙事也未散。当股价已深度回调、基本面动作却在加码，甲骨文是AI基建被错杀的价值洼地，还是杠杆扩张后遗症才刚显现？", title_en: "Oracle Falls 1.6%, Suffers Worst Month Since 1990 — Has the AI Infrastructure Narrative Broken Down?", body_en: "Oracle (ORCL) extended its decline by 1.56% to around $140, with the headline story being its worst monthly performance since 1990 as markets question the sustainability of its aggressive AI cloud capital expenditure and mounting debt load. Yet the company continues to lean into the AI infrastructure buildout: Oracle announced a third cohort of \"Oracle Defense Ecosystem\" partnerships, anchoring government and defense AI demand, while the broader $750 billion AI infrastructure investment wave narrative remains intact. With the stock already deeply discounted but fundamental commitments accelerating, is Oracle a mispriced AI infrastructure opportunity or the first casualty of overleveraged expansion?" },
];
let current = 0;

function render() {
  if (!topics.length) return;
  const t = topics[current];
  document.getElementById('tickerTag').textContent = t.ticker || 'TOPIC';
  document.getElementById('titleCn').textContent   = t.title_cn;
  document.getElementById('bodyCn').textContent    = t.body_cn;
  document.getElementById('titleEn').textContent   = t.title_en;
  document.getElementById('bodyEn').textContent    = t.body_en;
  document.getElementById('progressText').textContent = (current+1) + ' / ' + topics.length;
  document.getElementById('progressBar').style.width  = ((current+1)/topics.length*100) + '%';
  document.getElementById('prevBtn').disabled = current === 0;
  document.getElementById('nextBtn').disabled = current === topics.length - 1;
  document.getElementById('doneBanner').style.display = 'none';
  document.getElementById('card').style.display = '';
  resetBtns();
}

function navigate(dir) {
  const next = current + dir;
  if (next >= 0 && next < topics.length) { current = next; render(); }
  else if (dir === 1 && current === topics.length - 1) {
    document.getElementById('doneBanner').style.display = 'block';
    document.getElementById('card').style.display = 'none';
  }
}

function resetBtns() {
  [
    ['.copy-title-cn-btn', '复制标题（中文）'],
    ['.copy-body-cn-btn',  '复制正文（中文）'],
    ['.copy-title-en-btn', 'Copy Title (EN)'],
    ['.copy-body-en-btn',  'Copy Body (EN)'],
  ].forEach(([sel, label]) => {
    const btn = document.querySelector(sel);
    if (btn) { btn.textContent = label; btn.classList.remove('copied'); }
  });
}

function copyField(field) {
  const text = topics[current][field];
  const labelMap = {
    title_cn: '复制标题（中文）',
    body_cn:  '复制正文（中文）',
    title_en: 'Copy Title (EN)',
    body_en:  'Copy Body (EN)',
  };
  const selMap = {
    title_cn: '.copy-title-cn-btn',
    body_cn:  '.copy-body-cn-btn',
    title_en: '.copy-title-en-btn',
    body_en:  '.copy-body-en-btn',
  };
  const btn = document.querySelector(selMap[field]);
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = labelMap[field];
      btn.classList.remove('copied');
    }, 1500);
  });
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft')           navigate(-1);
  if (e.key === 'ArrowRight')          navigate(1);
  if (e.key === '1')                   copyField('title_cn');
  if (e.key === '2')                   copyField('body_cn');
  if (e.key.toLowerCase() === 't')     copyField('title_en');
  if (e.key.toLowerCase() === 'b')     copyField('body_en');
});

render();
</script>
</body>
</html>
