<script>
const topics = [
  { ticker: "MU", title_cn: "美光微跌1.2%逼近买点，官员喊话建厂+老板或不满，变数多大？", body_cn: "美光（MU）今日小幅回落1.24%、报$979，但媒体指其正逼近技术买点。消息面暗流涌动：美国商务部长Lutnick喊话三星与SK海力士\"别无选择\"必须在美建AI内存厂，这一政策施压可能重塑供给格局、\"美光CEO未必高兴\"。同时\"大空头\"Michael Burry对AI发展路径发出强烈警告。当政策、竞争与AI泡沫质疑交织，美光在$980附近的震荡是买点确认，还是变数积累期？", title_en: "MU Dips 1.2% Near Buy Point — Policy, Competition & Burry's Warning: How Much Risk?", body_en: "Micron (MU) slid 1.24% to $979, even as media flagged it approaching a technical buy point. Commerce Secretary Lutnick pressured Samsung and SK Hynix to build AI memory fabs in the U.S. — a policy shift that could reshape supply dynamics, with analysts noting 'Micron's CEO may not be pleased.' Meanwhile, notable short-seller Michael Burry issued a stark warning on AI development trajectories. With policy pressure, intensifying competition, and bubble skepticism converging near $180, is MU's consolidation a buy-point confirmation or a period of accumulating risk?" },
  { ticker: "NVDA", title_cn: "英伟达大涨4%站上$210，逼近买点又遇集体诉讼，还追吗？", body_cn: "英伟达（NVDA）今日大涨4.03%、站上$210，在科技分化日领涨，被媒体列为\"逼近买点\"的芯片龙头之一。但杂音同现：NVDA面临一桩涉及员工餐休与费用报销的集体诉讼，属边缘性利空、不改基本面。在SK海力士上市点燃AI内存、油价与地缘扰动并存的背景下，资金仍向AI算力绝对龙头集中。当龙头再度逼近买点、噪音不改主线，你会在$210上方追这波强势，还是等回踩确认？", title_en: "NVDA Surges 4% Past $210, Nears Buy Point — But Faces Class Action: Still Chase It?", body_en: "Nvidia (NVDA) rallied 4.03% to $210, leading chip stocks on a day of broad tech divergence and drawing media recognition as a top name approaching a buy point. A class-action lawsuit over employee meal breaks and expense reimbursements emerged, though analysts view it as peripheral with no fundamental impact. Against a backdrop of SK Hynix's listing igniting AI memory enthusiasm and persistent geopolitical noise, capital continues to concentrate in the dominant AI compute leader. With NVDA again approaching a buy point and headline noise leaving the core thesis intact, would you chase this strength above $210 or wait for a pullback confirmation?" },
  { ticker: "SPCX", title_cn: "SpaceX再跌4.5%失守$150，摩根喊合并\"合理\"，$220预测靠谱吗？", body_cn: "SpaceX（SPCX）今日再跌4.51%、失守$150，随科技回调与地缘扰动走弱。多空叙事拉满：摩根大通称潜在的马斯克SpaceX-Tesla合并\"战略上说得通\"，还有预测喊出\"SpaceX年底可达$220\"；但空头Jim Chanos则借\"AI能让每个美国人年入百万\"的荒诞预测揶揄其估值泡沫。当乐观目标价与泡沫质疑正面交锋，SpaceX这波深跌你会信$220的想象，还是警惕高估值的回归？", title_en: "SpaceX SPCX Drops 4.5% Below $150 — JPMorgan Calls Merger 'Rational,' Is $220 Credible?", body_en: "SpaceX (SPCX) fell another 4.51%, breaching $150 as tech sold off amid geopolitical headwinds. The bull-bear narrative is stretched: JPMorgan called a potential Musk-led SpaceX-Tesla merger 'strategically sound,' and one forecast projects SPCX reaching $220 by year-end — while short-seller Jim Chanos mocked its valuation using absurdist AI income projections as a proxy for bubble excess. With an optimistic price target squaring off against bubble warnings, do you trust the $220 upside case or stay cautious on a high-valuation retreat?" },
  { ticker: "SKHYV", title_cn: "SK海力士上市次日再飙12.8%破$168，狂欢见顶还是刚开始？", body_cn: "SK海力士（SKHYV，when-issued）今日再飙12.76%、涨至$168，延续纳斯达克上市后的强势。基本面强劲：SK海力士掌门人预计\"内存短缺将持续到下个十年\"，为AI存储需求给出长周期背书。但质疑声也在放大——SeekingAlpha连发\"最大的内存派对可能已见顶\"\"2027年HBM战略存不确定性\"，Benzinga更以SpaceX、Figma、Circle上市后回落为鉴，警示\"上市即高点\"的风险。海力士次日续飙近13%，你认为这是内存超级周期的接力，还是新股情绪的最后狂欢？", title_en: "SK Hynix SKHYV Surges Another 12.8% to $168 on Day Two — Peak Euphoria or Just Beginning?", body_en: "SK Hynix (SKHYV, when-issued) extended its post-Nasdaq debut rally, surging another 12.76% to $168. Fundamentals appear supportive — SK Hynix's chairman projected memory shortages persisting 'into the next decade,' providing a long-cycle endorsement for AI storage demand. However, skepticism is mounting: Seeking Alpha published pieces warning 'the biggest memory party may have peaked' and flagging HBM strategy uncertainty through 2027, while Benzinga cited post-IPO pullbacks in SpaceX, Figma, and Circle as cautionary precedents. With SKHYV up nearly 13% on day two, is this the continuation of a memory supercycle — or the final burst of IPO euphoria?" },
  { ticker: "SNDK", title_cn: "SanDisk涨3.1%创新高，高盛给出\"惊人\"目标价，还有多少空间？", body_cn: "SanDisk（SNDK）今日上涨3.10%、站上$1,916续创新高，领涨内存板块。强催化来自卖方——高盛（Goldman Sachs）为SNDK设定了一个\"令人瞠目\"的2026年目标价；同时机构预测AI内存芯片市场到2030年将达$4760亿，SNDK被点名为核心受益股之一。在SK海力士上市点燃的存储热潮下，SanDisk的成长叙事持续获资金追捧。当高盛的高目标价遇上万亿级市场空间，SNDK在历史高位你会追高，还是等这轮内存狂热降温？", title_en: "SanDisk SNDK Hits Record High at $1,916 — Goldman's 'Stunning' Target: How Much Runway Left?", body_en: "SanDisk (SNDK) rose 3.10% to a new all-time high of $1,916, leading the memory sector. Goldman Sachs set what analysts described as a jaw-dropping 2026 price target for SNDK, while separate research projects the AI memory chip market reaching $476 billion by 2030, naming SNDK as a primary beneficiary. The stock continues to attract capital as SK Hynix's debut reignites storage sector enthusiasm. With Goldman's elevated target meeting a trillion-dollar market opportunity, would you buy SNDK at record highs or wait for this memory frenzy to cool?" },
  { ticker: "META", title_cn: "Meta大涨6%站上$669，却遭$20亿AI交易生变+欧盟调查，能扛住吗？", body_cn: "Meta（META）今日大涨5.97%、站上$669，领涨大型科技股。但利好利空交织：一边是资金对其全栈AI布局的持续追捧，另一边是\"Meta面临一笔$20亿AI交易的逆转、并遭欧盟对其App设计的调查\"的双重利空。市场同时在争论\"AI泡沫是否将破\"。当强势股价撞上监管与交易变数，Meta这波创阶段新高是AI战略兑现的信心票，还是利空未被充分定价的乐观？", title_en: "Meta Jumps 6% to $669 — $2B AI Deal Reversal and EU Probe: Can It Hold Gains?", body_en: "Meta (META) surged 5.97% to $669, leading large-cap tech. The move came despite a dual headwind: reports that a $2 billion AI deal is facing reversal, and a new EU investigation into Meta's app design practices. Broader market debate over whether the AI bubble is nearing a breaking point added to the noise. With a strong stock price running into regulatory risk and deal uncertainty, does Meta's push to new near-term highs reflect genuine confidence in its full-stack AI strategy — or optimism with underpriced downside?" },
  { ticker: "TSLA", title_cn: "特斯拉守住$400微涨0.3%，摩根称合并\"合理\"但难救投资者，怎么看？", body_cn: "特斯拉（TSLA）今日微涨0.30%、勉强守在$407，在科技分化日相对平淡。焦点仍是合并叙事：摩根大通称马斯克旗下SpaceX-Tesla合并\"战略上说得通\"，但另有顶级分析师直言\"合并救不了特斯拉投资者\"。高盛对SpaceX的AI预测则被指\"最大赢家其实是美光\"，侧面反映市场对TSLA自身AI变现的存疑。当合并想象与\"救不了\"的冷水并存，特斯拉在$400关口的拉锯你更信哪一方？", title_en: "Tesla TSLA Holds $400 With 0.3% Gain — JPMorgan Says Merger 'Rational' But Won't Save Investors: Which Side Are You On?", body_en: "Tesla (TSLA) eked out a 0.30% gain to $407, underperforming on a day of tech divergence. The merger narrative remained front and center: JPMorgan called a potential SpaceX-Tesla combination 'strategically rational,' but a top analyst countered that 'a merger won't save Tesla investors.' Goldman Sachs' AI projections for SpaceX drew commentary that 'the real winner would be Micron,' indirectly highlighting market skepticism over TSLA's own AI monetization path. With merger optimism clashing against a cold-water reality check, which argument holds more weight at the $400 battleground?" },
  { ticker: "MSFT", title_cn: "微软走平守$385，\"AI烧钱要见回报\"呼声起，巨头压力大吗？", body_cn: "微软（MSFT）今日基本走平、报$385，在科技分化中显得平静。市场主线转向对大厂的拷问——\"大科技正把数十亿砸向AI，而股市现在就要看到回报\"，微软作为AI capex最重的巨头之一首当其冲；同时它被一些分析师列为\"未来十年最值得买入持有的AI股\"。当\"AI投入何时变现\"成为财报季前的核心议题，微软这类重资本开支巨头，你认为是长期赢家，还是短期要为回报焦虑买单？", title_en: "Microsoft MSFT Flat at $385 as 'AI Spend Must Deliver Returns' Pressure Builds — How Much Heat Can It Take?", body_en: "Microsoft (MSFT) traded virtually flat at $385, a quiet session amid broader tech divergence. The dominant market narrative is shifting toward accountability — 'Big Tech is pouring billions into AI, and markets want returns now' — placing MSFT, one of the heaviest AI capex spenders, squarely in the spotlight. Concurrently, some analysts continue to name Microsoft among the top AI buy-and-hold names for the next decade. With 'AI ROI' becoming the central question heading into earnings season, do you see Microsoft's heavy capital commitment as a long-term winning bet or a short-term liability?" },
  { ticker: "INTC", title_cn: "英特尔跌2.4%但上调服务器芯片价，AI需求撑供给，困境反转在即？", body_cn: "英特尔（INTC）今日下跌2.40%、报$110，股价偏弱但基本面出现积极信号——公司因\"AI需求把供给推向极限\"而上调服务器芯片价格，显示其数据中心业务的定价权有所回升。不过华尔街对芯片股\"看多一只、看空另一只\"，英特尔仍处被质疑的一方。当提价的基本面利好撞上偏空的市场情绪，英特尔这波下跌是困境反转前的错杀，还是掉队叙事的延续？", title_en: "Intel INTC Falls 2.4% But Raises Server Chip Prices on AI Demand — Turnaround Imminent?", body_en: "Intel (INTC) dropped 2.40% to $110, but a meaningful fundamental signal emerged: the company raised server chip prices, citing AI demand pushing supply 'to its limits' — suggesting recovering pricing power in its data center segment. Wall Street remains selectively bullish on semiconductors, and Intel continues to sit on the skeptical side of that divide. With a positive fundamental catalyst colliding with persistently bearish sentiment, is Intel's decline a mispriced turnaround opportunity — or simply a continuation of its laggard narrative?" },
  { ticker: "MRVL", title_cn: "Marvell跌3%，\"隐藏增长引擎\"达里程碑未被定价，市场看漏了？", body_cn: "Marvell（MRVL）今日下跌3.04%、报$236，股价承压但出现潜在反转信号——媒体称\"Marvell的隐藏增长引擎刚达成一个市场尚未定价的重大里程碑\"，暗示其定制AI芯片业务的价值被低估。同时\"博通vs Marvell的定制AI芯片估值对决\"也在持续发酵。在前期深跌与竞争担忧后，MRVL的成长叙事正被重新审视。当\"未被定价的里程碑\"遇上仍疲软的股价，Marvell是错杀的价值洼地，还是要等基本面兑现才敢上车？", title_en: "Marvell MRVL Drops 3% — 'Hidden Growth Engine' Hits Unpriced Milestone: Has the Market Missed This?", body_en: "Marvell Technology (MRVL) fell 3.04% to $236, though a potential inflection signal emerged: media reports that 'Marvell's hidden growth engine just hit a major milestone the market hasn't priced in,' pointing to underappreciated value in its custom AI chip business. The ongoing valuation debate between Broadcom and Marvell on custom AI silicon continues to gain traction. After a deep drawdown and lingering competitive concerns, MRVL's growth narrative is being reassessed. With an 'unpriced milestone' meeting a still-weak stock price, is Marvell an overlooked value opportunity — or one that requires fundamental proof before committing?" },
  { ticker: "AAPL", title_cn: "苹果微跌0.3%守$315，前工程师泄密案+OpenAI互撕，看点几何？", body_cn: "苹果（AAPL）今日微跌0.28%、守在$315，走势平稳但话题不断。多条消息发酵：苹果指控一名前工程师窃取机密并教唆同事、此人现就职于OpenAI，马斯克与Altman还就\"苹果诉OpenAI\"隔空互撕；SeekingAlpha则以\"苹果AI收费站是个神话\"质疑其AI变现能力。当法律纠纷与AI叙事质疑交织，苹果这只避险大票在$315的盘整，你会当作稳健配置，还是担心它在AI竞赛中掉队？", title_en: "Apple AAPL Slips 0.3% to $315 Amid Ex-Engineer Espionage Case and OpenAI Feud — What's the Real Story?", body_en: "Apple (AAPL) edged down 0.28% to $315, holding steady in price but generating substantial headlines. Apple accused a former engineer of stealing trade secrets and allegedly coaching colleagues to do the same — the individual now works at OpenAI, sparking a public spat between Elon Musk and Sam Altman over the case. Seeking Alpha also challenged Apple's AI monetization thesis, calling the 'Apple AI tollbooth' narrative a myth. With legal disputes and AI credibility questions swirling, is Apple's consolidation at $315 a reliable defensive holding — or a sign it risks falling behind in the AI race?" },
  { ticker: "AMD", title_cn: "AMD涨2%，被列AI基建\"两年翻倍\"候选，但Perplexity弃它选英伟达？", body_cn: "AMD今日上涨2.04%、报$558，跟随芯片股走强。多空信号并存：一边被列入\"3只有望2027年前翻倍的AI基建股\"、以及\"AMD/英伟达/博通谁是最佳AI股\"的常青讨论；另一边\"Perplexity选择英伟达而非AMD，折射出芯片主导权的更深故事\"，提示AMD在顶级AI客户处仍难撼动英伟达。当\"翻倍想象\"撞上\"客户仍选英伟达\"的现实，AMD这波上涨你会当第二供应商的成长机会，还是承认龙头差距难缩？", title_en: "AMD Rises 2% to $558, Tagged as 'Double by 2027' AI Pick — But Perplexity Chose Nvidia Instead?", body_en: "AMD climbed 2.04% to $558, riding broader chip sector strength. Conflicting signals persist: AMD is featured among stocks with potential to double before 2027 in AI infrastructure, and the perennial AMD-vs-Nvidia-vs-Broadcom debate keeps it in the conversation — yet Perplexity AI's decision to select Nvidia over AMD for its infrastructure underscores the deeper challenge of displacing the dominant platform at top-tier AI clients. With 'doubling potential' running into the reality that leading AI customers still default to Nvidia, is AMD's gain a legitimate second-supplier opportunity — or does the leadership gap remain too wide to close?" },

];
let current = 0;

function render() {
  if (!topics.length) return;
  const t = topics[current];
  document.getElementById('tickerTag').textContent = t.ticker || 'TOPIC';
  document.getElementById('titleCn').textContent   = t.title_cn;
  document.getElementById('bodyCn').textContent    = t.body_cn;
  document.getElementById('titleEn').textContent   = t.title_en;
  document.getElementById('bodyEn').textContent    = t.body_en;
  document.getElementById('progressText').textContent = (current+1) + ' / ' + topics.length;
  document.getElementById('progressBar').style.width  = ((current+1)/topics.length*100) + '%';
  document.getElementById('prevBtn').disabled = current === 0;
  document.getElementById('nextBtn').disabled = current === topics.length - 1;
  document.getElementById('doneBanner').style.display = 'none';
  document.getElementById('card').style.display = '';
  resetBtns();
}

function navigate(dir) {
  const next = current + dir;
  if (next >= 0 && next < topics.length) { current = next; render(); }
  else if (dir === 1 && current === topics.length - 1) {
    document.getElementById('doneBanner').style.display = 'block';
    document.getElementById('card').style.display = 'none';
  }
}

function resetBtns() {
  [
    ['.copy-title-cn-btn', '复制标题（中文）'],
    ['.copy-body-cn-btn',  '复制正文（中文）'],
    ['.copy-title-en-btn', 'Copy Title (EN)'],
    ['.copy-body-en-btn',  'Copy Body (EN)'],
  ].forEach(([sel, label]) => {
    const btn = document.querySelector(sel);
    if (btn) { btn.textContent = label; btn.classList.remove('copied'); }
  });
}

function copyField(field) {
  const text = topics[current][field];
  const labelMap = {
    title_cn: '复制标题（中文）',
    body_cn:  '复制正文（中文）',
    title_en: 'Copy Title (EN)',
    body_en:  'Copy Body (EN)',
  };
  const selMap = {
    title_cn: '.copy-title-cn-btn',
    body_cn:  '.copy-body-cn-btn',
    title_en: '.copy-title-en-btn',
    body_en:  '.copy-body-en-btn',
  };
  const btn = document.querySelector(selMap[field]);
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = labelMap[field];
      btn.classList.remove('copied');
    }, 1500);
  });
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft')           navigate(-1);
  if (e.key === 'ArrowRight')          navigate(1);
  if (e.key === '1')                   copyField('title_cn');
  if (e.key === '2')                   copyField('body_cn');
  if (e.key.toLowerCase() === 't')     copyField('title_en');
  if (e.key.toLowerCase() === 'b')     copyField('body_en');
});

render();
</script>

</html>
